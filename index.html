let DB = JSON.parse(JSON.stringify(DEFAULT_DATA));
let ME = null, TAB='tasks', STAB='recurring', HM=new Date().getMonth(), HY=new Date().getFullYear();
let AF='all', UF='all', ICF='all', SHOWD=false;
let saveTimeout = null;

// FIREBASE SYNC
const DOC = doc(db, 'shirat', 'main');

function setSyncing(v){
  const d=document.getElementById('sdot');
  if(d) v?d.classList.add('syncing'):d.classList.remove('syncing');
}

async function loadFromFirebase(){
  try{
    const snap = await getDoc(DOC);
    if(snap.exists()){
      const data = snap.data();
      DB = {...DEFAULT_DATA,...data};
    } else {
      // First time - save defaults
      await setDoc(DOC, DB);
    }
    return true;
  }catch(e){
    console.error('Firebase load error:',e);
    return false;
  }
}

function save(){
  if(saveTimeout) clearTimeout(saveTimeout);
  setSyncing(true);
  saveTimeout = setTimeout(async ()=>{
    try{
      await setDoc(DOC, DB);
    }catch(e){
      console.error('Firebase save error:',e);
      toast('שגיאת שמירה — בדוק חיבור');
    }
    setSyncing(false);
  }, 800);
}

// Listen for changes from other devices
onSnapshot(DOC, (snap)=>{
  if(snap.exists() && ME){
    const data = snap.data();
    const newDB = {...DEFAULT_DATA,...data};
    // Update non-user-specific data
    DB.inv = newDB.inv;
    DB.equip = newDB.equip;
    DB.comps = newDB.comps;
    DB.actLog = newDB.actLog;
    DB.hoursLog = newDB.hoursLog;
    DB.bonus = newDB.bonus;
    DB.rT = newDB.rT;
    DB.oT = newDB.oT;
    DB.users = newDB.users;
    DB.journal = newDB.journal;
    DB.projects = newDB.projects;
    DB.taskNotes = newDB.taskNotes;
    // Refresh current tab silently
    if(document.getElementById('app-main')) renderTab();
  }
});

function at(){return[...DB.rT,...DB.oT];}
function gu(id){return DB.users.find(u=>u.id===id);}
function tdk(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fd(s){if(!s)return'';return new Date(s+'T00:00:00').toLocaleDateString('he-IL',{day:'numeric',month:'short'});}
function ch(s,e){const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(0,((eh*60+em)-(sh*60+sm))/60);}
function gp(uid){let p=0;Object.values(DB.comps).forEach(dc=>{Object.entries(dc).forEach(([tid,by])=>{if(by!==uid)return;const t=at().find(t=>t.id===tid);if(t)p+=PRI[t.pri]?.pts||5;});});Object.values(DB.bonus||{}).flat().filter(b=>b.uid===uid).forEach(b=>p+=b.pts);p+=at().filter(t=>t.createdBy===uid).length*3;return p;}
function al(type,text,detail='',area=''){if(!DB.actLog)DB.actLog=[];DB.actLog.push({id:'l'+Date.now(),type,ts:Date.now(),userId:ME.id,userName:ME.name,text,detail,area});save();}

// DOM helpers
function el(tag,attrs={},kids=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else if(k==='value')e.value=v;
    else if(k!=='key')e.setAttribute(k,v);
  });
  (Array.isArray(kids)?kids.flat():[kids]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}
function toast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function modal(html){const bg=el('div',{className:'modal-bg'});const box=el('div',{className:'modal'});box.innerHTML=html;bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});document.body.appendChild(bg);return{bg,box};}
function card(ch,st={}){return el('div',{className:'card',style:st},ch);}
function pbar(pct,color,h=5){return el('div',{className:'pbar',style:{height:h+'px'}},[el('div',{className:'pfill',style:{width:Math.min(Math.max(pct,0),100)+'%',background:color}})]);}
function chip(l,active,color,fn){return el('button',{className:'chip',style:{background:active?color:'var(--mist)',color:active?'#fff':'var(--clay)'},onclick:fn},l);}
function empty(t='אין פריטים'){return el('div',{className:'empty'},t);}
function finp(a){const e=el('input',{className:'finp',...a});return e;}
function fsel(opts,val,fn){const e=el('select',{className:'finp'});opts.forEach(([v,l])=>{const o=el('option',{value:v},l);if(v===val)o.selected=true;e.appendChild(o);});if(fn)e.addEventListener('change',ev=>fn(ev.target.value));return e;}
function fta(a){return el('textarea',{className:'finp',...a});}
function btn(l,color,fn,st={}){return el('button',{className:'btn-g',style:{background:color,...st},onclick:fn},l);}

// AUTH - LOGIN ONLY (no public registration)
function renderLogin(){
  const root=document.getElementById('root');root.innerHTML='';
  let creds=null;try{creds=JSON.parse(localStorage.getItem('sheirat_creds')||'null');}catch{}
  if(creds){
    const u=DB.users.find(u=>u.email===creds.email&&u.pass===creds.pass);
    if(u){ME=u;renderApp();return;}
  }
  const em=finp({type:'email',placeholder:'your@email.com',className:'inp'});
  const pw=finp({type:'password',placeholder:'••••••',className:'inp'});
  const err=el('div',{className:'err'});
  const login=()=>{
    const u=DB.users.find(u=>u.email===em.value.trim().toLowerCase()&&u.pass===pw.value);
    if(!u){err.textContent='מייל או סיסמה שגויים';return;}
    localStorage.setItem('sheirat_creds',JSON.stringify({email:em.value.trim().toLowerCase(),pass:pw.value}));
    ME=u;renderApp();
  };
  em.addEventListener('keydown',e=>e.key==='Enter'&&login());
  pw.addEventListener('keydown',e=>e.key==='Enter'&&login());
  root.appendChild(el('div',{className:'auth'},[el('div',{className:'auth-box'},[
    el('div',{className:'auth-logo'},[
      el('div',{style:{fontSize:'48px',marginBottom:'6px'}},'🌾'),
      el('h1',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'24px',fontWeight:900,color:'var(--earth)'}},'שירת האדמה'),
      el('p',{style:{color:'var(--clay)',fontSize:'12px',marginTop:'3px'}},'מערכת ניהול חווה')
    ]),
    el('label',{className:'lbl'},'מייל'),em,
    el('label',{className:'lbl'},'סיסמה'),pw,err,
    el('button',{className:'btn-main',onclick:login},'כניסה ←'),
    DB.users.length===0?el('div',{className:'auth-sw',style:{marginTop:'12px',fontSize:'12px',color:'var(--clay)',background:'var(--mist)',borderRadius:'8px',padding:'10px'}},'פנה למנהל לקבלת פרטי כניסה'):el('span'),
    creds?el('div',{style:{textAlign:'center',marginTop:'8px',fontSize:'11px',color:'var(--clay)'}},[el('a',{style:{cursor:'pointer',textDecoration:'underline'},onclick:()=>{localStorage.removeItem('sheirat_creds');em.value='';pw.value=''}},'כניסה עם חשבון אחר')]):el('span'),
  ])]));
}

      el('div',{className:'u-pill',onclick:()=>{if(confirm(`${ME.emoji} ${ME.name}\nנקודות: ${gp(ME.id)}\u2605\n\nלצאת?`)){ME=null;localStorage.removeItem('sheirat_creds');renderLogin();}}},[

  ]);
  const main=el('div',{className:'app-main',id:'app-main'});
  const TABS=[{id:'tasks',l:'📋 משימות'},{id:'act',l:'📋 פעילות'},{id:'inv',l:'📦 מלאי'},{id:'maint',l:'🔧 תחזוקה'},{id:'hrs',l:'⏱ שעות'},{id:'score',l:'🏆 ניקוד'},{id:'proj',l:'🗂 פרויקטים'},{id:'team',l:'👥 צוות'},{id:'jour',l:'📔 יומן'},{id:'sum',l:'📊 סיכום'},...(ME.role==='מנהל'?[{id:'admin',l:'⚙️ ניהול'}]:[])];
  TABS.forEach(t=>{
    const b=el('button',{className:'tab-btn'+(t.id===TAB?' on':''),onclick:()=>{TAB=t.id;tw.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderTab(main,pf);}},t.l);

  });

  const updateDate=()=>{const d=document.getElementById('hdate');if(d)d.textContent=new Date().toLocaleDateString('he-IL',{weekday:'short',day:'numeric',month:'long'});};
  updateDate();setInterval(updateDate,60000);
  renderTab(main,pf);

function renderTab(mainEl,pfEl){
  const main=mainEl||document.getElementById('app-main');
  const pf=pfEl||window._pf;
  if(!main)return;
  main.innerHTML='';
  if(TAB==='tasks')rTasks(main);
  else if(TAB==='act')rActivity(main);
  else if(TAB==='inv')rInventory(main);
  else if(TAB==='maint')rMaintenance(main);
  else if(TAB==='hrs')rHours(main);
  else if(TAB==='score')rScore(main);
  else if(TAB==='proj')rProjects(main);
  else if(TAB==='team')rTeam(main);
  else if(TAB==='jour')rJournal(main);
  else if(TAB==='sum')rSummary(main);
  else if(TAB==='admin')rAdmin(main);
  if(pf){
    const today=tdk();const dayComps=DB.comps[today]||{};
    const todayTasks=DB.rT.length+DB.oT.filter(t=>!t.done).length;
    const done=Object.keys(dayComps).length;
    pf.style.width=Math.round(Math.min(done/Math.max(todayTasks,1)*100,100))+'%';
  }
  const hpts=document.getElementById('hpts');
  if(hpts)hpts.textContent=gp(ME.id)+'\u2605';
}

function toggle(tid){
  const today=tdk();
  if(!DB.comps[today])DB.comps[today]={};
  const t=at().find(x=>x.id===tid);
  if(DB.comps[today][tid]){delete DB.comps[today][tid];al('undo','בוטל: '+(t?t.title:''),'',t?t.area:'');}
  else{DB.comps[today][tid]=ME.id;al('done','בוצע: '+(t?t.title:''),'',t?t.area:'');}
  save();renderTab();
}

function noteTask(tid){
  const t=at().find(x=>x.id===tid);if(!t)return;
  const notes=DB.taskNotes[tid]||[];
  let html=`<div style="font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:700;margin-bottom:10px">${t.title}</div>`;
  notes.slice(-5).forEach(n=>{html+=`<div style="background:var(--mist);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px"><div style="font-weight:600;color:var(--clay)">${n.name} · ${new Date(n.ts).toLocaleDateString('he-IL')}</div><div style="margin-top:3px">${n.text}</div></div>`;});
  html+=`<textarea id="nt" placeholder="הוסף הערה..." style="width:100%;border:1.5px solid var(--parch);border-radius:8px;padding:9px;font-size:13px;font-family:inherit;margin-top:8px;outline:none;resize:vertical" rows="3"></textarea><button onclick="(()=>{const v=document.getElementById('nt').value.trim();if(!v)return;if(!DB.taskNotes['${tid}'])DB.taskNotes['${tid}']=[];DB.taskNotes['${tid}'].push({ts:Date.now(),uid:ME.id,name:ME.name,text:v});save();document.querySelector('.modal-bg').remove();toast('הערה נשמרה');renderTab();})()" style="width:100%;padding:10px;background:var(--sage);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit">שמור</button>`;
  modal(html);
}

  const assignedUser=t.uid?gu(t.uid):null;

    el('div',{style:{width:'22px',height:'22px',border:`2px solid ${done?PRI[t.pri]?.c||'var(--sage)':'var(--parch)'}`,borderRadius:'6px',background:done?(PRI[t.pri]?.c||'var(--sage)'):'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all .2s'}},done?el('span',{style:{color:'#fff',fontSize:'13px'}},'✓'):''),
    el('div',{style:{flex:1}},[
      el('div',{style:{fontWeight:done?400:600,textDecoration:done?'line-through':'none',fontSize:'13px',color:done?'var(--clay)':'var(--earth)'}},t.title),

        t.rec?el('span',{style:{fontSize:'10px',color:'var(--clay)'}},REC[t.rec]||''):'',
        t.due?el('span',{style:{fontSize:'10px',color:new Date(t.due+'T00:00:00')<new Date()&&!t.done?'var(--red)':'var(--clay)'}},'עד '+fd(t.due)):'',
        assignedUser?el('span',{style:{fontSize:'11px'}},assignedUser.emoji):'',
        whoDidIt&&done?el('span',{className:'pts-bdg'},whoDidIt.emoji+' +'+(PRI[t.pri]?.pts||5)):'',

function rTasks(main){
  const today=tdk();const todayComps=DB.comps[today]||{};
  const areaOpts=[['all','הכל'],...Object.entries(AREAS).map(([k,v])=>[k,v.l])];
  const userOpts=[['all','כולם'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])];
  const filter=card([
    el('div',{className:'chips'},[
      chip('הכל',STAB==='all','var(--earth)',()=>{STAB='all';renderTab();}),
      chip('חוזרות',STAB==='recurring','var(--sage)',()=>{STAB='recurring';renderTab();}),
      chip("חד-פעמיות",STAB==='once','var(--straw)',()=>{STAB='once';renderTab();}),
      chip('שלי',STAB==='mine','var(--red)',()=>{STAB='mine';renderTab();}),
    ])
  ]);
  main.appendChild(filter);
  const today2=new Date();today2.setHours(0,0,0,0);
  let tasks=[];
  if(STAB==='recurring'||STAB==='all')tasks=[...tasks,...DB.rT];
  if(STAB==='once'||STAB==='all')tasks=[...tasks,...DB.oT.filter(t=>!t.done||SHOWD)];
  if(STAB==='mine')tasks=[...DB.rT,...DB.oT].filter(t=>t.uid===ME.id||todayComps[t.id]===ME.id);
  if(AF!=='all')tasks=tasks.filter(t=>t.area===AF);
  const doneTasks=tasks.filter(t=>todayComps[t.id]||(t.done));
  const pendTasks=tasks.filter(t=>!todayComps[t.id]&&!t.done);
  const todayProg=DB.rT.length+DB.oT.filter(t=>!t.done).length;
  const doneCount=Object.keys(todayComps).length;
  main.appendChild(card([
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},[
      el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'14px',fontWeight:700}},`היום — ${new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'})}`),
      el('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--sage)'}},`${doneCount}/${todayProg} ✓`)
    ]),
    pbar(Math.round(doneCount/Math.max(todayProg,1)*100),'var(--sage)',8)
  ]));
  if(pendTasks.length)main.appendChild(card([el('div',{className:'card-t'},'⏳ ממתינות'),...pendTasks.map(t=>mkRow(t,false,todayComps))]));
  if(doneTasks.length)main.appendChild(card([el('div',{className:'card-t',style:{color:'var(--sage)'}},'✅ הושלמו'),...doneTasks.map(t=>mkRow(t,todayComps[t.id]||t.done,todayComps))]));
  if(!tasks.length)main.appendChild(empty('אין משימות'));
  if(ME.role==='מנהל'){
    main.appendChild(card([
      el('div',{className:'card-t'},'➕ משימה חד-פעמית'),
      ...['title','area','pri','uid','due'].map(f=>{
        if(f==='area')return el('div',{},[el('div',{className:'flab'},'אזור'),fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),'',(v)=>{window._ntArea=v;})]);
        if(f==='pri')return el('div',{},[el('div',{className:'flab'},'עדיפות'),fsel(Object.entries(PRI).map(([k,v])=>[k,v.l]),'high',(v)=>{window._ntPri=v;})]);
        if(f==='uid')return el('div',{},[el('div',{className:'flab'},'משויך ל'),fsel([['','ללא'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],'',(v)=>{window._ntUid=v;})]);
        if(f==='due')return el('div',{},[el('div',{className:'flab'},'תאריך יעד'),el('input',{id:'_ntDue',type:'date',className:'finp'})]);
        return el('div',{},[el('div',{className:'flab'},'כותרת'),el('input',{id:'_ntTitle',className:'finp',placeholder:'תיאור המשימה'})]);
      }),
      btn('הוסף משימה','var(--red)',()=>{
        const title=document.getElementById('_ntTitle')?.value.trim();
        if(!title){toast('חסרה כותרת');return;}
        const t={id:'o'+Date.now(),title,area:window._ntArea||'admin',pri:window._ntPri||'medium',uid:window._ntUid||'',due:document.getElementById('_ntDue')?.value||'',done:false,doneAt:null,createdBy:ME.id};
        DB.oT.push(t);save();toast('משימה נוספה');renderTab();
      },{width:'100%',marginTop:'8px'})
    ]));
  }
}

function rInventory(main){
  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,marginBottom:'12px'}},'📦 מלאי'));
  const catChips=el('div',{className:'chips',style:{marginBottom:'10px'}});
  [['all','הכל'],...Object.entries(INV_CATS).map(([k,v])=>[k,v.l])].forEach(([k,l])=>{catChips.appendChild(chip(l,ICF===k,INV_CATS[k]?.c||'var(--earth)',()=>{ICF=k;renderTab();}));});
  main.appendChild(catChips);
  let items=ICF==='all'?DB.inv:DB.inv.filter(i=>i.invCat===ICF);

      el('div',{style:{display:'flex',gap:'4px',flexDirection:'column'}},[
        el('button',{style:{background:'var(--sage)',color:'#fff',border:'none',borderRadius:'6px',padding:'4px 8px',fontSize:'12px',cursor:'pointer'},onclick:()=>{item.qty=Math.round((item.qty+1)*10)/10;save();renderTab();al('inv','עדכון מלאי: '+item.name,'+1 '+item.unit);}},'+1'),
        el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'6px',padding:'4px 8px',fontSize:'12px',cursor:'pointer'},onclick:()=>{if(item.qty>0){item.qty=Math.round((item.qty-1)*10)/10;save();renderTab();al('inv','עדכון מלאי: '+item.name,'-1 '+item.unit);}}},'-1'),

  html+=`<label style="font-size:10px;font-weight:700;color:var(--sage);display:block;margin-bottom:4px">שם</label><input id="ei_name" value="${item.name}" class="finp" style="margin-bottom:8px">`;
  html+=`<label style="font-size:10px;font-weight:700;color:var(--sage);display:block;margin-bottom:4px">אייקון</label><input id="ei_icon" value="${item.icon}" class="finp" style="margin-bottom:8px">`;
  html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><div><label style="font-size:10px;font-weight:700;color:var(--sage);display:block;margin-bottom:4px">כמות</label><input id="ei_qty" type="number" step="0.1" value="${item.qty}" class="finp"></div><div><label style="font-size:10px;font-weight:700;color:var(--sage);display:block;margin-bottom:4px">מינימום</label><input id="ei_min" type="number" step="0.1" value="${item.minQty}" class="finp"></div></div>`;

  const kg=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}});
  [{icon:'⏱',l:'שעות עבודה',v:totalH.toFixed(1)+"ש'",c:'var(--sage)'},{icon:'✅',l:'משימות בוצעו',v:totalDone,c:'var(--gold)'},{icon:'⚠️',l:'פריטים חסרים',v:shortage.length,c:shortage.length?'var(--red)':'var(--sage)'},{icon:'🔧',l:'ציוד לתחזוקה',v:needsMaint.length,c:needsMaint.length?'var(--red)':'var(--sage)'}].forEach(k=>{
    kg.appendChild(el('div',{className:'card',style:{textAlign:'center'}},[el('div',{style:{fontSize:'24px',marginBottom:'4px'}},k.icon),el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'26px',fontWeight:900,color:k.c}},k.v),el('div',{style:{fontSize:'11px',color:'var(--clay)'}},k.l)]));
  });main.appendChild(kg);
  if(shortage.length){
    const sc=card([el('div',{className:'card-t',style:{color:'var(--straw)'}},`🛒 רשימת קנייה — ${shortage.length} פריטים`)],{background:'#fff8ee',border:'1px solid #e8b84b44'});
    shortage.forEach(i=>{
      const r=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',fontSize:'13px',borderBottom:'1px solid var(--mist)'}});
      r.appendChild(el('span',{style:{fontSize:'18px'}},i.icon));
      r.appendChild(el('div',{style:{flex:1}},[el('div',{style:{fontWeight:600}},i.name),el('div',{style:{fontSize:'11px',color:'var(--clay)'}},`יש: ${i.qty} ${i.unit} · צריך: ${i.minQty} ${i.unit}`)]));
      r.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,color:'var(--red)'}},i.missing.toFixed(1)+' '+i.unit));
      sc.appendChild(r);
    });
    main.appendChild(sc);
  }
  const ranked=DB.users.map(u=>({...u,pts:gp(u.id),hrs:uH[u.id]||0,tasks:monthKeys.reduce((s,k)=>s+Object.values(DB.comps[k]||{}).filter(v=>v===u.id).length,0)})).sort((a,b)=>b.pts-a.pts);
  const wc=card([el('div',{className:'card-t'},`👥 ביצועי עובדים — ${MONTHS[HM2]}`)]);
  const medals=['🥇','🥈','🥉'];
  ranked.forEach((u,i)=>{
    const r=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:'1px solid var(--mist)'}});
    r.appendChild(el('span',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,color:'var(--gold)',width:'24px'}},medals[i]||(i+1)+''));
    r.appendChild(el('span',{style:{fontSize:'20px'}},u.emoji));
    const inf=el('div',{style:{flex:1}});
    inf.appendChild(el('div',{style:{fontWeight:700,fontSize:'14px'}},u.name));
    inf.appendChild(el('div',{style:{fontSize:'11px',color:'var(--clay)'}},`${u.tasks} משימות · ${u.hrs.toFixed(1)} שעות`));
    inf.appendChild(pbar(u.tasks/Math.max(totalDone,1)*100,u.color,4));
    r.appendChild(inf);
    r.appendChild(el('div',{style:{textAlign:'center',background:'rgba(232,184,75,.1)',borderRadius:'8px',padding:'4px 8px'}},[el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,color:'var(--gold)'}},u.pts),el('div',{style:{fontSize:'9px',color:'var(--clay)'}},'\u2605')]));
    wc.appendChild(r);
  });
  main.appendChild(wc);

  // Export button for admin
  if(ME.role==='מנהל'){
    main.appendChild(btn('📥 ייצא נתונים (JSON)','var(--earth)',()=>{
      const data=JSON.stringify(DB,null,2);
      const blob=new Blob([data],{type:'application/json'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=`shirat-haadama-${tdk()}.json`;
      a.click();
      toast('קובץ הורד ✓');
    },{width:'100%',marginTop:'12px',fontSize:'13px'}));
  }
}

function rAdmin(main){
  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,marginBottom:'12px'}},'⚙️ ניהול'));
  DB.users.forEach(user=>{
    const uc=el('div',{style:{background:'var(--white)',borderRadius:'10px',padding:'12px',marginBottom:'8px',boxShadow:'0 2px 12px rgba(26,18,5,.12)',display:'flex',alignItems:'center',gap:'10px'}});
    uc.appendChild(el('div',{style:{width:'38px',height:'38px',borderRadius:'50%',background:user.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}},user.emoji));
    const ui=el('div',{style:{flex:1}});
    ui.appendChild(el('div',{style:{fontWeight:700,fontSize:'14px'}},user.name));
    ui.appendChild(el('div',{style:{fontSize:'11px',color:user.color,fontWeight:600}},user.role));
    ui.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)'}},`${user.email} · ${gp(user.id)}\u2605`));
    uc.appendChild(ui);
    const acts=el('div',{style:{display:'flex',flexDirection:'column',gap:'4px'}});
    const rb=el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'6px',padding:'4px 9px',fontSize:'10px',fontWeight:600,cursor:'pointer',color:'var(--soil)',fontFamily:'inherit'}},user.role==='מנהל'?'→ עובד':'→ מנהל');
    rb.onclick=()=>{user.role=user.role==='מנהל'?'עובד':'מנהל';save();toast('תפקיד שונה ✓');renderTab();};
    acts.appendChild(rb);
    if(user.id!==ME.id){
      const db2=el('button',{style:{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:'16px'}},'🗑');
      db2.onclick=()=>{if(!confirm('למחוק?'))return;DB.users=DB.users.filter(u=>u.id!==user.id);save();toast('נמחק');renderTab();};
      acts.appendChild(db2);
    }
    uc.appendChild(acts);main.appendChild(uc);
  });

  const ac=card([
    el('div',{className:'card-t'},'➕ הוסף עובד חדש'),
    el('div',{style:{fontSize:'12px',color:'var(--clay)',marginBottom:'10px',background:'var(--mist)',borderRadius:'7px',padding:'8px 10px'}},'רק מנהל יכול ליצור חשבונות חדשים')
  ]);
  const ni=finp({placeholder:'שם מלא'});
  const ei=finp({type:'email',placeholder:'email@sheirat.com'});
  const pi=finp({type:'password',placeholder:'לפחות 4 תווים'});
  const rl=fsel([['עובד','עובד'],['מנהל','מנהל']],'עובד');
  let newE=EMOJIS[0];
  const epg=el('div',{className:'ep-grid'});
  EMOJIS.forEach((e,i)=>{
    const s=el('span',{className:'ep-item'+(i===0?' sel':'')},e);
    s.onclick=()=>{epg.querySelectorAll('.ep-item').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');newE=e;};
    epg.appendChild(s);
  });
  const sv2=btn('✓ הוסף עובד','var(--red)',async ()=>{
    if(!ni.value.trim()||!ei.value||!pi.value){toast('מלא את כל השדות');return;}
    if(DB.users.find(u=>u.email===ei.value.toLowerCase())){toast('מייל כבר קיים');return;}
    if(pi.value.length<4){toast('סיסמה קצרה');return;}
    const u={id:'u'+Date.now(),name:ni.value.trim(),email:ei.value.toLowerCase(),pass:pi.value,role:rl.value,emoji:newE,color:COLS[DB.users.length%COLS.length]};
    DB.users.push(u);
    save();
    const cc=el('div',{style:{background:'#e8f5e4',border:'1px solid rgba(106,154,90,.4)',borderRadius:'12px',padding:'14px',marginBottom:'10px'}});
    cc.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'14px',fontWeight:900,color:'var(--sage)',marginBottom:'8px'}},'✅ עובד חדש נוצר!'));
    cc.appendChild(el('div',{style:{background:'var(--white)',borderRadius:'8px',padding:'12px',fontFamily:'monospace',fontSize:'13px',lineHeight:2}},`🌾 שירת האדמה\n👤 ${u.name}\n📧 ${u.email}\n🔑 ${u.pass}`));
    const cb2=btn('סגור','var(--mist)',()=>cc.remove(),{color:'var(--soil)',width:'100%',marginTop:'8px',fontSize:'12px'});
    cc.appendChild(cb2);ac.before(cc);
    ni.value='';ei.value='';pi.value='';
    toast(`${u.name} נוסף/ה ✓`);renderTab();
  },{width:'100%',padding:'12px',marginTop:'9px'});
  ac.appendChild(el('div',{className:'flab'},'שם'));ac.appendChild(ni);
  ac.appendChild(el('div',{className:'flab'},'מייל'));ac.appendChild(ei);
  ac.appendChild(el('div',{className:'flab'},'סיסמה'));ac.appendChild(pi);
  ac.appendChild(el('div',{className:'flab'},'תפקיד'));ac.appendChild(rl);
  ac.appendChild(el('div',{className:'flab'},'אמוג׳י'));ac.appendChild(epg);
  ac.appendChild(sv2);
  main.appendChild(ac);
}

// START
async function init(){
  showLoading();
  const ok = await loadFromFirebase();
  if(!ok){
    document.getElementById('root').innerHTML='<div style="padding:20px;text-align:center;color:red">שגיאה בחיבור ל-Firebase. בדוק חיבור אינטרנט.</div>';
    return;
  }
  // If no users at all, create first admin
  if(DB.users.length===0){
    renderFirstAdmin();
  } else {
    renderLogin();
  }
}

function renderFirstAdmin(){
  const root=document.getElementById('root');root.innerHTML='';
  let selE=EMOJIS[0];
  const nm=finp({placeholder:'שם מנהל',className:'inp'});
  const em2=finp({type:'email',placeholder:'your@email.com',className:'inp'});
  const pw2=finp({type:'password',placeholder:'לפחות 4 תווים',className:'inp'});
  const err=el('div',{className:'err'});
  const epg=el('div',{className:'ep-grid'});
  EMOJIS.forEach((e,i)=>{
    const s=el('span',{className:'ep-item'+(i===0?' sel':'')},e);
    s.addEventListener('click',()=>{epg.querySelectorAll('.ep-item').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');selE=e;});
    epg.appendChild(s);
  });
  const reg=async ()=>{
    const name=nm.value.trim(),email=em2.value.trim().toLowerCase(),pass=pw2.value;
    if(!name){err.textContent='חסר שם';return;}
    if(!email.includes('@')){err.textContent='מייל לא תקין';return;}
    if(pass.length<4){err.textContent='סיסמה קצרה';return;}
    const u={id:'u'+Date.now(),name,email,pass,emoji:selE,color:COLS[0],role:'מנהל'};
    DB.users.push(u);
    await setDoc(DOC, DB);
    localStorage.setItem('sheirat_creds',JSON.stringify({email,pass}));
    ME=u;renderApp();
  };
  root.appendChild(el('div',{className:'auth'},[el('div',{className:'auth-box'},[
    el('div',{className:'auth-logo'},[el('div',{style:{fontSize:'48px',marginBottom:'6px'}},'🌱'),el('h1',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900}},'יצירת חשבון מנהל'),el('p',{style:{color:'var(--clay)',fontSize:'12px',marginTop:'3px'}},'הגדרה ראשונית')]),
    el('label',{className:'lbl'},'שמך'),nm,
    el('label',{className:'lbl'},'מייל'),em2,
    el('label',{className:'lbl'},'סיסמה'),pw2,
    el('label',{className:'lbl'},'אמוג׳י'),epg,err,
    el('button',{className:'btn-main',onclick:reg},'צור חשבון מנהל ←'),
  ])]));
}

init();
</script>
