*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:hidden;max-width:100vw;width:100%;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Heebo',sans-serif;background:var(--cream);color:var(--earth);direction:rtl;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior-y:contain;touch-action:pan-y}
/* Safe areas for iPhone notch and home bar */
.app-hdr{padding-top:calc(12px + env(safe-area-inset-top))!important}
.app-main{padding-bottom:calc(80px + env(safe-area-inset-bottom))!important;padding-left:calc(12px + env(safe-area-inset-left));padding-right:calc(12px + env(safe-area-inset-right))}
/* Prevent text and elements from overflowing */
img,svg,video{max-width:100%;height:auto}
input,textarea,select,button{max-width:100%;font-family:inherit}
/* Better tap targets on mobile */
button{min-height:38px;touch-action:manipulation}
input,select,textarea{font-size:16px!important;touch-action:manipulation}
/* Smoother scrolling */
*{-webkit-overflow-scrolling:touch}
/* Prevent pull-to-refresh on PWA */
@media (display-mode:standalone){
  body{overscroll-behavior-y:none}
}
:root{--earth:#1a1205;--soil:#2d1a08;--gold:#e8b84b;--sage:#6a9a5a;--cream:#f5edd8;--parch:#e8d8b8;--mist:#ede0c4;--red:#C85A3A;--white:#fdfaf3;--clay:#6b3d1a;--straw:#b8832a}
body{font-family:'Heebo',sans-serif;background:var(--cream);color:var(--earth);direction:rtl}
button{cursor:pointer;font-family:inherit;border:none}
input,select,textarea{font-family:inherit;direction:rtl}
input[type=email],input[type=password],input[type=time],input[type=date],input[type=number]{direction:ltr;text-align:left}
.auth{min-height:100vh;background:linear-gradient(160deg,var(--earth),#1e1008 40%,#0e1a0a);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:rgba(253,250,243,.97);border-radius:20px;padding:32px;width:100%;max-width:360px;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:22px}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--clay);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.07em}
.inp{width:100%;padding:11px 13px;border:1.5px solid var(--parch);border-radius:9px;font-size:14px;outline:none;background:var(--white)}
.inp:focus{border-color:var(--sage)}
.err{color:var(--red);font-size:12px;margin-top:5px;min-height:18px}
.btn-main{display:block;width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--red),#a84a2f);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px}
.auth-sw{text-align:center;margin-top:12px;font-size:12px;color:var(--clay)}
.auth-sw a{color:var(--red);cursor:pointer;font-weight:700}
.ep-grid{display:flex;gap:7px;flex-wrap:wrap;margin:5px 0}
.ep-item{font-size:22px;cursor:pointer;padding:4px;border-radius:7px}
.ep-item.sel{background:rgba(106,154,90,.2)}
.app-hdr{background:linear-gradient(135deg,var(--earth),var(--soil));padding:12px 14px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;max-width:720px;margin:0 auto;padding-bottom:10px}
.brand{color:var(--gold);font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:900}
.u-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:18px;padding:4px 10px 4px 7px;cursor:pointer;border:1px solid rgba(232,184,75,.2)}
.u-pill .nm{color:rgba(245,237,216,.85);font-size:12px;font-weight:600}
.u-pill .pts{color:var(--gold);font-size:10px;font-weight:700;background:rgba(232,184,75,.15);padding:1px 6px;border-radius:10px}
.prog-w{max-width:720px;margin:0 auto;padding-bottom:8px}
.prog-bg{height:2px;background:rgba(255,255,255,.08);border-radius:2px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--sage),var(--gold));transition:width .6s}
.tabs-w{max-width:720px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs-w::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 10px;background:none;border:none;color:rgba(245,237,216,.45);font-weight:500;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab-btn.on{color:var(--gold);font-weight:700;border-bottom-color:var(--gold)}
.app-main{max-width:720px;margin:0 auto;padding:14px 12px 80px}
.card{background:var(--white);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,18,5,.12);border:1px solid rgba(232,216,184,.4)}

.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chip{padding:4px 10px;border-radius:16px;border:none;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.flab{display:block;font-size:10px;font-weight:700;color:var(--sage);margin:8px 0 3px;text-transform:uppercase}
.finp{width:100%;padding:9px 12px;border:1.5px solid var(--parch);border-radius:8px;font-size:13px;outline:none;background:var(--white);margin-bottom:2px}
.finp:focus{border-color:var(--sage)}
.finp[type=date],.finp[type=time],.finp[type=number]{direction:ltr;text-align:left}
textarea.finp{resize:vertical;line-height:1.5}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-g{background:var(--sage);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-r{background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-lt{background:var(--mist);color:var(--soil);border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer}
.w100{width:100%;padding:12px;font-size:14px;display:block}
.pbar{height:5px;background:var(--mist);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .6s}
.t-row{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid var(--mist);cursor:pointer}
.t-row:last-child{border-bottom:none}
.pts-bdg{font-size:10px;color:var(--gold);font-weight:800;background:rgba(232,184,75,.12);padding:2px 7px;border-radius:10px;border:1px solid rgba(232,184,75,.25)}
.inv-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--mist)}
.inv-row:last-child{border-bottom:none}
.h-card{background:var(--white);border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,18,5,.12)}
.h-head{padding:13px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--mist)}
.h-body{padding:10px 14px}
.h-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--mist);font-size:12px}
.h-row:last-child{border-bottom:none}
.score-card{background:linear-gradient(135deg,var(--earth),var(--soil),#1a2a10);border-radius:12px;padding:18px;margin-bottom:10px;border:1px solid rgba(232,184,75,.25)}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.lb-row:last-child{border-bottom:none}
.act-item{background:var(--white);border-radius:10px;padding:12px;margin-bottom:7px;box-shadow:0 2px 12px rgba(26,18,5,.12);display:flex;gap:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--white);border-radius:16px;padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--earth);color:var(--gold);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;border:1px solid rgba(232,184,75,.3);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.sec-t{font-weight:700;font-size:13px;color:var(--earth);margin:13px 0 7px}
.empty{text-align:center;color:#bbb;padding:22px;font-size:13px}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--earth),#1e1008 40%,#0e1a0a);color:var(--gold)}
.spinner{width:40px;height:40px;border:3px solid rgba(232,184,75,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);position:fixed;bottom:8px;left:8px;opacity:.6;transition:opacity .3s}
.sync-dot.syncing{background:var(--straw);opacity:1;animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>

function setSyncing(v){

}

async function loadFromFirebase(){
  try{
    const snap = await getDoc(DOC);
    if(snap.exists()){
      const data = snap.data();
      DB = {...DEFAULT_DATA,...data};
    } else {
      // First time - save defaults
      await setDoc(DOC, DB);
    }
    return true;
  }catch(e){
    console.error('Firebase load error:',e);
    return false;
  }
}

function save(){
  if(saveTimeout) clearTimeout(saveTimeout);
  setSyncing(true);
  saveTimeout = setTimeout(async ()=>{
    try{
      await setDoc(DOC, DB);
    }catch(e){
      console.error('Firebase save error:',e);
      toast('שגיאת שמירה — בדוק חיבור');

  }, 800);
}

function el(tag,attrs={},kids=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else if(k==='value')e.value=v;
    else if(k!=='key')e.setAttribute(k,v);
  });
  (Array.isArray(kids)?kids.flat():[kids]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}

// Generate ICS file for adding task to phone calendar with reminder
function addTaskToCalendar(task){
  if(!task.date){toast('חסר תאריך');return;}
  const uid='shirat-'+(task.id||Date.now())+'@shirat-haadama';
  const stamp=new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  let startLine,endLine,alarm;
  if(task.time){
    // Scheduled event with start time (1-hour default duration)
    const [hh,mm]=task.time.split(':').map(Number);
    const startDt=new Date(task.date+'T00:00:00');
    startDt.setHours(hh,mm,0,0);
    const endDt=new Date(startDt.getTime()+60*60000); // 1 hour
    const fmt=dt=>dt.getFullYear()+String(dt.getMonth()+1).padStart(2,'0')+String(dt.getDate()).padStart(2,'0')+'T'+String(dt.getHours()).padStart(2,'0')+String(dt.getMinutes()).padStart(2,'0')+'00';
    startLine='DTSTART:'+fmt(startDt);
    endLine='DTEND:'+fmt(endDt);
    alarm='TRIGGER:-PT30M'; // 30 min before
  } else {
    // All-day event
    const d=task.date.replace(/-/g,'');
    const dObj=new Date(task.date);dObj.setDate(dObj.getDate()+1);
    const dEnd=dObj.getFullYear()+String(dObj.getMonth()+1).padStart(2,'0')+String(dObj.getDate()).padStart(2,'0');
    startLine='DTSTART;VALUE=DATE:'+d;
    endLine='DTEND;VALUE=DATE:'+dEnd;
    alarm='TRIGGER:-PT9H'; // morning reminder
  }
  const ics=[
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Shirat-haadama//HE','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT','UID:'+uid,'DTSTAMP:'+stamp,
    startLine,endLine,
    'SUMMARY:🌾 '+task.title,
    'DESCRIPTION:משימה משירת האדמה',
    'BEGIN:VALARM',alarm,'ACTION:DISPLAY','DESCRIPTION:'+task.title,'END:VALARM',
    'END:VEVENT','END:VCALENDAR',
  ].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=(task.title||'task').slice(0,20).replace(/[^\w\u0590-\u05FF]/g,'_')+'.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('📅 נפתח - אשר הוספה ליומן',3500);
}

// Get summary of activity in the past N days
function getActivitySummary(daysBack){
  const now=Date.now();
  const cutoff=now-daysBack*24*60*60*1000;
  const recentEvents=(DB.actLog||[]).filter(e=>e.ts>=cutoff);
  const tasksByUser={};
  recentEvents.filter(e=>e.type==='done').forEach(e=>{
    if(!tasksByUser[e.userName])tasksByUser[e.userName]=0;
    tasksByUser[e.userName]++;
  });
  // Hours in period
  const pfx={};
  for(let i=0;i<daysBack;i++){
    const d=new Date(now-i*24*60*60*1000);
    pfx[`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`]=true;
  }
  const hoursByUser={};
  (DB.hoursLog||[]).filter(h=>pfx[h.date]).forEach(h=>{
    const u=gu(h.uid);
    if(!u)return;
    if(!hoursByUser[u.name])hoursByUser[u.name]=0;
    hoursByUser[u.name]+=ch(h.start,h.end);
  });
  // Tasks done count
  const tasksCount=recentEvents.filter(e=>e.type==='done').length;
  // Recent journal entries
  const journals=Object.values(DB.journal||{}).filter(j=>{
    const ts=j.ts||0;
    return ts>=cutoff;
  });
  return {tasksByUser,hoursByUser,tasksCount,journalCount:journals.length,journals,events:recentEvents};
}

  const ctx=buildFarmContext();
  const fullPrompt=`${ctx}\n\n---\n\n## הבקשה שלי:\n${prompt}`;
  // Copy to clipboard first
  if(navigator.clipboard){
    navigator.clipboard.writeText(fullPrompt).then(()=>{
      toast('📋 הטקסט הועתק - נפתח '+(service==='chatgpt'?'ChatGPT':'Claude')+'...',3500);

  }
  // Open the service
  setTimeout(()=>{
    const url=service==='chatgpt'?'https://chat.openai.com/':'https://claude.ai/';
    window.open(url,'_blank');
  },800);
}

function rTasks(main){
  const today=tdk();const todayComps=DB.comps[today]||{};
  // Filter tabs

  const filterCard=card([
    el('div',{className:'chips'},[
      chip('הכל',STAB==='all','var(--earth)',()=>{STAB='all';renderTab();}),
      chip('שלי',STAB==='mine','var(--red)',()=>{STAB='mine';renderTab();}),
      ...Object.entries(AREAS).map(([k,v])=>chip(v.l,STAB===k,v.c,()=>{STAB=k;renderTab();})),
    ])
  ]);
  main.appendChild(filterCard);

  // Progress
  const todayProg=DB.rT.length+DB.oT.filter(t=>!t.done).length;
  const doneCount=Object.keys(todayComps).length;
  main.appendChild(card([
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},[
      el('div',{style:{fontWeight:700}},`היום — ${new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'})}`),
      el('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--sage)'}},`${doneCount}/${todayProg} ✓`)
    ]),
    pbar(Math.round(doneCount/Math.max(todayProg,1)*100),'var(--sage)',8)
  ]));

  // Get tasks based on filter
  let recurringTasks=[...DB.rT];
  let onceTasks=[...DB.oT.filter(t=>!t.done)];
  if(STAB==='mine'){
    recurringTasks=recurringTasks.filter(t=>todayComps[t.id]===ME.id||t.uid===ME.id);
    onceTasks=onceTasks.filter(t=>todayComps[t.id]===ME.id||t.uid===ME.id);
  } else if(STAB!=='all'){
    recurringTasks=recurringTasks.filter(t=>t.area===STAB);
    onceTasks=onceTasks.filter(t=>t.area===STAB);
  }

  // Group recurring by area
  const areaGroups={};
  recurringTasks.forEach(t=>{
    if(!areaGroups[t.area])areaGroups[t.area]=[];
    areaGroups[t.area].push(t);
  });

  Object.entries(areaGroups).forEach(([areaKey,tasks])=>{
    const area=AREAS[areaKey];
    if(!area||!tasks.length)return;
    const pending=tasks.filter(t=>!todayComps[t.id]);
    const done=tasks.filter(t=>todayComps[t.id]);
    const areaCard=card([
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'14px',fontWeight:700,color:area.c}},area.l),
        el('span',{style:{fontSize:'11px',color:done.length===tasks.length?'var(--sage)':'var(--clay)',fontWeight:600}},`${done.length}/${tasks.length}`)
      ]),
      ...pending.map(t=>mkRow(t,false,todayComps)),
      ...done.map(t=>mkRow(t,true,todayComps)),
    ]);
    main.appendChild(areaCard);
  });

  // One-time tasks
  if(onceTasks.length){
    main.appendChild(card([
      el('div',{className:'card-t'},'📌 משימות חד-פעמיות'),
      ...onceTasks.map(t=>mkRow(t,todayComps[t.id]||t.done,todayComps))
    ]));
  }

  if(!recurringTasks.length&&!onceTasks.length) main.appendChild(empty('אין משימות'));

  // Completed today
  const allDone=Object.entries(todayComps);
  if(allDone.length&&STAB==='all'){
    main.appendChild(card([
      el('div',{className:'card-t',style:{color:'var(--sage)'}},'✅ הושלמו היום'),
      ...allDone.map(([tid])=>{
        const t=at().find(x=>x.id===tid);
        return t?mkRow(t,true,todayComps):'';
      }).filter(Boolean)
    ]));
  }

  // Manager: add tasks
  if(ME.role==='מנהל'){
    // Add recurring task
    const rc=card([el('div',{className:'card-t'},'➕ הוסף משימה קבועה')]);
    const rt=finp({placeholder:'תיאור המשימה'});
    let rArea='animals',rPri='medium',rRec='daily',rUid='';
    rc.appendChild(el('div',{className:'flab'},'כותרת'));rc.appendChild(rt);
    rc.appendChild(el('div',{className:'flab'},'אזור'));
    rc.appendChild(fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),'animals',v=>{rArea=v;}));
    rc.appendChild(el('div',{className:'flab'},'עדיפות'));
    rc.appendChild(fsel(Object.entries(PRI).map(([k,v])=>[k,v.l]),'medium',v=>{rPri=v;}));
    rc.appendChild(el('div',{className:'flab'},'תדירות'));
    rc.appendChild(fsel([['daily','יומי'],['weekly','שבועי'],['monthly','חודשי']],'daily',v=>{rRec=v;}));
    rc.appendChild(el('div',{className:'flab'},'משויך ל'));
    rc.appendChild(fsel([['','ללא'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],'',v=>{rUid=v;}));
    rc.appendChild(btn('הוסף משימה קבועה','var(--sage)',()=>{
      const title=rt.value.trim();
      if(!title){toast('חסרה כותרת');return;}
      const t={id:'r'+Date.now(),title,area:rArea,pri:rPri,rec:rRec,uid:rUid,createdBy:ME.id};
      // If maintenance - also add to equip view
      DB.rT.push(t);
      save();toast('משימה קבועה נוספה ✓');renderTab();
    },{width:'100%',marginTop:'8px'}));
    main.appendChild(rc);

    // Add one-time task
    const oc=card([el('div',{className:'card-t'},'➕ הוסף משימה חד-פעמית')]);
    const ot=finp({placeholder:'תיאור המשימה'});
    let oArea='animals',oPri='medium',oUid='',oDue='';
    oc.appendChild(el('div',{className:'flab'},'כותרת'));oc.appendChild(ot);
    oc.appendChild(el('div',{className:'flab'},'אזור'));
    oc.appendChild(fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),'animals',v=>{oArea=v;}));
    oc.appendChild(el('div',{className:'flab'},'עדיפות'));
    oc.appendChild(fsel(Object.entries(PRI).map(([k,v])=>[k,v.l]),'medium',v=>{oPri=v;}));
    oc.appendChild(el('div',{className:'flab'},'משויך ל'));
    oc.appendChild(fsel([['','ללא'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],'',v=>{oUid=v;}));
    oc.appendChild(el('div',{className:'flab'},'תאריך יעד'));
    const odInput=finp({type:'date'});oc.appendChild(odInput);
    oc.appendChild(btn('הוסף משימה','var(--red)',()=>{
      const title=ot.value.trim();
      if(!title){toast('חסרה כותרת');return;}
      const t={id:'o'+Date.now(),title,area:oArea,pri:oPri,uid:oUid,due:odInput.value||'',done:false,doneAt:null,createdBy:ME.id};
      if(oArea==='maint'){
        // Add as maintenance task and switch tab
        DB.oT.push(t);save();toast('נוסף לתחזוקה ✓');TAB='maint';renderTab();return;
      }
      DB.oT.push(t);save();toast('משימה נוספה ✓');renderTab();
    },{width:'100%',marginTop:'8px'}));
    main.appendChild(oc);
  }
}

function manageSupplierInv(sup){
  const bg=el('div',{className:'modal-bg'});

      listEl.innerHTML='';

        const row=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px',borderRadius:'7px',cursor:'pointer',background:isLinked?'rgba(106,154,90,.08)':'transparent',marginBottom:'2px',transition:'background .15s'}});

function rMaintenance(main){
  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,marginBottom:'12px'}},'🔧 תחזוקת ציוד'));
  const today=tdk(); const todayComps=DB.comps[today]||{};

  // Alert banner for overdue/urgent maintenance tasks
  const now=new Date(); now.setHours(0,0,0,0);
  const urgent=DB.oT.filter(t=>t.area==='maint'&&!t.done&&t.scheduledDate&&new Date(t.scheduledDate+'T00:00:00')<=new Date(now.getTime()+3*24*60*60*1000));
  if(urgent.length){
    main.appendChild(el('div',{style:{background:'#fff0ee',border:'1px solid #C85A3A55',borderRadius:'10px',padding:'10px 14px',marginBottom:'10px',display:'flex',gap:'8px',alignItems:'flex-start'}},[
      el('span',{style:{fontSize:'18px'}},'🚨'),
      el('div',{style:{flex:1}},[
        el('div',{style:{fontWeight:700,fontSize:'13px',color:'var(--red)',marginBottom:'4px'}},'התראה — '+urgent.length+' משימות תחזוקה דחופות'),
        ...urgent.map(t=>{
          const d=new Date(t.scheduledDate+'T00:00:00');
          const diff=Math.ceil((d-now)/(1000*60*60*24));
          const label=diff<0?'באיחור '+Math.abs(diff)+' ימים':diff===0?'היום!':'עוד '+diff+' ימים';
          return el('div',{style:{fontSize:'12px',color:'var(--clay)'}},'• '+t.title+' — '+label);
        })
      ])
    ]));
  }

  const maintTasks=DB.oT.filter(t=>t.area==='maint'&&!t.done);
  if(maintTasks.length){
    const completedToday=maintTasks.filter(t=>todayComps[t.id]);
    const pending=maintTasks.filter(t=>!todayComps[t.id]);
    const c=card([
      el('div',{className:'card-t',style:{color:'var(--straw)'}},'📋 משימות תחזוקה פתוחות'),
      ...pending.map(t=>{
        const d=t.scheduledDate?new Date(t.scheduledDate+'T00:00:00'):null;
        const diff=d?Math.ceil((d-now)/(1000*60*60*24)):null;
        const isUrgent=diff!==null&&diff<=3;
        const r=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'9px 0',borderBottom:'1px solid var(--mist)',background:isUrgent?'rgba(200,90,58,.04)':'transparent'}});
        const cb=el('div',{style:{width:'20px',height:'20px',border:'2px solid var(--parch)',borderRadius:'5px',flexShrink:0,cursor:'pointer'}});
        cb.onclick=()=>toggle(t.id); r.appendChild(cb);
        const info=el('div',{style:{flex:1}});
        info.appendChild(el('div',{style:{fontWeight:600,fontSize:'13px'}},t.title));
        const meta=[];
        const u=t.uid?gu(t.uid):null;
        if(u)meta.push(u.emoji+' '+u.name);
        if(d){
          const label=diff<0?'באיחור '+Math.abs(diff)+' ימים':diff===0?'היום!':diff<=3?'עוד '+diff+' ימים':fd(t.scheduledDate);
          meta.push((isUrgent?'⚠️ ':'')+label);
        }
        if(meta.length)info.appendChild(el('div',{style:{fontSize:'10px',color:isUrgent?'var(--red)':'var(--clay)',marginTop:'2px'}},meta.join(' · ')));
        r.appendChild(info);

// Build a single user card with hours summary, edit/delete options
function buildUserCard(u,mPrefix,today,isAdmin,isMe){
  const todayDone=Object.entries(DB.comps[today]||{}).filter(([,v])=>v===u.id).length;
  const myLogs=(DB.hoursLog||[]).filter(h=>h.uid===u.id&&h.date.startsWith(mPrefix));
  const monthHrs=myLogs.reduce((s,h)=>s+ch(h.start,h.end),0);
  const uniqueDays=new Set(myLogs.map(h=>h.date)).size;
  const pct=Math.min(monthHrs/160*100,100);
  const isManager=u.role==='\u05de\u05e0\u05d4\u05dc';

  const c=el('div',{className:'card',style:{padding:'14px',marginBottom:'10px',border:isMe?'2px solid var(--sage)':isManager?'1px solid rgba(200,90,58,.2)':'1px solid var(--mist)',background:isMe?'linear-gradient(135deg,rgba(106,154,90,.05),rgba(232,184,75,.03))':'var(--white)'}});

  // TOP ROW: avatar, name, role badge, edit/delete
  c.appendChild(el('div',{style:{display:'flex',gap:'12px',alignItems:'center',marginBottom:'10px'}},[
    el('div',{style:{width:'48px',height:'48px',borderRadius:'50%',background:u.color+'25',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px',flexShrink:0,border:isMe?'2px solid var(--sage)':'2px solid transparent'}},u.emoji),
    el('div',{style:{flex:1,minWidth:0}},[
      el('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'15px',color:'var(--earth)'}},u.name),
        isMe?el('span',{style:{fontSize:'9px',background:'var(--sage)',color:'#fff',padding:'1px 6px',borderRadius:'8px',fontWeight:700}},'אתה'):'',
      ]),
      el('div',{style:{display:'flex',gap:'5px',alignItems:'center',marginTop:'3px',flexWrap:'wrap'}},[
        el('span',{style:{background:isManager?'rgba(200,90,58,.12)':'rgba(106,154,90,.12)',color:isManager?'var(--red)':'var(--sage)',padding:'2px 7px',borderRadius:'8px',fontSize:'10px',fontWeight:700}},isManager?'👑 מנהל':'👤 עובד'),
        el('span',{style:{fontSize:'10px',color:'var(--clay)'}},u.email),
      ]),
    ]),
    // Hours summary on right
    el('div',{style:{textAlign:'center',minWidth:'62px'}},[
      el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,color:pct>=100?'var(--sage)':pct>50?'var(--straw)':'var(--clay)',lineHeight:'1'}},monthHrs.toFixed(1)),
      el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'2px'}},"ש' החודש"),
    ]),
  ]));

  // STATS ROW: days, tasks
  c.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'6px',marginBottom:'10px'}},[
    statTile('📅',uniqueDays,'ימי עבודה החודש'),
    statTile('✅',todayDone,'משימות בוצעו היום'),
  ]));

  // Progress bar
  c.appendChild(pbar(pct,pct>=100?'var(--sage)':pct>50?'var(--straw)':'var(--red)',6));
  c.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'3px',textAlign:'left'}},monthHrs.toFixed(1)+'/160 שעות'));

  // Recent hours (last 3)
  if(myLogs.length>0){
    const recent=el('div',{style:{marginTop:'10px',borderTop:'1px solid var(--mist)',paddingTop:'8px'}});
    recent.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)',fontWeight:600,marginBottom:'4px'}},'רשומות אחרונות:'));
    myLogs.slice(-3).reverse().forEach(h=>{
      recent.appendChild(el('div',{style:{display:'flex',fontSize:'11px',color:'var(--clay)',padding:'3px 0',gap:'8px',alignItems:'center'}},[
        el('span',{style:{minWidth:'50px',fontWeight:600}},fd(h.date)),
        el('span',{style:{minWidth:'78px'}},h.start+'–'+h.end),
        el('span',{style:{fontWeight:600,color:'var(--sage)'}},ch(h.start,h.end).toFixed(1)+"ש'"),
        h.note?el('span',{style:{fontStyle:'italic',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},h.note):el('span',{style:{flex:1}}),
        (isAdmin||h.uid===ME.id)?el('button',{style:{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:'12px',padding:'2px'},onclick:()=>{if(confirm('למחוק רשומה זו?')){DB.hoursLog=DB.hoursLog.filter(x=>x.id!==h.id);al('hours-del','מחיקת שעות '+ch(h.start,h.end).toFixed(1)+'ש\'',fd(h.date)+' '+h.start+'-'+h.end);save();renderTab();}}},'🗑'):'',
      ]));
    });

  // Action buttons row
  const actions=el('div',{style:{display:'flex',gap:'6px',marginTop:'10px',flexWrap:'wrap'}});

  if(isMe||isAdmin){

  }
  // Manager actions
  if(isAdmin){
    actions.appendChild(el('button',{style:{flex:'1',minWidth:'70px',background:'var(--mist)',border:'none',borderRadius:'7px',padding:'7px 10px',fontSize:'11px',cursor:'pointer',fontWeight:600,color:'var(--earth)',fontFamily:'inherit'},onclick:()=>editWorker(u)},'✏️ ערוך'));
    // Toggle role (not on self)
    if(u.id!==ME.id){
      actions.appendChild(el('button',{style:{flex:'1',minWidth:'70px',background:isManager?'rgba(106,154,90,.12)':'rgba(200,90,58,.12)',color:isManager?'var(--sage)':'var(--red)',border:'1px solid '+(isManager?'rgba(106,154,90,.3)':'rgba(200,90,58,.3)'),borderRadius:'7px',padding:'7px 10px',fontSize:'11px',cursor:'pointer',fontWeight:600,fontFamily:'inherit'},onclick:()=>{
        const newRole=isManager?'\u05e2\u05d5\u05d1\u05d3':'\u05de\u05e0\u05d4\u05dc';
        if(!confirm('להפוך את '+u.name+' ל-'+newRole+'?'))return;
        u.role=newRole;
        al('user-role','שינוי תפקיד: '+u.name,'→ '+newRole);
        save();toast('הוחלף ל-'+newRole+' \u2713');renderTab();
      }},isManager?'→ עובד':'→ מנהל'));
      // Delete button
      actions.appendChild(el('button',{style:{background:'rgba(200,90,58,.1)',color:'var(--red)',border:'1px solid rgba(200,90,58,.3)',borderRadius:'7px',padding:'7px 10px',fontSize:'11px',cursor:'pointer',fontWeight:600,fontFamily:'inherit'},onclick:()=>deleteWorker(u)},'🗑'));
    }
  }
  if(actions.children.length>0)c.appendChild(actions);

  return c;
}

// Show full hours detail in modal
function showUserHoursDetail(uid){
  const u=gu(uid);if(!u)return;
  const isAdmin=ME.role==='\u05de\u05e0\u05d4\u05dc';
  if(uid!==ME.id&&!isAdmin){toast('אין הרשאה');return;}

  const bg=el('div',{className:'modal-bg',onclick:e=>{if(e.target===e.currentTarget)bg.remove();}});
  const m=el('div',{className:'modal',style:{maxWidth:'520px'}});

  // Header
  m.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px',paddingBottom:'12px',borderBottom:'1px solid var(--mist)'}},[
    el('div',{style:{width:'52px',height:'52px',borderRadius:'50%',background:u.color+'25',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px'}},u.emoji),
    el('div',{style:{flex:1}},[
      el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'18px',fontWeight:900,color:'var(--earth)'}},u.name),
      el('div',{style:{fontSize:'11px',color:'var(--clay)'}},'יומן שעות עבודה'),
    ]),
    el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'50%',width:'30px',height:'30px',fontSize:'16px',cursor:'pointer'},onclick:()=>bg.remove()},'✕'),
  ]));

  // Month selector
  let viewYear=HY,viewMonth=HM;
  const monthLabel=el('div',{style:{textAlign:'center',flex:1,fontWeight:700,fontSize:'13px'}},MONTHS[viewMonth]+' '+viewYear);
  const content=el('div',{});
  const renderContent=()=>{
    content.innerHTML='';
    const pfx=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
    const logs=(DB.hoursLog||[]).filter(h=>h.uid===uid&&h.date.startsWith(pfx)).sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
    const monthHrs=logs.reduce((s,h)=>s+ch(h.start,h.end),0);
    const days=new Set(logs.map(h=>h.date)).size;

    // Stats summary
    content.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginBottom:'14px'}},[
      el('div',{style:{background:'linear-gradient(135deg,var(--earth),var(--soil))',color:'var(--gold)',borderRadius:'10px',padding:'10px 6px',textAlign:'center'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,lineHeight:'1'}},monthHrs.toFixed(1)),
        el('div',{style:{fontSize:'10px',opacity:.8,marginTop:'3px'}},'שעות'),
      ]),
      el('div',{style:{background:'var(--mist)',borderRadius:'10px',padding:'10px 6px',textAlign:'center'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,color:'var(--earth)',lineHeight:'1'}},days),
        el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'3px'}},'ימי עבודה'),
      ]),
      el('div',{style:{background:'var(--mist)',borderRadius:'10px',padding:'10px 6px',textAlign:'center'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,color:'var(--earth)',lineHeight:'1'}},days>0?(monthHrs/days).toFixed(1):'0'),
        el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'3px'}},'ממוצע יומי'),
      ]),
    ]));

    // Group by date
    if(logs.length===0){
      content.appendChild(el('div',{style:{textAlign:'center',color:'var(--clay)',padding:'30px',fontSize:'12px'}},'אין רשומות שעות בחודש זה'));
      return;
    }

    const byDate={};
    logs.forEach(h=>{if(!byDate[h.date])byDate[h.date]=[];byDate[h.date].push(h);});
    const sortedDates=Object.keys(byDate).sort().reverse();

    content.appendChild(el('div',{style:{fontWeight:700,fontSize:'12px',marginBottom:'6px',color:'var(--earth)'}},'📅 פירוט לפי ימים'));
    const listWrap=el('div',{style:{maxHeight:'350px',overflowY:'auto',background:'var(--mist)',borderRadius:'8px',padding:'6px'}});
    sortedDates.forEach(date=>{
      const dayLogs=byDate[date];
      const dayTotal=dayLogs.reduce((s,h)=>s+ch(h.start,h.end),0);
      const dateD=new Date(date+'T00:00:00');
      const weekdays=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

      const dayCard=el('div',{style:{background:'var(--white)',borderRadius:'7px',padding:'8px 10px',marginBottom:'5px',border:'1px solid rgba(232,216,184,.3)'}});
      dayCard.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},[
        el('div',{style:{fontWeight:700,fontSize:'12px',color:'var(--earth)'}},weekdays[dateD.getDay()]+', '+fd(date)),
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'15px',fontWeight:900,color:'var(--sage)'}},dayTotal.toFixed(1)+'ש\''),
      ]));
      dayLogs.forEach(h=>{
        dayCard.appendChild(el('div',{style:{display:'flex',gap:'8px',fontSize:'11px',color:'var(--clay)',padding:'3px 0',alignItems:'center',borderTop:dayLogs.indexOf(h)>0?'1px solid rgba(232,216,184,.2)':'none'}},[
          el('span',{style:{minWidth:'78px'}},h.start+'–'+h.end),
          el('span',{style:{fontWeight:600,color:'var(--earth)',minWidth:'42px'}},ch(h.start,h.end).toFixed(1)+'ש\''),
          h.note?el('span',{style:{fontStyle:'italic',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},'📝 '+h.note):el('span',{style:{flex:1}}),
          (isAdmin||h.uid===ME.id)?el('button',{style:{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:'12px'},onclick:()=>{
            if(confirm('למחוק רשומה זו?\n'+fd(h.date)+' '+h.start+'-'+h.end)){
              DB.hoursLog=DB.hoursLog.filter(x=>x.id!==h.id);
              al('hours-del','מחיקת שעות '+ch(h.start,h.end).toFixed(1)+'ש\'',fd(h.date)+' '+h.start+'-'+h.end+(h.uid!==ME.id?' (של '+gu(h.uid)?.name+')':''));
              save();renderContent();renderTab();
            }
          }},'🗑'):'',
        ]));
      });
      listWrap.appendChild(dayCard);
    });
    content.appendChild(listWrap);
  };

  const monthNav=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',background:'var(--mist)',borderRadius:'8px',padding:'4px 8px'}});
  monthNav.appendChild(el('button',{style:{background:'none',border:'none',padding:'5px 10px',cursor:'pointer',fontSize:'14px'},onclick:()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;renderContent();}},'◀'));
  monthNav.appendChild(monthLabel);
  monthNav.appendChild(el('button',{style:{background:'none',border:'none',padding:'5px 10px',cursor:'pointer',fontSize:'14px'},onclick:()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;renderContent();}},'▶'));
  m.appendChild(monthNav);
  m.appendChild(content);
  renderContent();

  bg.appendChild(m);
  document.body.appendChild(bg);
}

// Delete worker (admin only) - with safety
function deleteWorker(u){
  if(u.id===ME.id){toast('לא ניתן למחוק את עצמך');return;}
  // First confirmation
  const userHours=(DB.hoursLog||[]).filter(h=>h.uid===u.id).length;
  const userBonuses=bonusArr().filter(b=>b.uid===u.id).length;
  let userTasks=0;
  Object.values(DB.comps||{}).forEach(dc=>{Object.values(dc).forEach(by=>{if(by===u.id)userTasks++;});});

  const msg='⚠️ למחוק את '+u.name+'?\n\n'+
    'הנתונים שיימחקו:\n'+
    '• '+userHours+' רשומות שעות\n'+
    '• '+userBonuses+' בונוסים\n'+
    '\nנשמרים:\n'+
    '• '+userTasks+' משימות שביצע (נשארות ברישום, אך ללא קישור)\n\n'+
    'פעולה זו לא ניתנת לביטול!';
  if(!confirm(msg))return;
  if(!confirm('בטוח? באמת למחוק את '+u.name+' לצמיתות?'))return;

  // Remove user
  DB.users=DB.users.filter(x=>x.id!==u.id);
  // Remove their hours
  DB.hoursLog=(DB.hoursLog||[]).filter(h=>h.uid!==u.id);
  // Remove their bonuses
  DB.bonus=bonusArr().filter(b=>b.uid!==u.id);
  al('user-del','עובד נמחק: '+u.name,'כולל '+userHours+' שעות + '+userBonuses+' בונוסים','');
  save();toast(u.name+' נמחק');renderTab();
}

  const emailInp=finp({type:'email',value:u.email,placeholder:'מייל'});

  const isManager=u.role==='\u05de\u05e0\u05d4\u05dc';
  const roleBtn=el('button',{style:{

    roleBtn.textContent=newRole==='\u05de\u05e0\u05d4\u05dc'?'👑 כרגע מנהל — לחץ להורדה לעובד':'👤 כרגע עובד — לחץ להפיכה למנהל';
    roleBtn.style.background=newRole==='\u05de\u05e0\u05d4\u05dc'?'rgba(106,154,90,.12)':'rgba(200,90,58,.12)';

  bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});

function rProjects(main){
  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,marginBottom:'12px'}},'🗂 פרויקטים'));
  const now=new Date(); now.setHours(0,0,0,0);
  const today=tdk();

  // Alert urgent projects
  const urgent=DB.projects.filter(p=>{
    if(p.status!=='active'||!p.endDate)return false;
    return Math.ceil((new Date(p.endDate+'T00:00:00')-now)/(86400000))<=3;
  });
  if(urgent.length){
    main.appendChild(el('div',{style:{background:'#fff0ee',border:'1px solid #C85A3A55',borderRadius:'10px',padding:'10px 14px',marginBottom:'10px',display:'flex',gap:'8px'}},[
      el('span',{style:{fontSize:'18px'}},'🚨'),
      el('div',{},[
        el('div',{style:{fontWeight:700,fontSize:'13px',color:'var(--red)',marginBottom:'4px'}},'פרויקטים עומדים לפקוע'),
        ...urgent.map(p=>{
          const diff=Math.ceil((new Date(p.endDate+'T00:00:00')-now)/(86400000));
          return el('div',{style:{fontSize:'12px',color:'var(--clay)'}},'• '+p.title+' — '+(diff<0?'באיחור '+Math.abs(diff)+' ימים':diff===0?'היום!':'עוד '+diff+' ימים'));
        })
      ])
    ]));
  }

  DB.projects.forEach(p=>{
    if(!p.items)p.items=[];
    const doneCount=p.items.filter(i=>i.done).length;
    const total=p.items.length;
    const pct=Math.round(doneCount/Math.max(total,1)*100);
    let daysInfo='',daysColor='var(--clay)';
    if(p.startDate&&p.endDate){
      const diff=Math.ceil((new Date(p.endDate+'T00:00:00')-now)/(86400000));
      if(diff<0){daysInfo='באיחור '+Math.abs(diff)+' ימים';daysColor='var(--red)';}
      else if(diff===0){daysInfo='היום!';daysColor='var(--red)';}
      else if(diff<=3){daysInfo='עוד '+diff+' ימים';daysColor='var(--straw)';}
      else daysInfo='עוד '+diff+' ימים';
    }

    const pc=card([
      // Header
      el('div',{style:{display:'flex',gap:'8px',alignItems:'flex-start',marginBottom:'8px'}},[
        el('div',{style:{width:'14px',height:'14px',borderRadius:'3px',background:p.color,flexShrink:0,marginTop:'3px'}},''),
        el('div',{style:{flex:1}},[
          el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'15px',fontWeight:700}},p.title),
          p.startDate?el('div',{style:{fontSize:'11px',color:'var(--clay)',marginTop:'2px'}},[
            el('span',{},fd(p.startDate)+' → '+fd(p.endDate||'')),
            daysInfo?el('span',{style:{fontWeight:700,color:daysColor,marginRight:'6px'}},' · '+daysInfo):'',
          ]):'',
          p.desc?el('div',{style:{fontSize:'11px',color:'var(--clay)',marginTop:'2px',fontStyle:'italic'}},p.desc):'',
        ]),

function rJournal(main){
  const today=tdk();
  const now=new Date();
  if(!window._calYear){window._calYear=now.getFullYear();window._calMonth=now.getMonth();}
  const CY=window._calYear, CM=window._calMonth;

  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,marginBottom:'12px'}},'📔 יומן ולוח שנה'));

  // ── BIG CALENDAR ──────────────────────────────────────────────────────────
  const calCard=card([]);

  // Nav row
  const nav=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}});
  nav.appendChild(el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'8px',padding:'7px 16px',cursor:'pointer',fontSize:'16px'},onclick:()=>{window._calMonth--;if(window._calMonth<0){window._calMonth=11;window._calYear--;}renderTab();}},'◀'));
  nav.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:'18px'}},MONTHS[CM]+' '+CY));
  nav.appendChild(el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'8px',padding:'7px 16px',cursor:'pointer',fontSize:'16px'},onclick:()=>{window._calMonth++;if(window._calMonth>11){window._calMonth=0;window._calYear++;}renderTab();}},'▶'));
  calCard.appendChild(nav);

  // Day headers
  const dayNames=['א','ב','ג','ד','ה','ו','ש'];
  const daysRow=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'4px'}});
  dayNames.forEach(d=>daysRow.appendChild(el('div',{style:{textAlign:'center',fontSize:'11px',color:'var(--clay)',fontWeight:700,padding:'4px 0'}},d)));
  calCard.appendChild(daysRow);

  const firstDay=new Date(CY,CM,1).getDay();
  const daysInMonth=new Date(CY,CM+1,0).getDate();

  // Collect events for entire month
  const monthEvents={};
  const addEvent=(dateStr,ev)=>{if(!monthEvents[dateStr])monthEvents[dateStr]=[];monthEvents[dateStr].push(ev);};

  [...DB.rT,...DB.oT].forEach(t=>{
    if(t.done)return;
    const d=t.scheduledDate||t.due||'';
    const dueD=t.dueDate||t.due||'';
    if(d&&d.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`))
      addEvent(d,{type:'task',t,color:AREAS[t.area]?.c||'var(--sage)'});
    // Show due date differently if different from scheduled
    if(dueD&&dueD!==d&&dueD.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`))
      addEvent(dueD,{type:'due',t,color:'var(--red)'});
  });

  DB.projects.forEach(p=>{
    if(p.startDate&&p.startDate.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`))
      addEvent(p.startDate,{type:'proj-start',p,color:p.color});
    if(p.endDate&&p.endDate.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`))
      addEvent(p.endDate,{type:'proj-end',p,color:p.color});
    // Fill days within project range
    if(p.startDate&&p.endDate){
      let cur=new Date(p.startDate+'T00:00:00');
      const end=new Date(p.endDate+'T00:00:00');
      while(cur<=end){
        const ds=cur.toISOString().slice(0,10);
        if(ds.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`)&&ds!==p.startDate&&ds!==p.endDate)
          addEvent(ds,{type:'proj-span',p,color:p.color});
        cur=new Date(cur.getTime()+24*60*60*1000);
      }
    }
  });

  const grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}});
  for(let i=0;i<firstDay;i++)grid.appendChild(el('div',{},''));

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${CY}-${String(CM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const evs=monthEvents[dateStr]||[];
    const taskEvs=evs.filter(e=>e.type==='task'||e.type==='due');
    const projEvs=evs.filter(e=>e.type==='proj-start'||e.type==='proj-end'||e.type==='proj-span');

    const cell=el('div',{style:{
      minHeight:'56px',padding:'3px',borderRadius:'8px',
      cursor:'pointer',
      background:isToday?'rgba(106,154,90,.12)':'transparent',
      border:isToday?'2px solid var(--sage)':'1px solid rgba(0,0,0,.06)',
      position:'relative',transition:'background .15s',
    }});
    cell.onmouseenter=()=>{if(!isToday)cell.style.background='rgba(0,0,0,.04)';};
    cell.onmouseleave=()=>{if(!isToday)cell.style.background='transparent';};

    cell.appendChild(el('div',{style:{
      fontWeight:isToday?700:400,fontSize:'12px',
      textAlign:'center',color:isToday?'var(--sage)':'var(--earth)',
      padding:'2px 0 3px',
    }},String(d)));

    // Project spans - colored bar
    if(projEvs.length){
      const pb=el('div',{style:{height:'4px',borderRadius:'2px',background:projEvs[0].p?.color||'var(--straw)',margin:'1px 0',opacity:.7}});
      cell.appendChild(pb);
    }

    // Task dots
    if(taskEvs.length){
      const dots=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'2px',justifyContent:'center',marginTop:'2px'}});
      taskEvs.slice(0,5).forEach(ev=>{
        dots.appendChild(el('div',{style:{
          width:'7px',height:'7px',borderRadius:'50%',
          background:ev.color,
          border:ev.type==='due'?'1.5px solid var(--red)':'none',
        }},''));
      });
      if(taskEvs.length>5)dots.appendChild(el('div',{style:{fontSize:'8px',color:'var(--clay)',lineHeight:'7px'}},'+'));
      cell.appendChild(dots);
    }

    cell.onclick=()=>showDayModal(dateStr,evs);
    grid.appendChild(cell);
  }
  calCard.appendChild(grid);

  // Legend
  calCard.appendChild(el('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',marginTop:'10px',fontSize:'10px',color:'var(--clay)'}},[
    el('div',{style:{display:'flex',gap:'4px',alignItems:'center'}},[el('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:'var(--sage)'}},''),el('span',{},'משימה מתוזמנת')]),
    el('div',{style:{display:'flex',gap:'4px',alignItems:'center'}},[el('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:'var(--red)'}},''),el('span',{},'תאריך יעד')]),
    el('div',{style:{display:'flex',gap:'4px',alignItems:'center'}},[el('div',{style:{width:'16px',height:'4px',borderRadius:'2px',background:'var(--straw)'}},''),el('span',{},'פרויקט')]),
  ]));

  main.appendChild(calCard);

  // ── TODAY JOURNAL ──────────────────────────────────────────────────────────
  const existing=DB.journal[today]||{text:'',weather:'',mood:''};
  const moodOpts=[['','בחר...'],['sunny','☀️ יפה'],['cloudy','☁️ מעונן'],['rainy','🌧️ גשום'],['hot','🌡️ חם'],['windy','💨 רוח']];
  const statOpts=[['','בחר...'],['excellent','🌟 מצוין'],['good','😊 טוב'],['ok','😐 סביר'],['hard','😓 קשה'],['bad','😞 רע']];
  const ta=fta({placeholder:'מה קרה היום בחווה?...',style:{minHeight:'80px'}});
  ta.value=existing.text||'';
  const ws=fsel(moodOpts,existing.weather);
  const ms=fsel(statOpts,existing.mood);
  main.appendChild(card([
    el('div',{className:'card-t'},`✏️ ${new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'})}`),
    el('div',{className:'fgrid'},[
      el('div',{},[el('div',{className:'flab'},'מזג אוויר'),ws]),
      el('div',{},[el('div',{className:'flab'},'מצב כללי'),ms]),
    ]),

    box.appendChild(el('div',{style:{background:p.color+'15',border:'1px solid '+p.color+'44',borderRadius:'8px',padding:'8px 10px',marginBottom:'6px'}},[

      el('div',{style:{fontSize:'11px',color:'var(--clay)',marginTop:'2px'}},fd(p.startDate)+' → '+fd(p.endDate||'')),

  if(ME.role==='מנהל'){

    box.appendChild(el('div',{style:{fontWeight:700,fontSize:'12px',color:'var(--sage)',marginBottom:'6px'}},'➕ הוסף משימה ליום זה'));
    const ti=finp({placeholder:'כותרת המשימה'});
    let taskArea='animals',taskUid='',taskPri='medium';
    const timeInp=finp({type:'time',value:'08:00'});
    const dueDateInp=finp({type:'date',placeholder:'תאריך יעד (אופציונלי)'});
    const ar=fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),'animals',v=>{taskArea=v;});
    const us=fsel([['','ללא'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],'',v=>{taskUid=v;});
    box.appendChild(el('div',{className:'flab'},'כותרת'));box.appendChild(ti);
    box.appendChild(el('div',{className:'fgrid'},[
      el('div',{},[el('div',{className:'flab'},'אזור'),ar]),
      el('div',{},[el('div',{className:'flab'},'שעה'),timeInp]),
    ]));
    box.appendChild(el('div',{className:'flab'},'תאריך יעד (אם שונה)'));box.appendChild(dueDateInp);
    box.appendChild(el('div',{className:'flab'},'משויך ל'));box.appendChild(us);

      const title=ti.value.trim(); if(!title)return;
      const t={id:'o'+Date.now(),title,area:taskArea,pri:taskPri,uid:taskUid,

               dueDate:dueDateInp.value||dateStr,

      DB.oT.push(t);save();bg.remove();toast('משימה נוספה \u2713');renderTab();

  bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});

function rSummary(main){
  const HY2=HY,HM2=HM;
  const mPrefix=`${HY2}-${String(HM2+1).padStart(2,'0')}`;
  const monthKeys=Object.keys(DB.comps).filter(k=>k.startsWith(mPrefix));
  const uH={};
  (DB.hoursLog||[]).filter(h=>h.date.startsWith(mPrefix)).forEach(h=>{if(!uH[h.uid])uH[h.uid]=0;uH[h.uid]+=ch(h.start,h.end);});
  const totalH=Object.values(uH).reduce((a,b)=>a+b,0);
  const totalDone=monthKeys.reduce((s,k)=>s+Object.keys(DB.comps[k]).length,0);
  const shortage=DB.inv.filter(i=>i.qty<i.minQty).map(i=>({...i,missing:Math.max(0,i.minQty-i.qty)}));
  const needsMaint=DB.equip.filter(e=>e.cond<70);

  // ============ HEADER + HERO ============
  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'17px',fontWeight:900,marginBottom:'4px',display:'flex',alignItems:'center',gap:'8px'}},[
    el('span',{style:{fontSize:'22px'}},'📊'),
    el('span',{},'סיכומים'),
  ]));
  main.appendChild(el('div',{style:{fontSize:'11px',color:'var(--clay)',marginBottom:'12px'}},'מבט אחורה על הפעילות שלכם'));

  // Period selector (day/week/month) - just for visual quick stats
  const now=new Date();
  const tdkv=tdk();
  let sumPeriod=window._sumPeriod||'month';
  const periodLabels={day:'היום',week:'השבוע',month:MONTHS[HM2]};
  // Calculate stats for selected period
  const periodStats=(period)=>{
    const start=new Date();start.setHours(0,0,0,0);
    if(period==='week')start.setDate(start.getDate()-6);
    else if(period==='month'){start.setFullYear(HY2,HM2,1);}
    let end=new Date();
    if(period==='month')end=new Date(HY2,HM2+1,0,23,59,59);
    const inRange=iso=>{if(!iso)return false;const d=new Date(iso+'T00:00:00');return d>=start&&d<=end;};
    // Done tasks count for the period
    let done=0,hrs=0;
    Object.keys(DB.comps||{}).filter(inRange).forEach(k=>{done+=Object.keys(DB.comps[k]).length;});
    (DB.hoursLog||[]).filter(h=>inRange(h.date)).forEach(h=>{hrs+=ch(h.start,h.end);});
    // Open tasks
    const open=DB.oT.filter(t=>!t.done).length;
    // Overdue
    const overdue=DB.oT.filter(t=>!t.done&&t.due&&t.due<tdkv).length;
    return {done,hrs,open,overdue};
  };

  const periodRow=el('div',{style:{display:'flex',gap:'6px',marginBottom:'14px',background:'var(--mist)',borderRadius:'10px',padding:'4px'}});
  const periodBtn=(val,label)=>{
    const b=el('button',{style:{flex:1,background:val===sumPeriod?'var(--white)':'transparent',color:val===sumPeriod?'var(--earth)':'var(--clay)',border:'none',borderRadius:'7px',padding:'8px',fontSize:'12px',fontWeight:700,cursor:'pointer',fontFamily:'inherit',boxShadow:val===sumPeriod?'0 1px 3px rgba(0,0,0,.1)':'none'},onclick:()=>{window._sumPeriod=val;renderTab();}},label);
    return b;
  };
  periodRow.appendChild(periodBtn('day','יום'));
  periodRow.appendChild(periodBtn('week','שבוע'));
  periodRow.appendChild(periodBtn('month','חודש'));
  main.appendChild(periodRow);

  // Hero stats
  const stats=periodStats(sumPeriod);
  const total=stats.done+stats.open;
  const pct=total>0?Math.round(stats.done/total*100):0;
  const heroGrid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginBottom:'12px'}});
  const heroStat=(num,label,col)=>el('div',{style:{background:'var(--white)',border:'1px solid var(--mist)',borderTop:'3px solid '+col,borderRadius:'12px',padding:'14px 6px',textAlign:'center',boxShadow:'0 1px 3px rgba(26,18,5,.06)'}},[
    el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'26px',fontWeight:900,color:col,lineHeight:'1'}},num),
    el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'4px'}},label),
  ]);
  heroGrid.appendChild(heroStat(stats.done,'הושלמו '+periodLabels[sumPeriod],'var(--sage)'));
  heroGrid.appendChild(heroStat(stats.open,'משימות פתוחות','var(--earth)'));
  heroGrid.appendChild(heroStat(stats.overdue,'באיחור',stats.overdue>0?'var(--red)':'var(--clay)'));
  main.appendChild(heroGrid);

  // Progress bar
  if(total>0){
    const progCard=el('div',{style:{background:'var(--white)',border:'1px solid var(--mist)',borderRadius:'12px',padding:'14px',marginBottom:'12px',boxShadow:'0 1px 3px rgba(26,18,5,.06)'}});

function rGarden(main){
  const now=new Date();
  let selMonth=window._gardenMonth||(now.getMonth()+1);
  let selYear=window._gardenYear||now.getFullYear();
  window._gardenMonth=selMonth;
  window._gardenYear=selYear;

  const g=GARDEN[selMonth]||{field:[],greenhouse:[],herbs:[],sow:[],plant:[],order:[],notes:''};
  const isCurrentMonth=selMonth===(now.getMonth()+1)&&selYear===now.getFullYear();

  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,marginBottom:'12px'}},'🌱 לוח עונות וזריעה'));

  // Month navigator
  const nav=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}});
  nav.appendChild(el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'8px',padding:'7px 16px',cursor:'pointer',fontSize:'16px'},onclick:()=>{window._gardenMonth--;if(window._gardenMonth<1){window._gardenMonth=12;window._gardenYear--;}renderTab();}},'◀'));
  nav.appendChild(el('div',{style:{textAlign:'center'}},[
    el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:'18px'}},MONTHS[selMonth-1]),
    isCurrentMonth?el('div',{style:{fontSize:'10px',color:'var(--sage)',fontWeight:600}},'החודש הנוכחי'):'',
  ]));
  nav.appendChild(el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'8px',padding:'7px 16px',cursor:'pointer',fontSize:'16px'},onclick:()=>{window._gardenMonth++;if(window._gardenMonth>12){window._gardenMonth=1;window._gardenYear++;}renderTab();}},'▶'));
  main.appendChild(nav);

  // Notes banner
  if(g.notes){
    main.appendChild(el('div',{style:{
      background:g.notes.startsWith('⚠️')?'#fff0ee':'#f0f8ee',
      border:'1px solid '+(g.notes.startsWith('⚠️')?'#C85A3A44':'#6a9a5a44'),
      borderRadius:'10px',padding:'10px 14px',marginBottom:'10px',
      fontSize:'13px',color:g.notes.startsWith('⚠️')?'var(--red)':'var(--sage)',fontWeight:600
    }},g.notes));
  }

  // Plant table by type
  const TYPES={'\u05e4\u05e8\u05d9':'🍅','\u05d9\u05e8\u05e7':'🥬','\u05e2\u05dc\u05d9\u05dd':'🥗','\u05e9\u05d5\u05e8\u05e9':'🌱','\u05ea\u05d1\u05dc\u05d9\u05df':'🌿'};

  // Get all plants from GARDEN data for this month
  const allNames=[...new Set([...(g.field||[]),...(g.greenhouse||[]),...(g.herbs||[])])];
  const allMonthPlants=allNames.map(n=>[n,PLANTS[n]||{emoji:'🌱',depth:'-',spacing:'-',harvest:'-',water:'-',tips:'',months:[selMonth],type:'ירק'}]);
  const sowPlants=allMonthPlants.filter(([n])=>(g.sow||[]).includes(n));
  const plantPlants=allMonthPlants.filter(([n])=>(g.plant||[]).includes(n));

  if(!allMonthPlants.length){
    main.appendChild(card([
      el('div',{style:{textAlign:'center',padding:'20px',color:'var(--clay)'}},[
        el('div',{style:{fontSize:'32px',marginBottom:'8px'}},'😴'),
        el('div',{style:{fontWeight:600}},'חודש מנוחה'),
        el('div',{style:{fontSize:'12px',marginTop:'4px'}},g.notes||'אין זריעה ושתילה החודש'),
      ])
    ]));
  } else {
    // Summary chips
    main.appendChild(card([
      el('div',{style:{marginBottom:'10px',display:'flex',gap:'8px',flexWrap:'wrap'}},[
        el('div',{style:{background:'rgba(106,154,90,.12)',color:'var(--sage)',padding:'4px 12px',borderRadius:'12px',fontSize:'12px',fontWeight:600}},'🌰 זריעה: '+sowPlants.length+' סוגים'),
        el('div',{style:{background:'rgba(45,26,8,.08)',color:'var(--soil)',padding:'4px 12px',borderRadius:'12px',fontSize:'12px',fontWeight:600}},'🌿 שתילה: '+plantPlants.length+' סוגים'),
        el('div',{style:{background:'rgba(184,131,42,.12)',color:'var(--straw)',padding:'4px 12px',borderRadius:'12px',fontSize:'12px',fontWeight:600}},'📦 סה"כ: '+allMonthPlants.length+' צמחים'),
      ]),
    ]));

    // Table of all plants this month
    const tbl=card([el('div',{className:'card-t'},MONTHS[selMonth-1]+' — כל הצמחים')]);
    
    // Table header
    tbl.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'1fr 60px 80px 70px',gap:'4px',padding:'4px 6px',background:'var(--mist)',borderRadius:'6px',marginBottom:'4px',fontSize:'10px',fontWeight:700,color:'var(--clay)'}},[
      el('div',{},'צמח'),
      el('div',{style:{textAlign:'center'}},'עומק'),
      el('div',{style:{textAlign:'center'}},'ריווח'),
      el('div',{style:{textAlign:'center'}},'קציר'),
    ]));

    // Group by location (field/greenhouse/herbs)
    const groups=[
      {label:'🌾 שדה פתוח',plants:(g.field||[]).map(n=>[n,PLANTS[n]||{emoji:'🌱',depth:'-',spacing:'-',harvest:'-',water:'-',tips:'',months:[selMonth],type:'ירק'}])},
      {label:'🏠 חממה',plants:(g.greenhouse||[]).map(n=>[n,PLANTS[n]||{emoji:'🌱',depth:'-',spacing:'-',harvest:'-',water:'-',tips:'',months:[selMonth],type:'ירק'}])},
      {label:'🌿 עשבי תיבול',plants:(g.herbs||[]).map(n=>[n,PLANTS[n]||{emoji:'🌱',depth:'-',spacing:'-',harvest:'-',water:'-',tips:'',months:[selMonth],type:'תבלין'}])},
    ];
    groups.forEach(({label,plants:typePlants})=>{
      if(!typePlants.length)return;
      tbl.appendChild(el('div',{style:{fontSize:'11px',fontWeight:700,color:'var(--clay)',padding:'8px 6px 3px',borderTop:'1px solid var(--mist)'}},[
        el('span',{},label)
      ]));
      typePlants.forEach(([name,p])=>{
        const isSow=(g.sow||[]).includes(name);
        const isPlant=(g.plant||[]).includes(name);
        const badge=isSow?el('span',{style:{background:'rgba(106,154,90,.15)',color:'var(--sage)',fontSize:'9px',padding:'1px 5px',borderRadius:'6px',marginRight:'3px'}},'זריעה'):

        const row=el('div',{style:{
          display:'grid',gridTemplateColumns:'1fr 60px 80px 70px',gap:'4px',
          padding:'6px 6px',borderRadius:'6px',cursor:'pointer',
          background:isSow||isPlant?'rgba(106,154,90,.05)':'transparent',
          transition:'background .15s',marginBottom:'1px',
        }});
        row.onmouseenter=()=>row.style.background='rgba(0,0,0,.04)';
        row.onmouseleave=()=>row.style.background=isSow||isPlant?'rgba(106,154,90,.05)':'transparent';

        const nameEl=el('div',{style:{display:'flex',alignItems:'center',gap:'4px'}},[
          el('span',{style:{fontSize:'14px'}},p.emoji),
          el('div',{},[
            el('span',{style:{fontSize:'12px',fontWeight:isSow||isPlant?700:400}},name),
            badge||'',
          ])
        ]);
        row.appendChild(nameEl);
        row.appendChild(el('div',{style:{fontSize:'11px',color:'var(--clay)',textAlign:'center',alignSelf:'center'}},p.depth));
        row.appendChild(el('div',{style:{fontSize:'11px',color:'var(--clay)',textAlign:'center',alignSelf:'center'}},p.spacing));
        row.appendChild(el('div',{style:{fontSize:'11px',color:'var(--clay)',textAlign:'center',alignSelf:'center'}},p.harvest));

        // Click to expand details
        row.onclick=()=>showPlantDetails(name,p);
        tbl.appendChild(row);
      });
    });
    main.appendChild(tbl);
  }

  // Order reminder
  if(g.order&&g.order.length){
    main.appendChild(card([
      el('div',{style:{display:'flex',gap:'8px',alignItems:'flex-start'}},[
        el('span',{style:{fontSize:'20px'}},'🛒'),
        el('div',{style:{flex:1}},[
          el('div',{style:{fontWeight:700,fontSize:'13px',marginBottom:'6px'}},'הזמן עכשיו לחודש הבא:'),
          ...g.order.map(o=>el('div',{style:{fontSize:'12px',color:'var(--clay)',padding:'2px 0'}},'• '+o))
        ])
      ])
    ],{background:'#fff8ee',border:'1px solid #e8b84b44'}));
  }

  // Season overview
  const seasons=[
    {name:'🌸 אביב',months:[3,4,5],color:'#6a9a5a'},
    {name:'☀️ קיץ',months:[6,7,8],color:'#b8832a'},
    {name:'🍂 סתיו',months:[9,10,11],color:'#d4633a'},
    {name:'❄️ חורף',months:[12,1,2],color:'#2a5a6e'},
  ];
  const seasonCard=card([el('div',{className:'card-t'},'לוח עונות שנתי')]);
  seasons.forEach(s=>{
    const allP=[...new Set(s.months.flatMap(m=>(GARDEN[m]?.sow||[]).concat(GARDEN[m]?.plant||[])))];
    const row=el('div',{style:{marginBottom:'10px'}});
    row.appendChild(el('div',{style:{fontWeight:700,fontSize:'12px',color:s.color,marginBottom:'4px'}},s.name));
    row.appendChild(el('div',{style:{display:'flex',flexWrap:'wrap',gap:'3px'}},
      allP.slice(0,10).map(pName=>{
        const plant=PLANTS[pName];
        return el('span',{style:{background:s.color+'15',color:s.color,padding:'2px 7px',borderRadius:'10px',fontSize:'11px',cursor:'pointer'},onclick:(ev)=>{ev.stopPropagation();const pl=PLANTS[pName];if(pl)showPlantDetails(pName,pl);}},
          (plant?.emoji||'🌱')+' '+pName);
      })
    ));
    seasonCard.appendChild(row);
  });
  main.appendChild(seasonCard);

  // Tracking - what did we plant this month
  const trackKey='garden-track-'+selYear+'-'+String(selMonth).padStart(2,'0');
  const tracked=DB.gardenLog&&DB.gardenLog[trackKey]?DB.gardenLog[trackKey]:[];
  const trackCard=card([
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},[
      el('div',{className:'card-t',style:{margin:0}},'✓ מעקב זריעה ושתילה'),
      el('div',{style:{fontSize:'11px',color:'var(--sage)',fontWeight:600}},tracked.length+' סומנו'),
    ]),
    el('div',{style:{fontSize:'11px',color:'var(--clay)',marginBottom:'8px'}},'סמן מה זרעת/שתלת החודש:'),
  ]);
  const allP2=[...(g.sow||[]),...(g.plant||[]),...(g.herbs||[])];
  const uniqP=[...new Set(allP2)];
  if(uniqP.length){
    const chips=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});
    uniqP.forEach(pName=>{
      const plant=PLANTS[pName];
      const done=tracked.includes(pName);
      const ch2=el('div',{style:{
        background:done?'var(--sage)':'var(--mist)',
        color:done?'#fff':'var(--clay)',
        padding:'5px 10px',borderRadius:'12px',fontSize:'12px',
        cursor:'pointer',fontWeight:done?700:400,transition:'all .15s',
        display:'flex',gap:'4px',alignItems:'center',
      }});
      ch2.appendChild(el('span',{},(plant?.emoji||'🌱')));
      ch2.appendChild(el('span',{},pName));
      if(done)ch2.appendChild(el('span',{},' ✓'));
      ch2.onclick=()=>{
        if(!DB.gardenLog)DB.gardenLog={};
        if(!DB.gardenLog[trackKey])DB.gardenLog[trackKey]=[];
        if(done)DB.gardenLog[trackKey]=DB.gardenLog[trackKey].filter(x=>x!==pName);
        else DB.gardenLog[trackKey].push(pName);
        save();renderTab();
      };
      chips.appendChild(ch2);
    });
    trackCard.appendChild(chips);
  }
  main.appendChild(trackCard);

  // Email button
  if(ME.role==='\u05de\u05e0\u05d4\u05dc'){
    main.appendChild(btn('📧 שלח עדכון עונות לצוות','var(--sage)',async ()=>{
      toast('\u05e9\u05d5\u05dc\u05d7...',3000);
      const ok=await sendGardenEmail(selMonth,selYear);
      toast(ok?'\u05e0\u05e9\u05dc\u05d7 \u2713':'\u05e9\u05d2\u05d9\u05d0\u05d4');
    },{width:'100%',marginTop:'10px'}));
  }
}

async function sendGardenEmail(month,year){
  const g=GARDEN[month]||{field:[],greenhouse:[],herbs:[],sow:[],plant:[],order:[],notes:''};
  const gNext=GARDEN[month===12?1:month+1]||{};
  const nextMName=MONTHS[month===12?0:month];
  const monthName=MONTHS[month-1];
  const sep='----------------------------';
  const parts=[];

  parts.push('\uD83C\uDF31 \u05e2\u05d3\u05db\u05d5\u05df \u05e2\u05d5\u05e0\u05d5\u05ea \u05d5\u05d6\u05e8\u05d9\u05e2\u05d4 \u2014 '+monthName+' '+year);
  parts.push(sep);
  if(g.notes)parts.push(g.notes);
  parts.push('');

  if(g.sow&&g.sow.length){
    parts.push('\uD83C\uDF30 \u05dc\u05d6\u05e8\u05d9\u05e2\u05d4 \u05d4\u05d7\u05d5\u05d3\u05e9:');
    g.sow.forEach(s=>parts.push('  \u2022 '+s+(PLANTS[s]?' (\u05e2\u05d5\u05de\u05e7: '+PLANTS[s].depth+', \u05e8\u05d9\u05d5\u05d5\u05d7: '+PLANTS[s].spacing+')':'')));
    parts.push('');
  }
  if(g.plant&&g.plant.length){
    parts.push('\uD83C\uDF3F \u05dc\u05e9\u05ea\u05d9\u05dc\u05d4 \u05d4\u05d7\u05d5\u05d3\u05e9:');
    g.plant.forEach(s=>parts.push('  \u2022 '+s+(PLANTS[s]?' (\u05d6\u05de\u05df \u05dc\u05e7\u05e6\u05d9\u05e8: '+PLANTS[s].harvest+')':'')));
    parts.push('');
  }
  if(g.herbs&&g.herbs.length){
    parts.push('\uD83C\uDF3F \u05e2\u05e9\u05d1\u05d9 \u05ea\u05d9\u05d1\u05d5\u05dc:');
    g.herbs.forEach(s=>parts.push('  \u2022 '+s));
    parts.push('');
  }
  if(g.field&&g.field.length){
    parts.push('\uD83C\uDF3E \u05e9\u05d3\u05d4 \u05e4\u05ea\u05d5\u05d7 \u2014 \u05db\u05dc \u05d4\u05d0\u05e4\u05e9\u05e8\u05d5\u05d9\u05d5\u05ea:');
    parts.push('  '+g.field.join(', '));
    parts.push('');
  }
  if(g.greenhouse&&g.greenhouse.length){
    parts.push('\uD83C\uDFE0 \u05d7\u05de\u05de\u05d4:');
    parts.push('  '+g.greenhouse.join(', '));
    parts.push('');
  }
  if(g.order&&g.order.length){
    parts.push('\uD83D\uDED2 \u05d4\u05d6\u05de\u05df \u05e2\u05db\u05e9\u05d9\u05d5 \u05dc'+nextMName+':');
    g.order.forEach(o=>parts.push('  \u2022 '+o));
    parts.push('');
  }
  if(gNext.sow&&gNext.sow.length){
    parts.push('\uD83D\uDCC5 \u05ea\u05e6\u05d5\u05d2\u05d4 \u05de\u05e7\u05d3\u05d9\u05de\u05d4 \u05dc'+nextMName+':');
    if(gNext.sow.length)parts.push('  \u05d6\u05e8\u05d9\u05e2\u05d4: '+gNext.sow.join(', '));
    if(gNext.plant&&gNext.plant.length)parts.push('  \u05e9\u05ea\u05d9\u05dc\u05d4: '+gNext.plant.join(', '));
    parts.push('');
  }
  parts.push('\uD83C\uDF31 \u05e9\u05d9\u05e8\u05ea \u05d4\u05d0\u05d3\u05de\u05d4');

  const msg=parts.join('\n');
  const subj='\uD83C\uDF31 \u05e2\u05d3\u05db\u05d5\u05df \u05e2\u05d5\u05e0\u05d5\u05ea \u2014 '+monthName+' '+year;
  const recipients=DB.users.filter(u=>u.email);
  if(!recipients.length)return false;
  const results=await Promise.all(recipients.map(u=>sendEmail(u.email,u.name,subj,msg)));
  return results.some(r=>r);
}

async function checkAndSendGardenEmail(){
  if(ME.role!=='\u05de\u05e0\u05d4\u05dc') return;
  const now=new Date();
  const CM=now.getMonth()+1;
  const CY=now.getFullYear();
  const dayOfMonth=now.getDate();
  const mKey=CY+'-'+String(CM).padStart(2,'0');

  // Send on day 1 of month
  const isFirstDay=dayOfMonth===1;
  // Send 7 days before end of month (reminder for next month)
  const lastDay=new Date(CY,CM,0).getDate();
  const isReminderDay=dayOfMonth===lastDay-6;

  if(!isFirstDay&&!isReminderDay) return;

  const emailKey='garden-'+(isFirstDay?'start':'reminder')+'-'+mKey;
  if(DB.emailLog&&DB.emailLog[emailKey]==='sent') return;

  const targetMonth=isFirstDay?CM:(CM===12?1:CM+1);
  const targetYear=isFirstDay?CY:(CM===12?CY+1:CY);

  const ok=await sendGardenEmail(targetMonth,targetYear);
  if(ok){
    if(!DB.emailLog)DB.emailLog={};
    DB.emailLog[emailKey]='sent';
    save();
    if(isReminderDay)toast('\uD83C\uDF31 תזכורת גינה נשלחה — הכנה לחודש הבא',4000);
  }
}

async function sendMonthlySummary(forceY,forceM){
  const now=new Date();
  const HM2=(forceM!==undefined)?forceM:now.getMonth();
  const HY2=(forceY!==undefined)?forceY:now.getFullYear();
  const mKey=HY2+'-'+String(HM2+1).padStart(2,'0');
  if(forceY===undefined&&DB.emailLog&&DB.emailLog['monthly-'+mKey]==='sent') return;
  if(forceY===undefined){
    const lastDay=new Date(HY2,HM2+1,0).getDate();
    const dayOfMonth=now.getDate();
    if(dayOfMonth<lastDay-1&&dayOfMonth!==1) return;
  }
  const mPrefix=mKey+'-';
  const monthNames=['\u05d9\u05e0\u05d5\u05d0\u05e8','\u05e4\u05d1\u05e8\u05d5\u05d0\u05e8','\u05de\u05e8\u05e5','\u05d0\u05e4\u05e8\u05d9\u05dc','\u05de\u05d0\u05d9','\u05d9\u05d5\u05e0\u05d9','\u05d9\u05d5\u05dc\u05d9','\u05d0\u05d5\u05d2\u05d5\u05e1\u05d8','\u05e1\u05e4\u05d8\u05de\u05d1\u05e8','\u05d0\u05d5\u05e7\u05d8\u05d5\u05d1\u05e8','\u05e0\u05d5\u05d1\u05de\u05d1\u05e8','\u05d3\u05e6\u05de\u05d1\u05e8'];
  const monthName=monthNames[HM2];

  // Hours per user with days
  const uH={},uDays={};
  (DB.hoursLog||[]).filter(h=>h.date.startsWith(mPrefix)).forEach(h=>{
    if(!uH[h.uid])uH[h.uid]=0;
    uH[h.uid]+=ch(h.start,h.end);
    if(!uDays[h.uid])uDays[h.uid]=new Set();
    uDays[h.uid].add(h.date);
  });
  const totalH=Object.values(uH).reduce((a,b)=>a+b,0);

  // Tasks
  const monthKeys=Object.keys(DB.comps||{}).filter(k=>k.startsWith(mPrefix));
  const totalDone=monthKeys.reduce((s,k)=>s+Object.keys(DB.comps[k]).length,0);

  // Maintenance
  const maintMonth=(DB.maintLog||[]).filter(l=>{const d=new Date(l.closedAt);return d.getFullYear()===HY2&&d.getMonth()===HM2;});
  const totalCost=maintMonth.reduce((s,l)=>s+(l.cost||0),0);

  // Rankings by tasks done
  const ranked=DB.users.map(u=>{
    const mp=gpm(u.id,HY2,HM2);
    return {name:u.name,emoji:u.emoji,id:u.id,hrs:(uH[u.id]||0),days:(uDays[u.id]||new Set()).size,tasks:mp.tasksCount};
  }).sort((a,b)=>b.tasks-a.tasks);

  // Activity changes log
  const monthStart=new Date(HY2,HM2,1).getTime();
  const monthEnd=new Date(HY2,HM2+1,0,23,59,59).getTime();
  const changes=(DB.actLog||[]).filter(l=>l.ts>=monthStart&&l.ts<=monthEnd);
  const changesByType={};
  changes.forEach(c=>{if(!changesByType[c.type])changesByType[c.type]=[];changesByType[c.type].push(c);});

  const parts=[];
  parts.push('🌾 סיכום חודשי — '+monthName+' '+HY2);
  parts.push('═══════════════════════');
  parts.push('');

  // SECTION 1: Overview
  parts.push('📊 סקירה כללית');
  parts.push('───────────────');
  parts.push('⏱  שעות עבודה: '+totalH.toFixed(1)+' ש\'');
  parts.push('✅ משימות בוצעו: '+totalDone);
  parts.push('🔧 תחזוקות בוצעו: '+maintMonth.length+(totalCost?' (סה"כ '+totalCost+'₪)':''));
  parts.push('📜 פעולות באתר: '+changes.length);
  parts.push('');

  // SECTION 2: Detailed Hours per Employee
  parts.push('⏱  פירוט שעות עובדים');
  parts.push('───────────────');
  ranked.forEach(u=>{
    if(u.hrs>0||u.days>0){
      const avg=u.days>0?(u.hrs/u.days).toFixed(1):'0';
      parts.push(u.emoji+' '+u.name);
      parts.push('   • '+u.hrs.toFixed(1)+' שעות סה"כ');
      parts.push('   • '+u.days+' ימי עבודה');
      parts.push('   • ממוצע '+avg+' ש\'/יום');
      parts.push('');
    }
  });

  // SECTION 3: Performance ranking
  parts.push('🏆 דירוג ביצועים');
  parts.push('───────────────');
  const medals=['🥇','🥈','🥉'];
  ranked.forEach((u,i)=>{
    const medal=medals[i]||'  '+(i+1)+'.';
    parts.push(medal+' '+u.emoji+' '+u.name);
    parts.push('   '+u.tasks+' משימות | '+u.hrs.toFixed(1)+' שעות | '+u.days+' ימי עבודה');
  });
  parts.push('');

  // SECTION 4: Site changes summary
  if(changes.length>0){
    parts.push('📜 שינויים באתר');
    parts.push('───────────────');
    const typeLabels={
      'done':'✅ משימות בוצעו',
      'undo':'↩️ ביטולי משימות',
      'inv':'📦 עדכוני מלאי',
      'hours':'⏱ רישומי שעות',
      'hours-del':'🗑 מחיקות שעות',
      'user':'➕ עובדים נוספו',
      'user-del':'🗑 עובדים נמחקו',
      'user-role':'🔄 שינויי תפקיד',
    };
    Object.entries(typeLabels).forEach(([type,lbl])=>{
      const cnt=(changesByType[type]||[]).length;
      if(cnt>0)parts.push('  '+lbl+': '+cnt);
    });
    parts.push('');
    // Critical changes (deletions, role changes)
    const critical=changes.filter(c=>['user-del','user-role','hours-del'].includes(c.type));
    if(critical.length>0){
      parts.push('⚠️  שינויים קריטיים:');
      critical.slice(-10).forEach(c=>{
        const tsD=new Date(c.ts);
        parts.push('  • '+c.text+(c.detail?' ('+c.detail+')':'')+' — '+c.userName+' ב-'+tsD.toLocaleDateString('he-IL'));
      });
      parts.push('');
    }
  }

  // SECTION 5: Maintenance
  if(maintMonth.length){
    parts.push('🔧 תחזוקה');
    parts.push('───────────────');
    maintMonth.forEach(l=>parts.push('  • '+l.title+' ('+l.closedByName+')'+(l.cost?' — '+l.cost+'₪':'')));
    if(totalCost)parts.push('  סה"כ: '+totalCost+'₪');
    parts.push('');
  }

  // SECTION 6: Inventory shortage
  const shortage=DB.inv.filter(i=>i.qty<i.minQty);
  if(shortage.length){
    parts.push('⚠️  מלאי חסר');
    parts.push('───────────────');
    shortage.forEach(i=>parts.push('  • '+i.icon+' '+i.name+' (יש '+i.qty+'/'+i.minQty+' '+i.unit+')'));
    parts.push('');
  }

  parts.push('═══════════════════════');
  parts.push('🌾 שירת האדמה');

  // Send to all managers
  const managers=DB.users.filter(u=>u.role==='\u05de\u05e0\u05d4\u05dc'&&u.email);
  if(managers.length===0){
    toast('אין מנהלים עם כתובת מייל',4000);
    return false;
  }
  const promises=managers.map(admin=>sendEmail(admin.email,admin.name,'🌾 סיכום חודשי — '+monthName+' '+HY2,parts.join('\n')));
  const results=await Promise.all(promises);
  const sentCount=results.filter(r=>r).length;
  if(sentCount>0){
    if(!DB.emailLog)DB.emailLog={};
    DB.emailLog['monthly-'+mKey]='sent';
    save();
    if(sentCount===managers.length){
      toast('🌾 סיכום נשלח ל-'+sentCount+' מנהלים \u2713',4000);
    } else {
      toast('⚠️ נשלח רק ל-'+sentCount+'/'+managers.length+' מנהלים',5000);
    }
    return true;
  } else {
    toast('❌ שליחה נכשלה - בדוק חיבור',5000);
    return false;
  }
}

// ============ PWA: Service Worker & Install Prompt ============
let deferredInstallPrompt = null;

// Register service worker (only when served from http/https, not file://)
if('serviceWorker' in navigator && location.protocol !== 'file:'){
  window.addEventListener('load', async () => {
    try {
      const reg = await navigator.serviceWorker.register('service-worker.js');
      // Listen for updates
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if(newWorker){
          newWorker.addEventListener('statechange', () => {
            if(newWorker.state === 'installed' && navigator.serviceWorker.controller){
              // Show toast notifying about update (only if app is loaded)
              setTimeout(() => {
                const t = document.getElementById('toast');
                if(t){
                  t.textContent = '🔄 גרסה חדשה זמינה - רענן את הדף';
                  t.classList.add('show');
                  setTimeout(()=>t.classList.remove('show'), 5000);
                }
              }, 2000);
            }
          });
        }
      });
    } catch(err){
      console.error('[PWA] Service Worker registration failed:', err);
    }
  });
}

// Listen for the beforeinstallprompt event (Android/Chrome)
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  // Show install button if user is logged in
  setTimeout(showInstallButton, 1500);
});

window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  const btn = document.getElementById('pwa-install-btn');
  if(btn) btn.remove();
  // Show success toast
  const t = document.getElementById('toast');
  if(t){
    t.textContent = '🎉 האפליקציה הותקנה!';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3000);
  }
});

// Detect iOS for showing different install instructions
function isIOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}
function isInStandaloneMode(){
  return ('standalone' in navigator) && navigator.standalone ||
         window.matchMedia('(display-mode: standalone)').matches;
}

function showInstallButton(){
  // Don't show if already installed or button exists
  if(isInStandaloneMode()) return;
  if(document.getElementById('pwa-install-btn')) return;
  // Don't show if user dismissed it earlier in this session
  if(sessionStorage.getItem('pwa-install-dismissed')) return;
  // Only show if logged in
  if(!ME) return;

  const btn = document.createElement('button');
  btn.id = 'pwa-install-btn';
  btn.innerHTML = '📱 התקן אפליקציה';
  btn.style.cssText = 'position:fixed;bottom:14px;right:14px;z-index:998;background:linear-gradient(135deg,var(--earth),var(--soil));color:var(--gold);border:1px solid var(--gold);border-radius:24px;padding:10px 18px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.25);display:flex;align-items:center;gap:6px;animation:slideIn .4s ease-out';

  // Add close button inside
  const closeBtn = document.createElement('span');
  closeBtn.innerHTML = '✕';
  closeBtn.style.cssText = 'opacity:.5;font-size:10px;margin-right:-2px;padding:0 2px';
  closeBtn.onclick = (e) => {
    e.stopPropagation();
    sessionStorage.setItem('pwa-install-dismissed', '1');
    btn.style.animation = 'slideOut .3s ease-in';
    setTimeout(() => btn.remove(), 300);
  };
  btn.appendChild(closeBtn);

  btn.onclick = async () => {
    if(deferredInstallPrompt){
      // Android: trigger native install prompt
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      btn.remove();
    } else if(isIOS()){
      // iOS: show instructions
      showIOSInstallInstructions();
    } else {
      // Other: generic instructions
      alert('להתקנה, פתח את תפריט הדפדפן ובחר "הוסף למסך הבית"');
    }
  };

  document.body.appendChild(btn);

  // Add animation styles if not already
  if(!document.getElementById('pwa-anim-styles')){
    const style = document.createElement('style');
    style.id = 'pwa-anim-styles';
    style.textContent = `
      @keyframes slideIn{from{transform:translateY(80px);opacity:0}to{transform:translateY(0);opacity:1}}
      @keyframes slideOut{from{transform:translateY(0);opacity:1}to{transform:translateY(80px);opacity:0}}
    `;
    document.head.appendChild(style);
  }
}

      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">

        <span>לחץ על כפתור השיתוף <span style="font-size:18px;vertical-align:middle">⎙</span> בתחתית הדפדפן</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <span style="background:var(--earth);color:var(--gold);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0">2</span>
        <span>גלול ובחר <b>"הוסף למסך הבית"</b> 📲</span>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <span style="background:var(--earth);color:var(--gold);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0">3</span>
        <span>לחץ <b>"הוסף"</b> והאייקון יופיע במסך הבית!</span>
      </div>
    </div>
  `;
  const closeBtn = document.createElement('button');
  closeBtn.textContent = 'הבנתי';
  closeBtn.style.cssText = 'width:100%;margin-top:14px;padding:12px;background:var(--earth);color:var(--gold);border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;font-size:13px';
  closeBtn.onclick = () => bg.remove();
  m.appendChild(closeBtn);

  bg.appendChild(m);
  document.body.appendChild(bg);
}

// Check for iOS install prompt opportunity (since iOS doesn't fire beforeinstallprompt)
window.addEventListener('load', () => {
  if(isIOS() && !isInStandaloneMode()){
    // Wait until user is logged in, then show iOS install button
    const checkInterval = setInterval(() => {
      if(ME){
        clearInterval(checkInterval);
        setTimeout(showInstallButton, 2000);
      }
    }, 1000);
    // Stop checking after 30 seconds
    setTimeout(() => clearInterval(checkInterval), 30000);
  }
});

init();
</script>
