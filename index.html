function setSyncing(v){
  const d=document.getElementById('sdot');
  if(d) v?d.classList.add('syncing'):d.classList.remove('syncing');
}

async function loadFromFirebase(){
  try{
    const snap = await getDoc(DOC);
    if(snap.exists()){
      const data = snap.data();
      DB = {...DEFAULT_DATA,...data};
    } else {
      // First time - save defaults
      await setDoc(DOC, DB);
    }
    return true;
  }catch(e){
    console.error('Firebase load error:',e);
    return false;
  }
}

function save(){
  if(saveTimeout) clearTimeout(saveTimeout);
  setSyncing(true);
  saveTimeout = setTimeout(async ()=>{
    try{
      await setDoc(DOC, DB);
    }catch(e){
      console.error('Firebase save error:',e);
      toast('שגיאת שמירה — בדוק חיבור');
    }
    setSyncing(false);
  }, 800);
}

function tdk(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fd(s){if(!s)return'';return new Date(s+'T00:00:00').toLocaleDateString('he-IL',{day:'numeric',month:'short'});}
function ch(s,e){const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(0,((eh*60+em)-(sh*60+sm))/60);}
function gp(uid){let p=0;Object.values(DB.comps).forEach(dc=>{Object.entries(dc).forEach(([tid,by])=>{if(by!==uid)return;const t=at().find(t=>t.id===tid);if(t)p+=PRI[t.pri]?.pts||5;});});Object.values(DB.bonus||{}).flat().filter(b=>b.uid===uid).forEach(b=>p+=b.pts);p+=at().filter(t=>t.createdBy===uid).length*3;return p;}

// DOM helpers
function el(tag,attrs={},kids=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else if(k==='value')e.value=v;
    else if(k!=='key')e.setAttribute(k,v);
  });
  (Array.isArray(kids)?kids.flat():[kids]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}
function toast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function modal(html){const bg=el('div',{className:'modal-bg'});const box=el('div',{className:'modal'});box.innerHTML=html;bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});document.body.appendChild(bg);return{bg,box};}
function card(ch,st={}){return el('div',{className:'card',style:st},ch);}

function empty(t='אין פריטים'){return el('div',{className:'empty'},t);}
function finp(a){const e=el('input',{className:'finp',...a});return e;}
function fsel(opts,val,fn){const e=el('select',{className:'finp'});opts.forEach(([v,l])=>{const o=el('option',{value:v},l);if(v===val)o.selected=true;e.appendChild(o);});if(fn)e.addEventListener('change',ev=>fn(ev.target.value));return e;}

// AUTH - LOGIN ONLY (no public registration)
function renderLogin(){
  const root=document.getElementById('root');root.innerHTML='';
  let creds=null;try{creds=JSON.parse(localStorage.getItem('sheirat_creds')||'null');}catch{}
  if(creds){
    const u=DB.users.find(u=>u.email===creds.email&&u.pass===creds.pass);
    if(u){ME=u;renderApp();return;}
  }
  const em=finp({type:'email',placeholder:'your@email.com',className:'inp'});
  const pw=finp({type:'password',placeholder:'••••••',className:'inp'});
  const err=el('div',{className:'err'});
  const login=()=>{
    const u=DB.users.find(u=>u.email===em.value.trim().toLowerCase()&&u.pass===pw.value);
    if(!u){err.textContent='מייל או סיסמה שגויים';return;}
    localStorage.setItem('sheirat_creds',JSON.stringify({email:em.value.trim().toLowerCase(),pass:pw.value}));
    ME=u;renderApp();
  };
  em.addEventListener('keydown',e=>e.key==='Enter'&&login());

  root.appendChild(el('div',{className:'auth'},[el('div',{className:'auth-box'},[

      el('p',{style:{color:'var(--clay)',fontSize:'12px',marginTop:'3px'}},'מערכת ניהול חווה')
    ]),
    el('label',{className:'lbl'},'מייל'),em,
    el('label',{className:'lbl'},'סיסמה'),pw,err,
    el('button',{className:'btn-main',onclick:login},'כניסה ←'),
    DB.users.length===0?el('div',{className:'auth-sw',style:{marginTop:'12px',fontSize:'12px',color:'var(--clay)',background:'var(--mist)',borderRadius:'8px',padding:'10px'}},'פנה למנהל לקבלת פרטי כניסה'):el('span'),
    creds?el('div',{style:{textAlign:'center',marginTop:'8px',fontSize:'11px',color:'var(--clay)'}},[el('a',{style:{cursor:'pointer',textDecoration:'underline'},onclick:()=>{localStorage.removeItem('sheirat_creds');em.value='';pw.value=''}},'כניסה עם חשבון אחר')]):el('span'),

function renderTab(mainEl,pfEl){
  const main=mainEl||document.getElementById('app-main');
  const pf=pfEl||window._pf;
  if(!main)return;
  main.innerHTML='';
  if(TAB==='tasks')rTasks(main);
  else if(TAB==='act')rActivity(main);
  else if(TAB==='inv')rInventory(main);
  else if(TAB==='maint')rMaintenance(main);
  else if(TAB==='hrs')rHours(main);
  else if(TAB==='score')rScore(main);
  else if(TAB==='proj')rProjects(main);
  else if(TAB==='team')rTeam(main);
  else if(TAB==='jour')rJournal(main);
  else if(TAB==='sum')rSummary(main);
  else if(TAB==='admin')rAdmin(main);
  if(pf){
    const today=tdk();const dayComps=DB.comps[today]||{};

function toggle(tid){
  const today=tdk();
  if(!DB.comps[today])DB.comps[today]={};
  const t=at().find(x=>x.id===tid);
  if(DB.comps[today][tid]){delete DB.comps[today][tid];al('undo','בוטל: '+(t?t.title:''),'',t?t.area:'');}
  else{DB.comps[today][tid]=ME.id;al('done','בוצע: '+(t?t.title:''),'',t?t.area:'');}
  save();renderTab();
}

function rTasks(main){
  const today=tdk();const todayComps=DB.comps[today]||{};
  // Filter tabs
  const filterCard=card([
    el('div',{className:'chips'},[
      chip('הכל',STAB==='all','var(--earth)',()=>{STAB='all';renderTab();}),
      chip('שלי',STAB==='mine','var(--red)',()=>{STAB='mine';renderTab();}),
      ...Object.entries(AREAS).map(([k,v])=>chip(v.l,STAB===k,v.c,()=>{STAB=k;renderTab();})),
    ])
  ]);
  main.appendChild(filterCard);

  // Progress
  const todayProg=DB.rT.length+DB.oT.filter(t=>!t.done).length;
  const doneCount=Object.keys(todayComps).length;
  main.appendChild(card([
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},[
      el('div',{style:{fontWeight:700}},`היום — ${new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'})}`),
      el('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--sage)'}},`${doneCount}/${todayProg} ✓`)
    ]),
    pbar(Math.round(doneCount/Math.max(todayProg,1)*100),'var(--sage)',8)
  ]));

  // Get tasks based on filter
  let recurringTasks=[...DB.rT];
  let onceTasks=[...DB.oT.filter(t=>!t.done)];
  if(STAB==='mine'){
    recurringTasks=recurringTasks.filter(t=>todayComps[t.id]===ME.id||t.uid===ME.id);
    onceTasks=onceTasks.filter(t=>todayComps[t.id]===ME.id||t.uid===ME.id);
  } else if(STAB!=='all'){
    recurringTasks=recurringTasks.filter(t=>t.area===STAB);
    onceTasks=onceTasks.filter(t=>t.area===STAB);
  }

  // Group recurring by area
  const areaGroups={};
  recurringTasks.forEach(t=>{
    if(!areaGroups[t.area])areaGroups[t.area]=[];
    areaGroups[t.area].push(t);
  });

  Object.entries(areaGroups).forEach(([areaKey,tasks])=>{
    const area=AREAS[areaKey];
    if(!area||!tasks.length)return;
    const pending=tasks.filter(t=>!todayComps[t.id]);
    const done=tasks.filter(t=>todayComps[t.id]);
    const areaCard=card([
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'14px',fontWeight:700,color:area.c}},area.l),
        el('span',{style:{fontSize:'11px',color:done.length===tasks.length?'var(--sage)':'var(--clay)',fontWeight:600}},`${done.length}/${tasks.length}`)
      ]),
      ...pending.map(t=>mkRow(t,false,todayComps)),
      ...done.map(t=>mkRow(t,true,todayComps)),
    ]);
    main.appendChild(areaCard);
  });

  // One-time tasks
  if(onceTasks.length){
    main.appendChild(card([
      el('div',{className:'card-t'},'📌 משימות חד-פעמיות'),
      ...onceTasks.map(t=>mkRow(t,todayComps[t.id]||t.done,todayComps))
    ]));
  }

  if(!recurringTasks.length&&!onceTasks.length) main.appendChild(empty('אין משימות'));

  // Completed today

          const label=diff<0?'באיחור '+Math.abs(diff)+' ימים':diff===0?'היום!':diff<=3?'עוד '+diff+' ימים':fd(t.scheduledDate);

          if(!DB.maintLog)DB.maintLog=[];

            DB.maintLog.push({id:'ml'+Date.now()+Math.random(),taskId:t.id,title:t.title,
              closedAt:Date.now(),closedBy:ME.id,closedByName:ME.name,

            el('span',{style:{color:isDone?'var(--sage)':'var(--clay)',fontSize:'14px'}},isDone?'✓':'○'),
            el('span',{style:{flex:1,textDecoration:isDone?'line-through':'none',color:isDone?'var(--clay)':'var(--earth)'}},t.title),
            worker?el('span',{style:{fontSize:'11px',background:worker.color+'22',color:worker.color,padding:'1px 6px',borderRadius:'8px',fontWeight:600}},worker.emoji+' '+worker.name):'',
          ]);
        })
      ]):'',
    ]);
    main.appendChild(pc);
  });

  if(!DB.projects.length)main.appendChild(empty('אין פרויקטים'));
  if(ME.role==='מנהל')main.appendChild(btn('➕ פרויקט חדש','var(--sage)',()=>editProject(null),{width:'100%',marginTop:'8px'}));
}

function editProject(p){
  const isNew=!p;
  if(isNew)p={id:'p'+Date.now(),title:'',color:'#6a9a5a',status:'active',desc:'',taskIds:[],taskAssign:{},startDate:'',endDate:''};
  if(!p.taskAssign)p.taskAssign={};
  const colors=['#6a9a5a','#C85A3A','#6a4a8e','#2a6e3a','#b8832a','#2a5a6e','#d4633a','#6b4a2a'];
  let selColor=p.color, selStatus=p.status;
  let selTaskIds=[...(p.taskIds||[])];
  let selAssign={...p.taskAssign};

  const titleInp=finp({placeholder:'שם הפרויקט',value:p.title});
  const descInp=fta({placeholder:'תיאור קצר',value:p.desc||''});
  descInp.style.minHeight='55px';
  const startInp=finp({type:'date',value:p.startDate||''});
  const endInp=finp({type:'date',value:p.endDate||''});
  const statusSel=fsel([['active','פעיל'],['done','הושלם']],selStatus,v=>{selStatus=v;});

  const colorPicker=el('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',margin:'4px 0'}});
  const renderColors=()=>{
    colorPicker.innerHTML='';
    colors.forEach(c=>{
      const cb=el('div',{style:{width:'24px',height:'24px',borderRadius:'50%',background:c,cursor:'pointer',
        border:c===selColor?'3px solid var(--earth)':'3px solid transparent',transition:'border .15s'}});
      cb.onclick=()=>{selColor=c;renderColors();};
      colorPicker.appendChild(cb);
    });
  };
  renderColors();

  const taskListEl=el('div',{style:{maxHeight:'220px',overflowY:'auto',border:'1px solid var(--parch)',borderRadius:'8px',padding:'4px'}});

  const renderTaskList=()=>{
    taskListEl.innerHTML='';
    if(!at().length){
      taskListEl.appendChild(el('div',{style:{textAlign:'center',color:'var(--clay)',fontSize:'12px',padding:'12px'}},'אין משימות במערכת'));
      return;
    }
    // Group by area
    const byArea={};
    at().forEach(t=>{if(!byArea[t.area])byArea[t.area]=[];byArea[t.area].push(t);});
    Object.entries(byArea).forEach(([aKey,tasks])=>{
      const area=AREAS[aKey];
      if(area){
        taskListEl.appendChild(el('div',{style:{fontSize:'10px',fontWeight:700,color:area.c,padding:'6px 6px 2px',textTransform:'uppercase',letterSpacing:'.05em'}},area.l));
      }
      tasks.forEach(t=>{
        const checked=selTaskIds.includes(t.id);
        const assignedUid=selAssign[t.id]||'';
        const row=el('div',{style:{padding:'5px 6px',borderRadius:'6px',marginBottom:'2px',
          background:checked?'rgba(106,154,90,.1)':'transparent',transition:'background .15s'}});
        const top=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',userSelect:'none'}});
        const chk=el('div',{style:{width:'18px',height:'18px',borderRadius:'4px',flexShrink:0,
          border:checked?'none':'1.5px solid var(--parch)',
          background:checked?'var(--sage)':'transparent',
          display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}},
          checked?el('span',{style:{color:'#fff',fontSize:'11px',fontWeight:700}},'✓'):'');
        top.appendChild(chk);
        top.appendChild(el('span',{style:{fontSize:'12px',flex:1,color:checked?'var(--earth)':'var(--clay)',
          fontWeight:checked?600:400}},t.title));
        top.onclick=()=>{
          if(selTaskIds.includes(t.id)){selTaskIds=selTaskIds.filter(x=>x!==t.id);delete selAssign[t.id];}
          else selTaskIds.push(t.id);
          renderTaskList();
        };
        row.appendChild(top);
        if(checked){
          const ws=el('select',{style:{width:'100%',fontSize:'11px',border:'1px solid var(--parch)',
            borderRadius:'6px',padding:'4px 8px',marginTop:'5px',fontFamily:'inherit',
            background:'var(--white)',color:'var(--earth)'}});
          [['','ללא שיוך'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])].forEach(([v,l])=>{
            const o=el('option',{value:v},l);
            if(v===assignedUid)o.selected=true;
            ws.appendChild(o);
          });
          ws.addEventListener('change',e=>{
            if(e.target.value)selAssign[t.id]=e.target.value;
            else delete selAssign[t.id];
          });
          row.appendChild(ws);
        }
        taskListEl.appendChild(row);
      });
    });
  };
  renderTaskList();

  const bg=el('div',{className:'modal-bg'});
  const box=el('div',{className:'modal'});
  box.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'15px',fontWeight:700,marginBottom:'14px'}},isNew?'פרויקט חדש':'עריכת פרויקט'));
  box.appendChild(el('div',{className:'flab'},'שם'));box.appendChild(titleInp);
  box.appendChild(el('div',{className:'flab'},'תיאור'));box.appendChild(descInp);
  const dr=el('div',{className:'fgrid'});
  dr.appendChild(el('div',{},[el('div',{className:'flab'},'התחלה'),startInp]));
  dr.appendChild(el('div',{},[el('div',{className:'flab'},'סיום'),endInp]));
  box.appendChild(dr);
  box.appendChild(el('div',{className:'flab'},'צבע'));box.appendChild(colorPicker);
  box.appendChild(el('div',{className:'flab'},'סטטוס'));box.appendChild(statusSel);
  box.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'10px 0 4px'}},[
    el('div',{className:'flab',style:{margin:0}},'משימות + שיוך עובד'),
    el('span',{style:{fontSize:'11px',color:'var(--sage)',fontWeight:600}},selTaskIds.length+' נבחרו'),
  ]));
  box.appendChild(taskListEl);
  box.appendChild(btn('שמור פרויקט','var(--sage)',()=>{
    const title=titleInp.value.trim();if(!title){toast('חסר שם');return;}
    p.title=title;p.color=selColor;p.status=selStatus;
    p.desc=descInp.value.trim();p.taskIds=selTaskIds;p.taskAssign=selAssign;
    p.startDate=startInp.value;p.endDate=endInp.value;
    if(isNew)DB.projects.push(p);
    save();bg.remove();toast('פרויקט נשמר \u2713');renderTab();
  },{width:'100%',marginTop:'14px'}));
  box.appendChild(btn('ביטול','var(--mist)',()=>bg.remove(),{width:'100%',marginTop:'6px',color:'var(--soil)'}));
  bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  document.body.appendChild(bg);
}

function rJournal(main){
  const today=tdk();
  const now=new Date();
  if(!window._calYear){window._calYear=now.getFullYear();window._calMonth=now.getMonth();}
  const CY=window._calYear, CM=window._calMonth;

  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,marginBottom:'12px'}},'📔 יומן ולוח שנה'));

  // ── BIG CALENDAR ──────────────────────────────────────────────────────────
  const calCard=card([]);

  // Nav row
  const nav=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}});
  nav.appendChild(el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'8px',padding:'7px 16px',cursor:'pointer',fontSize:'16px'},onclick:()=>{window._calMonth--;if(window._calMonth<0){window._calMonth=11;window._calYear--;}renderTab();}},'◀'));
  nav.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:'18px'}},MONTHS[CM]+' '+CY));
  nav.appendChild(el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'8px',padding:'7px 16px',cursor:'pointer',fontSize:'16px'},onclick:()=>{window._calMonth++;if(window._calMonth>11){window._calMonth=0;window._calYear++;}renderTab();}},'▶'));
  calCard.appendChild(nav);

  // Day headers
  const dayNames=['א','ב','ג','ד','ה','ו','ש'];
  const daysRow=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px',marginBottom:'4px'}});
  dayNames.forEach(d=>daysRow.appendChild(el('div',{style:{textAlign:'center',fontSize:'11px',color:'var(--clay)',fontWeight:700,padding:'4px 0'}},d)));
  calCard.appendChild(daysRow);

  const firstDay=new Date(CY,CM,1).getDay();
  const daysInMonth=new Date(CY,CM+1,0).getDate();

  // Collect events for entire month
  const monthEvents={};
  const addEvent=(dateStr,ev)=>{if(!monthEvents[dateStr])monthEvents[dateStr]=[];monthEvents[dateStr].push(ev);};

  [...DB.rT,...DB.oT].forEach(t=>{
    if(t.done)return;
    const d=t.scheduledDate||t.due||'';
    const dueD=t.dueDate||t.due||'';
    if(d&&d.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`))
      addEvent(d,{type:'task',t,color:AREAS[t.area]?.c||'var(--sage)'});
    // Show due date differently if different from scheduled
    if(dueD&&dueD!==d&&dueD.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`))
      addEvent(dueD,{type:'due',t,color:'var(--red)'});
  });

  DB.projects.forEach(p=>{
    if(p.startDate&&p.startDate.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`))
      addEvent(p.startDate,{type:'proj-start',p,color:p.color});
    if(p.endDate&&p.endDate.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`))
      addEvent(p.endDate,{type:'proj-end',p,color:p.color});
    // Fill days within project range
    if(p.startDate&&p.endDate){
      let cur=new Date(p.startDate+'T00:00:00');
      const end=new Date(p.endDate+'T00:00:00');
      while(cur<=end){
        const ds=cur.toISOString().slice(0,10);
        if(ds.startsWith(`${CY}-${String(CM+1).padStart(2,'0')}`)&&ds!==p.startDate&&ds!==p.endDate)
          addEvent(ds,{type:'proj-span',p,color:p.color});
        cur=new Date(cur.getTime()+24*60*60*1000);
      }
    }
  });

  const grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'3px'}});
  for(let i=0;i<firstDay;i++)grid.appendChild(el('div',{},''));

  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${CY}-${String(CM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===today;
    const evs=monthEvents[dateStr]||[];
    const taskEvs=evs.filter(e=>e.type==='task'||e.type==='due');
    const projEvs=evs.filter(e=>e.type==='proj-start'||e.type==='proj-end'||e.type==='proj-span');

    const cell=el('div',{style:{
      minHeight:'56px',padding:'3px',borderRadius:'8px',
      cursor:'pointer',
      background:isToday?'rgba(106,154,90,.12)':'transparent',
      border:isToday?'2px solid var(--sage)':'1px solid rgba(0,0,0,.06)',
      position:'relative',transition:'background .15s',
    }});
    cell.onmouseenter=()=>{if(!isToday)cell.style.background='rgba(0,0,0,.04)';};
    cell.onmouseleave=()=>{if(!isToday)cell.style.background='transparent';};

    cell.appendChild(el('div',{style:{
      fontWeight:isToday?700:400,fontSize:'12px',
      textAlign:'center',color:isToday?'var(--sage)':'var(--earth)',
      padding:'2px 0 3px',
    }},String(d)));

    // Project spans - colored bar
    if(projEvs.length){
      const pb=el('div',{style:{height:'4px',borderRadius:'2px',background:projEvs[0].p?.color||'var(--straw)',margin:'1px 0',opacity:.7}});
      cell.appendChild(pb);
    }

    // Task dots
    if(taskEvs.length){
      const dots=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'2px',justifyContent:'center',marginTop:'2px'}});
      taskEvs.slice(0,5).forEach(ev=>{
        dots.appendChild(el('div',{style:{
          width:'7px',height:'7px',borderRadius:'50%',
          background:ev.color,
          border:ev.type==='due'?'1.5px solid var(--red)':'none',
        }},''));
      });
      if(taskEvs.length>5)dots.appendChild(el('div',{style:{fontSize:'8px',color:'var(--clay)',lineHeight:'7px'}},'+'));
      cell.appendChild(dots);
    }

    cell.onclick=()=>showDayModal(dateStr,evs);
    grid.appendChild(cell);
  }
  calCard.appendChild(grid);

  // Legend
  calCard.appendChild(el('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',marginTop:'10px',fontSize:'10px',color:'var(--clay)'}},[
    el('div',{style:{display:'flex',gap:'4px',alignItems:'center'}},[el('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:'var(--sage)'}},''),el('span',{},'משימה מתוזמנת')]),
    el('div',{style:{display:'flex',gap:'4px',alignItems:'center'}},[el('div',{style:{width:'8px',height:'8px',borderRadius:'50%',background:'var(--red)'}},''),el('span',{},'תאריך יעד')]),
    el('div',{style:{display:'flex',gap:'4px',alignItems:'center'}},[el('div',{style:{width:'16px',height:'4px',borderRadius:'2px',background:'var(--straw)'}},''),el('span',{},'פרויקט')]),
  ]));

  main.appendChild(calCard);

  // ── TODAY JOURNAL ──────────────────────────────────────────────────────────
  const existing=DB.journal[today]||{text:'',weather:'',mood:''};
  const moodOpts=[['','בחר...'],['sunny','☀️ יפה'],['cloudy','☁️ מעונן'],['rainy','🌧️ גשום'],['hot','🌡️ חם'],['windy','💨 רוח']];
  const statOpts=[['','בחר...'],['excellent','🌟 מצוין'],['good','😊 טוב'],['ok','😐 סביר'],['hard','😓 קשה'],['bad','😞 רע']];
  const ta=fta({placeholder:'מה קרה היום בחווה?...',style:{minHeight:'80px'}});
  ta.value=existing.text||'';
  const ws=fsel(moodOpts,existing.weather);
  const ms=fsel(statOpts,existing.mood);
  main.appendChild(card([
    el('div',{className:'card-t'},`✏️ ${new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'})}`),
    el('div',{className:'fgrid'},[
      el('div',{},[el('div',{className:'flab'},'מזג אוויר'),ws]),
      el('div',{},[el('div',{className:'flab'},'מצב כללי'),ms]),
    ]),
    el('div',{className:'flab'},'כתיבה חופשית'),ta,
    btn('שמור יומן','var(--sage)',()=>{
      if(!DB.journal)DB.journal={};
      DB.journal[today]={text:ta.value,weather:ws.value,mood:ms.value,uid:ME.id,ts:Date.now()};
      save();toast('יומן נשמר \u2713');
    },{width:'100%',marginTop:'8px'})
  ]));

  const past=Object.entries(DB.journal||{}).filter(([d])=>d!==today).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5);
  if(past.length)main.appendChild(card([
    el('div',{className:'card-t'},'רשומות קודמות'),
    ...past.map(([d,e])=>el('div',{style:{padding:'8px 0',borderBottom:'1px solid var(--mist)'}},[
      el('div',{style:{fontWeight:700,fontSize:'12px',marginBottom:'3px'}},[el('span',{},fd(d)+'  '),e.weather?el('span',{},moodOpts.find(o=>o[0]===e.weather)?.[1]||''):'',]),
      e.text?el('div',{style:{fontSize:'12px',color:'var(--clay)',lineHeight:1.5}},e.text.slice(0,100)+(e.text.length>100?'...':'')):'',
    ]))
  ]));
}

function showDayModal(dateStr,events){
  const bg=el('div',{className:'modal-bg'});
  const box=el('div',{className:'modal'});
  const d=new Date(dateStr+'T00:00:00');
  box.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'15px',fontWeight:700,marginBottom:'12px'}},
    d.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'})));

  // Group events by type
  const taskEvs=events.filter(e=>e.type==='task');
  const dueEvs=events.filter(e=>e.type==='due');
  const projEvs=events.filter(e=>e.type==='proj-start'||e.type==='proj-end'||e.type==='proj-span');

  if(!events.length){
    box.appendChild(el('div',{style:{color:'var(--clay)',fontSize:'13px',marginBottom:'12px',textAlign:'center'}},'אין אירועים ביום זה'));
  }

  // Tasks scheduled for this day
  taskEvs.forEach(ev=>{
    const t=ev.t; const u=t.uid?gu(t.uid):null;

      el('div',{style:{fontWeight:600,fontSize:'13px',color:ev.color}},'📋 '+t.title),

  // Tasks due this day (different from scheduled)

    box.appendChild(el('div',{style:{background:p.color+'15',border:'1px solid '+p.color+'44',borderRadius:'8px',padding:'8px 10px',marginBottom:'6px'}},[
      el('div',{style:{fontWeight:600,fontSize:'13px',color:p.color}},label+': '+p.title),
      el('div',{style:{fontSize:'11px',color:'var(--clay)',marginTop:'2px'}},fd(p.startDate)+' → '+fd(p.endDate||'')),
    ]));
  });

  // Manager: add task to this day
  if(ME.role==='מנהל'){
    box.appendChild(el('div',{style:{borderTop:'1px solid var(--mist)',paddingTop:'10px',marginTop:'8px'}}));
    box.appendChild(el('div',{style:{fontWeight:700,fontSize:'12px',color:'var(--sage)',marginBottom:'6px'}},'➕ הוסף משימה ליום זה'));
    const ti=finp({placeholder:'כותרת המשימה'});

    const ar=fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),'animals',v=>{taskArea=v;});
    const us=fsel([['','ללא'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],'',v=>{taskUid=v;});
    box.appendChild(el('div',{className:'flab'},'כותרת'));box.appendChild(ti);
    box.appendChild(el('div',{className:'fgrid'},[
      el('div',{},[el('div',{className:'flab'},'אזור'),ar]),
      el('div',{},[el('div',{className:'flab'},'שעה'),timeInp]),
    ]));
    box.appendChild(el('div',{className:'flab'},'תאריך יעד (אם שונה)'));box.appendChild(dueDateInp);
    box.appendChild(el('div',{className:'flab'},'משויך ל'));box.appendChild(us);
    box.appendChild(btn('הוסף','var(--red)',()=>{
      const title=ti.value.trim(); if(!title)return;
      const t={id:'o'+Date.now(),title,area:taskArea,pri:taskPri,uid:taskUid,
               scheduledDate:dateStr,scheduledTime:timeInp.value,

               done:false,doneAt:null,createdBy:ME.id};

    },{width:'100%',marginTop:'6px'}));

  box.appendChild(btn('סגור','var(--mist)',()=>bg.remove(),{width:'100%',marginTop:'8px',color:'var(--soil)'}));
  bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  document.body.appendChild(bg);
}

function rSummary(main){
  const HY2=HY,HM2=HM;
  const mPrefix=`${HY2}-${String(HM2+1).padStart(2,'0')}`;
  const monthKeys=Object.keys(DB.comps).filter(k=>k.startsWith(mPrefix));
  const uH={};
  (DB.hoursLog||[]).filter(h=>h.date.startsWith(mPrefix)).forEach(h=>{if(!uH[h.uid])uH[h.uid]=0;uH[h.uid]+=ch(h.start,h.end);});
  const totalH=Object.values(uH).reduce((a,b)=>a+b,0);
  const totalDone=monthKeys.reduce((s,k)=>s+Object.keys(DB.comps[k]).length,0);

async function sendDailyDigest(){
  // Check if already sent today
  const today=tdk();
  if(DB.emailLog&&DB.emailLog[today]==='sent') return;
  
  const todayTasks=[...DB.rT,...DB.oT.filter(t=>!t.done)];
  const scheduled=DB.oT.filter(t=>t.scheduledDate===today&&!t.done);
  
  // Send to each user with tasks
  const promises=DB.users.filter(u=>u.email).map(async u=>{
    const myTasks=todayTasks.filter(t=>t.uid===u.id);
    const myScheduled=scheduled.filter(t=>t.uid===u.id);
    const allMyTasks=[...new Set([...myTasks,...myScheduled])];
    
    if(!allMyTasks.length&&ME.id!==u.id) return; // skip users with no tasks (except admin gets all)
    
    const taskList=todayTasks.map(t=>'• '+t.title+' ['+( AREAS[t.area]?.l||t.area)+']'+(t.scheduledTime?' בשעה '+t.scheduledTime:'')).join('\n');
    
    const dateStr=new Date().toLocaleDateString('he-IL');
    let msg='';
    if(u.role==='מנהל'){
      const lines=['שלום '+u.name+',','','סיכום משימות להיום — '+dateStr+':',''];
      todayTasks.slice(0,15).forEach(t=>{const w=t.uid?gu(t.uid):null;lines.push('• '+t.title+(w?' — '+w.name:''));});
      lines.push('','סהכ: '+todayTasks.length+' משימות');
      msg=lines.join('\n');
    } else if(allMyTasks.length){
      const lines=['שלום '+u.name+',','','המשימות שלך להיום — '+dateStr+':',''];
      allMyTasks.forEach(t=>lines.push('• '+t.title+(t.scheduledTime?' בשעה '+t.scheduledTime:'')));
      lines.push('','בהצלחה! 🌾');
      msg=lines.join('\n');
    } else {
      msg='שלום '+u.name+',\n\nאין לך משימות מוגדרות להיום — '+dateStr+'.\n\nיום טוב! 🌾';
    }
    return sendEmail(u.email, u.name, 'סיכום משימות יומי', msg);
  });
  
  await Promise.all(promises);
  if(!DB.emailLog)DB.emailLog={};
  DB.emailLog[today]='sent';
  save();
  return true;
}

async function sendReminder(task, user){
  if(!user||!user.email) return false;
  const area=AREAS[task.area];
  const lines=['שלום '+user.name+',','','תזכורת למשימה:','📋 '+task.title];
  if(area) lines.push('📍 '+area.l);
  if(task.scheduledDate) lines.push('📅 '+fd(task.scheduledDate)+(task.scheduledTime?' בשעה '+task.scheduledTime:''));
  lines.push('','אנא וודא שהמשימה מבוצעת בזמן.','','🌾 שירת האדמה');
  const msg=lines.join('\n');
  return sendEmail(user.email, user.name, 'תזכורת: '+task.title, msg);
}

async function sendMonthlySummary(){
  const now=new Date();
  const HM2=now.getMonth();
  const HY2=now.getFullYear();
  const mKey=HY2+'-'+String(HM2+1).padStart(2,'0');

  // Check if already sent this month
  if(DB.emailLog&&DB.emailLog['monthly-'+mKey]==='sent') return;

  // Only send on last 2 days of month or first day of next month
  const lastDay=new Date(HY2,HM2+1,0).getDate();
  const dayOfMonth=now.getDate();
  const isLastDays=(dayOfMonth>=lastDay-1)||(dayOfMonth===1&&HM2>0);
  if(!isLastDays) return;

  const mPrefix=mKey+'-';
  const monthNames=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const monthName=monthNames[HM2];

  // Hours per user
  const uH={};
  (DB.hoursLog||[]).filter(h=>h.date.startsWith(mPrefix)).forEach(h=>{
    if(!uH[h.uid])uH[h.uid]=0;
    uH[h.uid]+=ch(h.start,h.end);
  });
  const totalH=Object.values(uH).reduce((a,b)=>a+b,0);

  // Tasks done
  const monthKeys=Object.keys(DB.comps||{}).filter(k=>k.startsWith(mPrefix));
  const totalDone=monthKeys.reduce((s,k)=>s+Object.keys(DB.comps[k]).length,0);

  // Maintenance costs
  const maintMonth=(DB.maintLog||[]).filter(l=>{
    const d=new Date(l.closedAt);
    return d.getFullYear()===HY2&&d.getMonth()===HM2;
  });
  const totalCost=maintMonth.reduce((s,l)=>s+(l.cost||0),0);

  // Scores
  const ranked=DB.users.map(u=>({
    name:u.name,emoji:u.emoji,
    pts:gp(u.id),
    hrs:(uH[u.id]||0).toFixed(1),
    tasks:monthKeys.reduce((s,k)=>s+Object.values(DB.comps[k]||{}).filter(v=>v===u.id).length,0)
  })).sort((a,b)=>b.pts-a.pts);

  // Projects status
  const activeProjects=DB.projects.filter(p=>p.status==='active');

  // Build email
  const lines=[
    'שלום,',
    '',
    'סיכום חודשי — '+monthName+' '+HY2,
    '═══════════════════════════',
    '',
    '⏱ שעות עבודה:',
    'סה"כ: '+totalH.toFixed(1)+' שעות',
  ];

  ranked.forEach(u=>{
    lines.push('  '+u.emoji+' '+u.name+': '+u.hrs+" ש' | "+u.tasks+' משימות | '+u.pts+' נקודות');
  });

  lines.push('','✅ משימות שבוצעו: '+totalDone);
  lines.push('');

  if(activeProjects.length){
    lines.push('🗂 פרויקטים פעילים:');
    activeProjects.forEach(p=>{
      const tasks=(p.taskIds||[]).map(id=>([...DB.rT,...DB.oT]).find(t=>t.id===id)).filter(Boolean);
      const today2=tdk();
      const done=tasks.filter(t=>DB.comps[today2]?.[t.id]||t.done).length;
      const pct=Math.round(done/Math.max(tasks.length,1)*100);
      lines.push('  • '+p.title+' — '+pct+'%'+(p.endDate?' (יעד: '+p.endDate+')':''));
    });
    lines.push('');
  }

  if(maintMonth.length){
    lines.push('🔧 תחזוקה שבוצעה:');
    maintMonth.forEach(l=>lines.push('  • '+l.title+' ('+l.closedByName+')'+(l.cost?' — '+l.cost+String.fromCharCode(8362):'')));
    if(totalCost)lines.push('  סה"כ עלויות תחזוקה: '+totalCost+String.fromCharCode(8362));
    lines.push('');
  }

  const shortage=DB.inv.filter(i=>i.qty<i.minQty);
  if(shortage.length){
    lines.push('⚠️ מלאי חסר ('+shortage.length+' פריטים):');
    shortage.forEach(i=>lines.push('  • '+i.icon+' '+i.name+' — יש: '+i.qty+' '+i.unit+' (מינ: '+i.minQty+')'));
    lines.push('');
  }

  lines.push('🌾 שירת האדמה');

  const admin=DB.users.find(u=>u.role==='מנהל');
  if(!admin||!admin.email) return;

  const ok=await sendEmail(admin.email, admin.name, 'סיכום חודשי — '+monthName+' '+HY2, lines.join('\n'));
  if(ok){
    if(!DB.emailLog)DB.emailLog={};
    DB.emailLog['monthly-'+mKey]='sent';
    save();
    toast('סיכום חודשי נשלח למייל ✓',4000);
  }
}

async function checkAndSendMonthlySummary(){
  if(ME.role!=='מנהל') return;
  await sendMonthlySummary();
}

// START
async function init(){
  showLoading();
  const ok = await loadFromFirebase();
  if(!ok){
    document.getElementById('root').innerHTML='<div style="padding:20px;text-align:center;color:red">שגיאה בחיבור ל-Firebase. בדוק חיבור אינטרנט.</div>';
    return;
  }
  if(DB.users.length===0){
    renderFirstAdmin();
    return;
  }
  // Check saved credentials against FIREBASE data (not cache)
  let creds=null;
  try{creds=JSON.parse(localStorage.getItem('sheirat_creds')||'null');}catch{}
  if(creds){
    const u=DB.users.find(u=>u.email===creds.email&&u.pass===creds.pass);
    if(u){ME=u;renderApp();return;}
    localStorage.removeItem('sheirat_creds');
  }
  renderLogin();
}

function renderFirstAdmin(){
  const root=document.getElementById('root');root.innerHTML='';
  let selE=EMOJIS[0];
  const nm=finp({placeholder:'שם מנהל',className:'inp'});
  const em2=finp({type:'email',placeholder:'your@email.com',className:'inp'});
  const pw2=finp({type:'password',placeholder:'לפחות 4 תווים',className:'inp'});
  const err=el('div',{className:'err'});
  const epg=el('div',{className:'ep-grid'});
  EMOJIS.forEach((e,i)=>{
    const s=el('span',{className:'ep-item'+(i===0?' sel':'')},e);
    s.addEventListener('click',()=>{epg.querySelectorAll('.ep-item').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');selE=e;});
    epg.appendChild(s);
  });
  const reg=async ()=>{
    const name=nm.value.trim(),email=em2.value.trim().toLowerCase(),pass=pw2.value;
    if(!name){err.textContent='חסר שם';return;}
    if(!email.includes('@')){err.textContent='מייל לא תקין';return;}
    if(pass.length<4){err.textContent='סיסמה קצרה';return;}
    const u={id:'u'+Date.now(),name,email,pass,emoji:selE,color:COLS[0],role:'מנהל'};
    DB.users.push(u);
    await setDoc(DOC, DB);
    localStorage.setItem('sheirat_creds',JSON.stringify({email,pass}));
    ME=u;renderApp();
  };
  root.appendChild(el('div',{className:'auth'},[el('div',{className:'auth-box'},[
    el('div',{className:'auth-logo'},[el('div',{style:{fontSize:'48px',marginBottom:'6px'}},'🌱'),el('h1',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900}},'יצירת חשבון מנהל'),el('p',{style:{color:'var(--clay)',fontSize:'12px',marginTop:'3px'}},'הגדרה ראשונית')]),
    el('label',{className:'lbl'},'שמך'),nm,
    el('label',{className:'lbl'},'מייל'),em2,
    el('label',{className:'lbl'},'סיסמה'),pw2,
    el('label',{className:'lbl'},'אמוג׳י'),epg,err,
    el('button',{className:'btn-main',onclick:reg},'צור חשבון מנהל ←'),
  ])]));
}

init();
</script>
