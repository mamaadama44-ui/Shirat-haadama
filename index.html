<title>🌾 שירת האדמה</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--earth:#1a1205;--soil:#2d1a08;--gold:#e8b84b;--sage:#6a9a5a;--cream:#f5edd8;--parch:#e8d8b8;--mist:#ede0c4;--red:#C85A3A;--white:#fdfaf3;--clay:#6b3d1a;--straw:#b8832a}
body{font-family:'Heebo',sans-serif;background:var(--cream);color:var(--earth);direction:rtl;min-height:100vh}
button{cursor:pointer;font-family:inherit;border:none}
input,select,textarea{font-family:inherit;direction:rtl}
input[type=email],input[type=password],input[type=time],input[type=date],input[type=number]{direction:ltr;text-align:left}
.auth{min-height:100vh;background:linear-gradient(160deg,var(--earth),#1e1008 40%,#0e1a0a);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:rgba(253,250,243,.97);border-radius:20px;padding:32px;width:100%;max-width:360px;box-shadow:0 40px 80px rgba(0,0,0,.5)}
.auth-logo{text-align:center;margin-bottom:22px}
.lbl{display:block;font-size:10px;font-weight:700;color:var(--clay);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.07em}
.inp{width:100%;padding:11px 13px;border:1.5px solid var(--parch);border-radius:9px;font-size:14px;outline:none;background:var(--white)}
.inp:focus{border-color:var(--sage)}
.err{color:var(--red);font-size:12px;margin-top:5px;min-height:18px}
.btn-main{display:block;width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--red),#a84a2f);color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:14px}
.auth-sw{text-align:center;margin-top:12px;font-size:12px;color:var(--clay)}
.auth-sw a{color:var(--red);cursor:pointer;font-weight:700}
.ep-grid{display:flex;gap:7px;flex-wrap:wrap;margin:5px 0}
.ep-item{font-size:22px;cursor:pointer;padding:4px;border-radius:7px}
.ep-item.sel{background:rgba(106,154,90,.2)}
.app-hdr{background:linear-gradient(135deg,var(--earth),var(--soil));padding:12px 14px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.35)}
.hdr-top{display:flex;justify-content:space-between;align-items:center;max-width:720px;margin:0 auto;padding-bottom:10px}
.brand{color:var(--gold);font-family:'Frank Ruhl Libre',serif;font-size:18px;font-weight:900}
.u-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:18px;padding:4px 10px 4px 7px;cursor:pointer;border:1px solid rgba(232,184,75,.2)}
.u-pill .nm{color:rgba(245,237,216,.85);font-size:12px;font-weight:600}
.u-pill .pts{color:var(--gold);font-size:10px;font-weight:700;background:rgba(232,184,75,.15);padding:1px 6px;border-radius:10px}
.prog-w{max-width:720px;margin:0 auto;padding-bottom:8px}
.prog-bg{height:2px;background:rgba(255,255,255,.08);border-radius:2px}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--sage),var(--gold));transition:width .6s}
.tabs-w{max-width:720px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs-w::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 10px;background:none;border:none;color:rgba(245,237,216,.45);font-weight:500;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab-btn.on{color:var(--gold);font-weight:700;border-bottom-color:var(--gold)}
.app-main{max-width:720px;margin:0 auto;padding:14px 12px 80px}
.card{background:var(--white);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,18,5,.12);border:1px solid rgba(232,216,184,.4)}
.card-t{font-family:'Frank Ruhl Libre',serif;font-size:15px;font-weight:700;color:var(--earth);margin-bottom:10px}
.chips{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.chip{padding:4px 10px;border-radius:16px;border:none;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.flab{display:block;font-size:10px;font-weight:700;color:var(--sage);margin:8px 0 3px;text-transform:uppercase}
.finp{width:100%;padding:9px 12px;border:1.5px solid var(--parch);border-radius:8px;font-size:13px;outline:none;background:var(--white);margin-bottom:2px}
.finp:focus{border-color:var(--sage)}
.finp[type=date],.finp[type=time],.finp[type=number]{direction:ltr;text-align:left}
textarea.finp{resize:vertical;line-height:1.5}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-g{background:var(--sage);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-r{background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer}
.btn-lt{background:var(--mist);color:var(--soil);border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer}
.w100{width:100%;padding:12px;font-size:14px;display:block}
.pbar{height:5px;background:var(--mist);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .6s}
.t-row{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid var(--mist);cursor:pointer}
.t-row:last-child{border-bottom:none}
.pts-bdg{font-size:10px;color:var(--gold);font-weight:800;background:rgba(232,184,75,.12);padding:2px 7px;border-radius:10px;border:1px solid rgba(232,184,75,.25)}
.inv-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--mist)}
.inv-row:last-child{border-bottom:none}
.h-card{background:var(--white);border-radius:12px;overflow:hidden;margin-bottom:10px;box-shadow:0 2px 12px rgba(26,18,5,.12)}
.h-head{padding:13px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--mist)}
.h-body{padding:10px 14px}
.h-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--mist);font-size:12px}
.h-row:last-child{border-bottom:none}
.score-card{background:linear-gradient(135deg,var(--earth),var(--soil),#1a2a10);border-radius:12px;padding:18px;margin-bottom:10px;border:1px solid rgba(232,184,75,.25)}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.lb-row:last-child{border-bottom:none}
.act-item{background:var(--white);border-radius:10px;padding:12px;margin-bottom:7px;box-shadow:0 2px 12px rgba(26,18,5,.12);display:flex;gap:10px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--white);border-radius:16px;padding:22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--earth);color:var(--gold);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;transition:transform .3s;border:1px solid rgba(232,184,75,.3);white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.sec-t{font-weight:700;font-size:13px;color:var(--earth);margin:13px 0 7px}
.empty{text-align:center;color:#bbb;padding:22px;font-size:13px}
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--earth),#1e1008 40%,#0e1a0a);color:var(--gold)}
.spinner{width:40px;height:40px;border:3px solid rgba(232,184,75,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--sage);position:fixed;bottom:8px;left:8px;opacity:.6;transition:opacity .3s}
.sync-dot.syncing{background:var(--straw);opacity:1;animation:pulse .6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

function setSyncing(v){
  const d=document.getElementById('sdot');
  if(d) v?d.classList.add('syncing'):d.classList.remove('syncing');
}

async function loadFromFirebase(){
  try{
    const snap = await getDoc(DOC);
    if(snap.exists()){
      const data = snap.data();
      DB = {...DEFAULT_DATA,...data};
    } else {
      // First time - save defaults
      await setDoc(DOC, DB);
    }
    return true;
  }catch(e){
    console.error('Firebase load error:',e);
    return false;
  }
}

function save(){
  if(saveTimeout) clearTimeout(saveTimeout);
  setSyncing(true);
  saveTimeout = setTimeout(async ()=>{
    try{
      await setDoc(DOC, DB);
    }catch(e){
      console.error('Firebase save error:',e);
      toast('שגיאת שמירה — בדוק חיבור');
    }
    setSyncing(false);
  }, 800);
}

function at(){return[...DB.rT,...DB.oT];}
function gu(id){return DB.users.find(u=>u.id===id);}
function tdk(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function fd(s){if(!s)return'';return new Date(s+'T00:00:00').toLocaleDateString('he-IL',{day:'numeric',month:'short'});}
function ch(s,e){const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(0,((eh*60+em)-(sh*60+sm))/60);}
function gp(uid){let p=0;Object.values(DB.comps).forEach(dc=>{Object.entries(dc).forEach(([tid,by])=>{if(by!==uid)return;const t=at().find(t=>t.id===tid);if(t)p+=PRI[t.pri]?.pts||5;});});Object.values(DB.bonus||{}).flat().filter(b=>b.uid===uid).forEach(b=>p+=b.pts);p+=at().filter(t=>t.createdBy===uid).length*3;return p;}
// Normalize DB.bonus to an array - Firebase sometimes stores arrays as objects with numeric keys
function bonusArr(){
  const b=DB.bonus;
  if(!b)return[];
  if(Array.isArray(b))return b;
  // It's an object (could be {0:..., 1:...} or {b123:...})
  return Object.values(b).flat().filter(x=>x&&typeof x==='object');
}
// Monthly points for a user, broken down by source
function gpm(uid,year,month){
  const pfx=year+'-'+String(month+1).padStart(2,'0')+'-';
  let tasksPts=0,tasksCount=0;
  const breakdown={high:0,medium:0,low:0,unknown:0};
  Object.keys(DB.comps||{}).filter(k=>k.startsWith(pfx)).forEach(dk=>{
    Object.entries(DB.comps[dk]||{}).forEach(([tid,by])=>{
      if(by!==uid)return;
      const t=at().find(x=>x.id===tid);
      const pri=t?.pri||'medium';
      const pts=PRI[pri]?.pts||5;
      tasksPts+=pts;tasksCount++;
      breakdown[pri]=(breakdown[pri]||0)+pts;
    });
  });
  const bonusList=bonusArr().filter(b=>b.uid===uid&&b.date&&b.date.startsWith(pfx));
  const bonusPts=bonusList.reduce((s,b)=>s+(b.pts||0),0);
  return {total:tasksPts+bonusPts,tasksPts,tasksCount,bonusPts,bonusList,breakdown};
}
// Get a list of {dateKey, taskTitle, taskArea, pri, pts} for monthly tasks done by user
function gpmTasks(uid,year,month){
  const pfx=year+'-'+String(month+1).padStart(2,'0')+'-';
  const out=[];
  Object.keys(DB.comps||{}).filter(k=>k.startsWith(pfx)).sort().reverse().forEach(dk=>{
    Object.entries(DB.comps[dk]||{}).forEach(([tid,by])=>{
      if(by!==uid)return;
      const t=at().find(x=>x.id===tid);
      out.push({dateKey:dk,tid,title:t?.title||'(נמחקה)',area:t?.area||'',pri:t?.pri||'medium',pts:PRI[t?.pri]?.pts||5});
    });
  });
  return out;
}

// DOM helpers
function el(tag,attrs={},kids=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else if(k==='value')e.value=v;
    else if(k!=='key')e.setAttribute(k,v);
  });
  (Array.isArray(kids)?kids.flat():[kids]).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}
function toast(msg,d=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function modal(html){const bg=el('div',{className:'modal-bg'});const box=el('div',{className:'modal'});box.innerHTML=html;bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});document.body.appendChild(bg);return{bg,box};}
function card(ch,st={}){return el('div',{className:'card',style:st},ch);}
function pbar(pct,color,h=5){return el('div',{className:'pbar',style:{height:h+'px'}},[el('div',{className:'pfill',style:{width:Math.min(Math.max(pct,0),100)+'%',background:color}})]);}
function chip(l,active,color,fn){return el('button',{className:'chip',style:{background:active?color:'var(--mist)',color:active?'#fff':'var(--clay)'},onclick:fn},l);}
function empty(t='אין פריטים'){return el('div',{className:'empty'},t);}
function finp(a){const e=el('input',{className:'finp',...a});return e;}
function fsel(opts,val,fn){const e=el('select',{className:'finp'});opts.forEach(([v,l])=>{const o=el('option',{value:v},l);if(v===val)o.selected=true;e.appendChild(o);});if(fn)e.addEventListener('change',ev=>fn(ev.target.value));return e;}
function fta(a){return el('textarea',{className:'finp',...a});}
function btn(l,color,fn,st={}){return el('button',{className:'btn-g',style:{background:color,...st},onclick:fn},l);}

// AUTH - LOGIN ONLY (no public registration)
function renderLogin(){
  const root=document.getElementById('root');root.innerHTML='';
  let creds=null;try{creds=JSON.parse(localStorage.getItem('sheirat_creds')||'null');}catch{}
  if(creds){
    const u=DB.users.find(u=>u.email===creds.email&&u.pass===creds.pass);
    if(u){ME=u;renderApp();return;}
  }
  const em=finp({type:'email',placeholder:'your@email.com',className:'inp'});
  const pw=finp({type:'password',placeholder:'••••••',className:'inp'});
  const err=el('div',{className:'err'});
  const login=()=>{
    const u=DB.users.find(u=>u.email===em.value.trim().toLowerCase()&&u.pass===pw.value);
    if(!u){err.textContent='מייל או סיסמה שגויים';return;}
    localStorage.setItem('sheirat_creds',JSON.stringify({email:em.value.trim().toLowerCase(),pass:pw.value}));
    ME=u;renderApp();
  };
  em.addEventListener('keydown',e=>e.key==='Enter'&&login());
  pw.addEventListener('keydown',e=>e.key==='Enter'&&login());
  root.appendChild(el('div',{className:'auth'},[el('div',{className:'auth-box'},[
    el('div',{className:'auth-logo'},[
      el('div',{style:{fontSize:'48px',marginBottom:'6px'}},'🌾'),
      el('h1',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'24px',fontWeight:900,color:'var(--earth)'}},'שירת האדמה'),
      el('p',{style:{color:'var(--clay)',fontSize:'12px',marginTop:'3px'}},'מערכת ניהול חווה')
    ]),
    el('label',{className:'lbl'},'מייל'),em,
    el('label',{className:'lbl'},'סיסמה'),pw,err,
    el('button',{className:'btn-main',onclick:login},'כניסה ←'),
    DB.users.length===0?el('div',{className:'auth-sw',style:{marginTop:'12px',fontSize:'12px',color:'var(--clay)',background:'var(--mist)',borderRadius:'8px',padding:'10px'}},'פנה למנהל לקבלת פרטי כניסה'):el('span'),
    creds?el('div',{style:{textAlign:'center',marginTop:'8px',fontSize:'11px',color:'var(--clay)'}},[el('a',{style:{cursor:'pointer',textDecoration:'underline'},onclick:()=>{localStorage.removeItem('sheirat_creds');em.value='';pw.value=''}},'כניסה עם חשבון אחר')]):el('span'),
  ])]));
}

  const TABS=[{id:'tasks',l:'📋 משימות'},{id:'act',l:'📋 פעילות'},{id:'inv',l:'📦 מלאי'},{id:'maint',l:'🔧 תחזוקה'},{id:'score',l:'🏆 ניקוד'},{id:'proj',l:'🗂 פרויקטים'},{id:'team',l:'👥 צוות'},{id:'jour',l:'📔 יומן'},{id:'sum',l:'📊 סיכום'},{id:'garden',l:'🌱 עונות'}];
  TABS.forEach(t=>{
    const b=el('button',{className:'tab-btn'+(t.id===TAB?' on':''),onclick:()=>{TAB=t.id;tw.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');renderTab(main,pf);}},t.l);
    tw.appendChild(b);
  });
  root.appendChild(hdr);root.appendChild(main);
  const updateDate=()=>{const d=document.getElementById('hdate');if(d)d.textContent=new Date().toLocaleDateString('he-IL',{weekday:'short',day:'numeric',month:'long'});};
  updateDate();setInterval(updateDate,60000);
  renderTab(main,pf);
  window._pf=pf;window._main=main;
  // Check daily digest
  setTimeout(()=>checkAndSendDailyDigest(),3000);
  // Check monthly summary
  setTimeout(()=>checkAndSendMonthlySummary(),8000);
  // Check garden reminder
  setTimeout(()=>checkAndSendGardenEmail(),12000);

  setTimeout(()=>checkMonthlyResetNotice(),1500);

function renderTab(mainEl,pfEl){
  const main=mainEl||document.getElementById('app-main');
  const pf=pfEl||window._pf;
  if(!main)return;
  main.innerHTML='';
  if(TAB==='tasks')rTasks(main);
  else if(TAB==='act')rActivity(main);
  else if(TAB==='inv')rInventory(main);
  else if(TAB==='maint')rMaintenance(main);
  else if(TAB==='score')rScore(main);
  else if(TAB==='proj')rProjects(main);
  else if(TAB==='team')rTeam(main);
  else if(TAB==='jour')rJournal(main);
  else if(TAB==='sum')rSummary(main);
  else if(TAB==='garden')rGarden(main);
  else {TAB='tasks';rTasks(main);}
  if(pf){
    const today=tdk();const dayComps=DB.comps[today]||{};
    const todayTasks=DB.rT.length+DB.oT.filter(t=>!t.done).length;
    const done=Object.keys(dayComps).length;
    pf.style.width=Math.round(Math.min(done/Math.max(todayTasks,1)*100,100))+'%';
  }
  const hpts=document.getElementById('hpts');
  if(hpts){
    const now=new Date();
    const mpts=gpm(ME.id,now.getFullYear(),now.getMonth()).total;
    hpts.innerHTML='';
    hpts.appendChild(el('span',{style:{fontSize:'13px',fontWeight:800,color:'var(--gold)'}},mpts+'\u2605'));
    hpts.appendChild(el('span',{style:{fontSize:'8px',opacity:.65,fontWeight:600}},'סה"כ '+gp(ME.id)));
  }
}

function toggle(tid){
  const today=tdk();
  if(!DB.comps[today])DB.comps[today]={};
  const t=at().find(x=>x.id===tid);
  if(DB.comps[today][tid]){delete DB.comps[today][tid];al('undo','בוטל: '+(t?t.title:''),'',t?t.area:'');}
  else{DB.comps[today][tid]=ME.id;al('done','בוצע: '+(t?t.title:''),'',t?t.area:'');}
  save();renderTab();
}

function noteTask(tid){
  const t=at().find(x=>x.id===tid);if(!t)return;
  const notes=DB.taskNotes[tid]||[];
  let html=`<div style="font-family:'Frank Ruhl Libre',serif;font-size:16px;font-weight:700;margin-bottom:10px">${t.title}</div>`;
  notes.slice(-5).forEach(n=>{html+=`<div style="background:var(--mist);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:12px"><div style="font-weight:600;color:var(--clay)">${n.name} · ${new Date(n.ts).toLocaleDateString('he-IL')}</div><div style="margin-top:3px">${n.text}</div></div>`;});
  html+=`<textarea id="nt" placeholder="הוסף הערה..." style="width:100%;border:1.5px solid var(--parch);border-radius:8px;padding:9px;font-size:13px;font-family:inherit;margin-top:8px;outline:none;resize:vertical" rows="3"></textarea><button onclick="(()=>{const v=document.getElementById('nt').value.trim();if(!v)return;if(!DB.taskNotes['${tid}'])DB.taskNotes['${tid}']=[];DB.taskNotes['${tid}'].push({ts:Date.now(),uid:ME.id,name:ME.name,text:v});save();document.querySelector('.modal-bg').remove();toast('הערה נשמרה');renderTab();})()" style="width:100%;padding:10px;background:var(--sage);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;margin-top:8px;font-family:inherit">שמור</button>`;
  modal(html);
}

function mkRow(t,done,todayComps,showTime){
  const assignedUser=t.uid?gu(t.uid):null;
  const whoDidIt=todayComps[t.id]?gu(todayComps[t.id]):null;
  const notes=(DB.taskNotes||{})[t.id]||[];
  const logs=(DB.taskLog||{})[t.id]||[];
  const journalCount=notes.length+logs.length;
  const schedStr=(t.scheduledDate&&showTime)?`${fd(t.scheduledDate)}${t.scheduledTime?' '+t.scheduledTime:''}`:'';

  const r=el('div',{style:{display:'flex',alignItems:'flex-start',gap:'8px',padding:'10px 0',borderBottom:'1px solid var(--mist)'}});
  const cb=el('div',{style:{width:'22px',height:'22px',border:`2px solid ${done?PRI[t.pri]?.c||'var(--sage)':'var(--parch)'}`,borderRadius:'6px',background:done?(PRI[t.pri]?.c||'var(--sage)'):'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:'2px',cursor:'pointer',transition:'all .2s'}},done?el('span',{style:{color:'#fff',fontSize:'13px'}},'✓'):'');
  cb.onclick=()=>toggle(t.id);
  r.appendChild(cb);
  const info=el('div',{style:{flex:1,minWidth:0}});
  info.appendChild(el('div',{style:{fontWeight:done?400:600,textDecoration:done?'line-through':'none',fontSize:'13px',color:done?'var(--clay)':'var(--earth)'}},t.title));
  const tags=el('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap',marginTop:'3px'}});
  if(AREAS[t.area])tags.appendChild(el('span',{style:{fontSize:'10px',background:AREAS[t.area].c+'18',color:AREAS[t.area].c,padding:'1px 6px',borderRadius:'8px',fontWeight:600}},AREAS[t.area].l));
  if(t.rec&&t.rec!=='specific')tags.appendChild(el('span',{style:{fontSize:'10px',color:'var(--clay)'}},t.rec==='daily'?'יומי':t.rec==='weekly'?'שבועי':'חודשי'));
  if(schedStr)tags.appendChild(el('span',{style:{fontSize:'10px',color:'var(--straw)',fontWeight:600}},'🗓 '+schedStr));
  else if(t.scheduledDate)tags.appendChild(el('span',{style:{fontSize:'10px',color:new Date(t.scheduledDate+'T00:00:00')<new Date()&&!done?'var(--red)':'var(--clay)'}},'עד '+fd(t.scheduledDate)));
  else if(t.due)tags.appendChild(el('span',{style:{fontSize:'10px',color:new Date(t.due+'T00:00:00')<new Date()&&!done?'var(--red)':'var(--clay)'}},'עד '+fd(t.due)));
  if(assignedUser)tags.appendChild(el('span',{style:{fontSize:'11px'}},assignedUser.emoji));
  if(whoDidIt&&done)tags.appendChild(el('span',{className:'pts-bdg'},whoDidIt.emoji+' +'+(PRI[t.pri]?.pts||5)));
  info.appendChild(tags);
  r.appendChild(info);
  const btns=el('div',{style:{display:'flex',gap:'2px',flexShrink:0}});
  btns.appendChild(el('button',{style:{background:'none',border:'none',fontSize:'14px',cursor:'pointer',opacity:.7,padding:'2px 3px'},onclick:(e)=>{e.stopPropagation();openTaskJournal(t.id);}},'\uD83D\uDCD3'+(journalCount?' '+journalCount:'')));
  if(ME.role==='מנהל'){
    btns.appendChild(el('button',{style:{background:'none',border:'none',fontSize:'13px',cursor:'pointer',opacity:.6,padding:'2px 3px'},onclick:(e)=>{e.stopPropagation();editTask(t);}},'✏️'));
    btns.appendChild(el('button',{style:{background:'none',border:'none',fontSize:'13px',cursor:'pointer',opacity:.4,padding:'2px 3px'},onclick:(e)=>{e.stopPropagation();if(!confirm('למחוק?'))return;DB.rT=DB.rT.filter(x=>x.id!==t.id);DB.oT=DB.oT.filter(x=>x.id!==t.id);save();renderTab();}},'\uD83D\uDDD1'));
  }
  r.appendChild(btns);
  return r;
}

function editTask(t){
  const isRec=DB.rT.some(x=>x.id===t.id);
  const bg=el('div',{className:'modal-bg'});
  const box=el('div',{className:'modal'});
  box.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'15px',fontWeight:700,marginBottom:'12px'}},'✏️ עריכת משימה'));
  const titleInp=finp({value:t.title,placeholder:'כותרת'});
  const areaS=fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),t.area||'animals');
  const priS=fsel(Object.entries(PRI).map(([k,v])=>[k,v.l]),t.pri||'medium');
  const uidS=fsel([['','ללא'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],t.uid||'');
  box.appendChild(el('div',{className:'flab'},'כותרת'));box.appendChild(titleInp);
  box.appendChild(el('div',{className:'flab'},'אזור'));box.appendChild(areaS);
  box.appendChild(el('div',{className:'flab'},'עדיפות'));box.appendChild(priS);
  box.appendChild(el('div',{className:'flab'},'משויך ל'));box.appendChild(uidS);
  const dr=el('div',{className:'fgrid'});
  const dateInp=finp({type:'date',value:t.scheduledDate||''});
  const timeInp=finp({type:'time',value:t.scheduledTime||'08:00'});
  dr.appendChild(el('div',{},[el('div',{className:'flab'},'תאריך מתוזמן'),dateInp]));
  dr.appendChild(el('div',{},[el('div',{className:'flab'},'שעה'),timeInp]));
  box.appendChild(dr);
  const dueDateInp=finp({type:'date',value:t.dueDate||t.due||''});
  box.appendChild(el('div',{className:'flab'},'תאריך יעד (חייב להסתיים עד)'));
  box.appendChild(dueDateInp);
  if(isRec){
    const recS=fsel([['daily','יומי'],['weekly','שבועי'],['monthly','חודשי'],['specific','תאריך ספציפי']],t.rec||'daily');
    box.appendChild(el('div',{className:'flab'},'תדירות'));box.appendChild(recS);
    recS.addEventListener('change',e=>{dr.style.display=e.target.value==='specific'?'grid':'none';});
    dr.style.display=t.rec==='specific'?'grid':'none';
  }
  box.appendChild(btn('שמור','var(--sage)',()=>{
    t.title=titleInp.value.trim()||t.title;t.area=areaS.value;t.pri=priS.value;t.uid=uidS.value;
    if(dateInp.value)t.scheduledDate=dateInp.value;
    if(timeInp.value)t.scheduledTime=timeInp.value;
    if(dueDateInp.value){t.dueDate=dueDateInp.value;t.due=dueDateInp.value;}
    save();bg.remove();toast('נשמר \u2713');renderTab();
  },{width:'100%',marginTop:'10px'}));
  box.appendChild(btn('ביטול','var(--mist)',()=>bg.remove(),{width:'100%',marginTop:'6px',color:'var(--soil)'}));
  bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  document.body.appendChild(bg);
}

function openTaskJournal(tid){
  const t=at().find(x=>x.id===tid);if(!t)return;
  if(!DB.taskNotes)DB.taskNotes={};if(!DB.taskLog)DB.taskLog={};
  const notes=(DB.taskNotes[tid]||[]).map(n=>({...n,type:'note'}));
  const logs=(DB.taskLog[tid]||[]).map(l=>({...l,type:'log'}));
  const all=[...notes,...logs].sort((a,b)=>a.ts-b.ts);
  const bg=el('div',{className:'modal-bg'});
  const box=el('div',{className:'modal'});
  box.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'15px',fontWeight:700,marginBottom:'10px'}},'\uD83D\uDCD3 '+t.title));
  if(all.length){
    const hist=el('div',{style:{maxHeight:'220px',overflowY:'auto',marginBottom:'12px'}});
    all.forEach(item=>{
      const u=gu(item.uid||item.userId);
      hist.appendChild(el('div',{style:{background:item.type==='log'?'#e8f5e4':'var(--mist)',borderRadius:'8px',padding:'8px 10px',marginBottom:'6px',fontSize:'12px'}},[
        el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'3px'}},[
          el('span',{style:{fontWeight:600,color:item.type==='log'?'var(--sage)':'var(--clay)'}},
            (u?u.name:'')+(item.type==='log'?' — ביצע':' — הערה')),
          el('span',{style:{color:'var(--clay)',fontSize:'11px'}},new Date(item.ts).toLocaleDateString('he-IL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}))
        ]),
        el('div',{style:{lineHeight:1.5}},item.text||item.detail||'')
      ]));
    });
    box.appendChild(hist);
  } else {
    box.appendChild(el('div',{style:{color:'var(--clay)',fontSize:'12px',marginBottom:'10px',textAlign:'center'}},'אין היסטוריה עדיין'));
  }
  box.appendChild(el('div',{className:'flab'},'הוסף הערה'));
  const ta=fta({placeholder:'מה קרה? הערה על הביצוע...',style:{minHeight:'70px'}});
  box.appendChild(ta);
  const typeS=fsel([['note','הערה כללית'],['log','דיווח ביצוע']],'note');
  box.appendChild(el('div',{className:'flab'},'סוג'));box.appendChild(typeS);
  box.appendChild(btn('שמור','var(--sage)',()=>{
    const v=ta.value.trim();if(!v)return;
    const entry={ts:Date.now(),uid:ME.id,name:ME.name,text:v};
    if(typeS.value==='log'){
      if(!DB.taskLog[tid])DB.taskLog[tid]=[];
      DB.taskLog[tid].push({...entry,type:'log',userId:ME.id,userName:ME.name});
    } else {
      if(!DB.taskNotes[tid])DB.taskNotes[tid]=[];
      DB.taskNotes[tid].push(entry);
    }
    save();bg.remove();toast('נשמר \u2713');renderTab();
  },{width:'100%',marginTop:'6px'}));
  box.appendChild(btn('סגור','var(--mist)',()=>bg.remove(),{width:'100%',marginTop:'6px',color:'var(--soil)'}));
  bg.appendChild(box);bg.addEventListener('click',e=>{if(e.target===bg)bg.remove();});
  document.body.appendChild(bg);
}

function rTasks(main){

  // Filter tabs
  // Add task button (manager)
  if(ME.role==='מנהל'){
    main.appendChild(btn('➕ הוסף משימה','var(--red)',()=>{
      const bg2=el('div',{className:'modal-bg'});
      const box2=el('div',{className:'modal'});

      box2.appendChild(el('div',{className:'flab'},'כותרת'));box2.appendChild(ti2);
      box2.appendChild(el('div',{className:'fgrid'},[
        el('div',{},[el('div',{className:'flab'},'אזור'),fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),'animals',v=>{qArea=v;})]),
        el('div',{},[el('div',{className:'flab'},'עדיפות'),fsel(Object.entries(PRI).map(([k,v])=>[k,v.l]),'medium',v=>{qPri=v;})]),
      ]));
      box2.appendChild(el('div',{className:'flab'},'תדירות'));box2.appendChild(recSel);
      box2.appendChild(dRow);
      box2.appendChild(el('div',{className:'flab'},'משויך ל'));
      box2.appendChild(fsel([['','ללא שיוך'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],'',v=>{qUid=v;}));
      box2.appendChild(btn('הוסף','var(--sage)',()=>{
        const title=ti2.value.trim();if(!title){toast('חסרה כותרת');return;}
        if(qRec==='once'){
          DB.oT.push({id:'o'+Date.now(),title,area:qArea,pri:qPri,uid:qUid,scheduledDate:qDate.value,scheduledTime:qTime.value,due:qDate.value,done:false,doneAt:null,createdBy:ME.id});
        } else {
          DB.rT.push({id:'r'+Date.now(),title,area:qArea,pri:qPri,rec:qRec,uid:qUid,createdBy:ME.id});
        }
        save();bg2.remove();toast('משימה נוספה ✓');renderTab();
      },{width:'100%',marginTop:'10px'}));
      box2.appendChild(btn('ביטול','var(--mist)',()=>bg2.remove(),{width:'100%',marginTop:'6px',color:'var(--soil)'}));
      bg2.appendChild(box2);bg2.addEventListener('click',e=>{if(e.target===bg2)bg2.remove();});
      document.body.appendChild(bg2);
    },{width:'100%',marginBottom:'10px'}));
  }

  const filterCard=card([
    el('div',{className:'chips'},[
      chip('הכל',STAB==='all','var(--earth)',()=>{STAB='all';renderTab();}),
      chip('שלי',STAB==='mine','var(--red)',()=>{STAB='mine';renderTab();}),
      ...Object.entries(AREAS).map(([k,v])=>chip(v.l,STAB===k,v.c,()=>{STAB=k;renderTab();})),
    ])
  ]);
  main.appendChild(filterCard);

  // Progress
  const todayProg=DB.rT.length+DB.oT.filter(t=>!t.done).length;
  const doneCount=Object.keys(todayComps).length;
  main.appendChild(card([
    el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},[
      el('div',{style:{fontWeight:700}},`היום — ${new Date().toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'})}`),
      el('div',{style:{fontSize:'13px',fontWeight:700,color:'var(--sage)'}},`${doneCount}/${todayProg} ✓`)
    ]),
    pbar(Math.round(doneCount/Math.max(todayProg,1)*100),'var(--sage)',8)
  ]));

  // Get tasks based on filter
  let recurringTasks=[...DB.rT];
  let onceTasks=[...DB.oT.filter(t=>!t.done)];
  if(STAB==='mine'){
    recurringTasks=recurringTasks.filter(t=>todayComps[t.id]===ME.id||t.uid===ME.id);
    onceTasks=onceTasks.filter(t=>todayComps[t.id]===ME.id||t.uid===ME.id);
  } else if(STAB!=='all'){
    recurringTasks=recurringTasks.filter(t=>t.area===STAB);
    onceTasks=onceTasks.filter(t=>t.area===STAB);
  }

  // Group recurring by area
  const areaGroups={};
  recurringTasks.forEach(t=>{
    if(!areaGroups[t.area])areaGroups[t.area]=[];
    areaGroups[t.area].push(t);
  });

  Object.entries(areaGroups).forEach(([areaKey,tasks])=>{
    const area=AREAS[areaKey];
    if(!area||!tasks.length)return;
    const pending=tasks.filter(t=>!todayComps[t.id]);
    const done=tasks.filter(t=>todayComps[t.id]);
    const areaCard=card([
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'14px',fontWeight:700,color:area.c}},area.l),
        el('span',{style:{fontSize:'11px',color:done.length===tasks.length?'var(--sage)':'var(--clay)',fontWeight:600}},`${done.length}/${tasks.length}`)
      ]),
      ...pending.map(t=>mkRow(t,false,todayComps)),
      ...done.map(t=>mkRow(t,true,todayComps)),
    ]);
    main.appendChild(areaCard);
  });

  // One-time tasks
  if(onceTasks.length){
    main.appendChild(card([
      el('div',{className:'card-t'},'📌 משימות חד-פעמיות'),
      ...onceTasks.map(t=>mkRow(t,todayComps[t.id]||t.done,todayComps))
    ]));
  }

  if(!recurringTasks.length&&!onceTasks.length) main.appendChild(empty('אין משימות'));

  // Completed today
  const allDone=Object.entries(todayComps);
  if(allDone.length&&STAB==='all'){
    main.appendChild(card([
      el('div',{className:'card-t',style:{color:'var(--sage)'}},'✅ הושלמו היום'),
      ...allDone.map(([tid])=>{
        const t=at().find(x=>x.id===tid);
        return t?mkRow(t,true,todayComps):'';
      }).filter(Boolean)
    ]));
  }

  // Manager: add tasks
  if(ME.role==='מנהל'){
    // Add recurring task
    const rc=card([el('div',{className:'card-t'},'➕ הוסף משימה קבועה')]);
    const rt=finp({placeholder:'תיאור המשימה'});
    let rArea='animals',rPri='medium',rRec='daily',rUid='';
    rc.appendChild(el('div',{className:'flab'},'כותרת'));rc.appendChild(rt);
    rc.appendChild(el('div',{className:'flab'},'אזור'));
    rc.appendChild(fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),'animals',v=>{rArea=v;}));
    rc.appendChild(el('div',{className:'flab'},'עדיפות'));
    rc.appendChild(fsel(Object.entries(PRI).map(([k,v])=>[k,v.l]),'medium',v=>{rPri=v;}));
    rc.appendChild(el('div',{className:'flab'},'תדירות'));
    rc.appendChild(fsel([['daily','יומי'],['weekly','שבועי'],['monthly','חודשי']],'daily',v=>{rRec=v;}));
    rc.appendChild(el('div',{className:'flab'},'משויך ל'));
    rc.appendChild(fsel([['','ללא'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],'',v=>{rUid=v;}));
    rc.appendChild(btn('הוסף משימה קבועה','var(--sage)',()=>{
      const title=rt.value.trim();
      if(!title){toast('חסרה כותרת');return;}
      const t={id:'r'+Date.now(),title,area:rArea,pri:rPri,rec:rRec,uid:rUid,createdBy:ME.id};
      // If maintenance - also add to equip view
      DB.rT.push(t);
      save();toast('משימה קבועה נוספה ✓');renderTab();
    },{width:'100%',marginTop:'8px'}));
    main.appendChild(rc);

    // Add one-time task
    const oc=card([el('div',{className:'card-t'},'➕ הוסף משימה חד-פעמית')]);
    const ot=finp({placeholder:'תיאור המשימה'});
    let oArea='animals',oPri='medium',oUid='',oDue='';
    oc.appendChild(el('div',{className:'flab'},'כותרת'));oc.appendChild(ot);
    oc.appendChild(el('div',{className:'flab'},'אזור'));
    oc.appendChild(fsel(Object.entries(AREAS).map(([k,v])=>[k,v.l]),'animals',v=>{oArea=v;}));
    oc.appendChild(el('div',{className:'flab'},'עדיפות'));
    oc.appendChild(fsel(Object.entries(PRI).map(([k,v])=>[k,v.l]),'medium',v=>{oPri=v;}));
    oc.appendChild(el('div',{className:'flab'},'משויך ל'));
    oc.appendChild(fsel([['','ללא'],...DB.users.map(u=>[u.id,u.emoji+' '+u.name])],'',v=>{oUid=v;}));
    oc.appendChild(el('div',{className:'flab'},'תאריך יעד'));
    const odInput=finp({type:'date'});oc.appendChild(odInput);
    oc.appendChild(btn('הוסף משימה','var(--red)',()=>{
      const title=ot.value.trim();
      if(!title){toast('חסרה כותרת');return;}
      const t={id:'o'+Date.now(),title,area:oArea,pri:oPri,uid:oUid,due:odInput.value||'',done:false,doneAt:null,createdBy:ME.id};
      if(oArea==='maint'){
        // Add as maintenance task and switch tab
        DB.oT.push(t);save();toast('נוסף לתחזוקה ✓');TAB='maint';renderTab();return;
      }
      DB.oT.push(t);save();toast('משימה נוספה ✓');renderTab();
    },{width:'100%',marginTop:'8px'}));
    main.appendChild(oc);
  }
}

          ]),
          el('div',{style:{display:'flex',alignItems:'center',gap:'5px',flexShrink:0}},[

      ...todayHours.map(h=>{

        return el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',borderBottom:'1px solid var(--mist)',fontSize:'13px'}},[
          el('span',{style:{fontSize:'18px'}},u?u.emoji:'👤'),
          el('span',{style:{flex:1}},u?u.name:''),
          el('span',{style:{color:'var(--clay)'}},h.start+'\u2013'+h.end),

      const tasks=(p.taskIds||[]).map(id=>allTasks.find(t=>t.id===id)).filter(Boolean);

        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'30px',fontWeight:900,color:'#fff',marginTop:'2px'}},winner.total+'★'),
        el('div',{style:{fontSize:'11px',color:'rgba(232,216,184,.7)',marginTop:'3px'}},winner.tasksCount+' משימות + '+winner.bonusPts+' בונוס'),
      ]),
    ]));

  }

  // ============ LEADERBOARD ============
  const lbCard=el('div',{className:'card',style:{padding:'14px'}});
  lbCard.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'14px',marginBottom:'12px',display:'flex',alignItems:'center',gap:'6px'}},[
    el('span',{},'🏅'),el('span',{},'לוח המובילים'),
    el('span',{style:{fontSize:'10px',color:'var(--clay)',fontWeight:500,marginRight:'auto'}},isCurrentMonth?'בזמן אמת':'(סגור)')
  ]));

  if(ranked.every(r=>r.total===0)){
    lbCard.appendChild(el('div',{style:{textAlign:'center',color:'var(--clay)',padding:'20px 10px',fontSize:'12px'}},isCurrentMonth?'עוד לא נצברו כוכבים החודש 🌱':'לא היו פעולות בחודש זה'));
  } else {
    ranked.forEach((r,i)=>{
      const pct=Math.round(r.total/maxPts*100);
      const isYou=r.u.id===ME.id;
      const row=el('div',{style:{padding:'10px 4px',borderBottom:i<ranked.length-1?'1px solid var(--mist)':'none',cursor:'pointer',borderRadius:'6px',transition:'background .15s'},onmouseover:e=>{e.currentTarget.style.background='rgba(232,216,184,.15)';},onmouseout:e=>{e.currentTarget.style.background='transparent';},onclick:()=>showUserMonthDetail(r.u.id,HY,HM)});
      row.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},[
        el('div',{style:{width:'28px',textAlign:'center',fontSize:i<3?'20px':'14px',fontWeight:700,color:i<3?medalColors[i]:'var(--clay)'}},medals[i]||'#'+(i+1)),
        el('div',{style:{width:'40px',height:'40px',borderRadius:'50%',background:r.u.color+'25',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',flexShrink:0,border:isYou?'2px solid var(--sage)':'2px solid transparent'}},r.u.emoji),
        el('div',{style:{flex:1,minWidth:0}},[
          el('div',{style:{fontWeight:700,fontSize:'13px',display:'flex',alignItems:'center',gap:'5px'}},[
            el('span',{},r.u.name),
            isYou?el('span',{style:{fontSize:'9px',background:'var(--sage)',color:'#fff',padding:'1px 5px',borderRadius:'8px',fontWeight:700}},'אתה'):'',
          ]),
          el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'2px'}},r.tasksCount+' משימות'+(r.bonusPts>0?' · +'+r.bonusPts+' בונוס':'')),
        ]),
        el('div',{style:{textAlign:'left',minWidth:'60px'}},[
          el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,color:i===0?'var(--gold)':i===1?'#aaa':i===2?'#b87333':'var(--earth)',lineHeight:'1'}},r.total+'★'),
        ]),
      ]));
      // Progress bar
      const bar=el('div',{style:{height:'4px',background:'var(--mist)',borderRadius:'3px',marginTop:'7px',overflow:'hidden'}});
      bar.appendChild(el('div',{style:{height:'100%',width:pct+'%',background:i===0?'linear-gradient(90deg,var(--gold),#f5cf6e)':i===1?'linear-gradient(90deg,#aaa,#ccc)':i===2?'linear-gradient(90deg,#b87333,#d4894a)':'linear-gradient(90deg,'+r.u.color+','+r.u.color+'aa)',transition:'width .4s'}}));
      row.appendChild(bar);
      lbCard.appendChild(row);
    });
    lbCard.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)',textAlign:'center',marginTop:'8px',fontStyle:'italic'}},'💡 לחץ על שורה לפירוט מלא'));
  }
  main.appendChild(lbCard);

  // ============ MY BREAKDOWN (current user this month) ============
  if(isCurrentMonth){
    const my=gpm(ME.id,HY,HM);
    if(my.total>0||my.tasksCount>0){
      const myCard=el('div',{className:'card',style:{padding:'14px',background:'linear-gradient(135deg,rgba(106,154,90,.08),rgba(232,184,75,.08))'}});
      myCard.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'14px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'6px'}},[
        el('span',{},ME.emoji),el('span',{},'הפירוט שלך החודש')
      ]));
      const grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginBottom:'10px'}});
      const stat=(label,val,col,emoji)=>el('div',{style:{background:'var(--white)',borderRadius:'8px',padding:'8px 6px',textAlign:'center',border:'1px solid var(--mist)'}},[
        el('div',{style:{fontSize:'16px',marginBottom:'2px'}},emoji),
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'18px',fontWeight:900,color:col,lineHeight:'1'}},val),
        el('div',{style:{fontSize:'9px',color:'var(--clay)',marginTop:'2px'}},label),
      ]);
      grid.appendChild(stat('סה"כ',my.total+'★','var(--gold)','🌟'));
      grid.appendChild(stat('משימות',my.tasksCount,'var(--sage)','✅'));
      grid.appendChild(stat('בונוסים',my.bonusPts+'★','var(--red)','🎁'));
      myCard.appendChild(grid);
      // Priority breakdown
      const totalPri=my.breakdown.high+my.breakdown.medium+my.breakdown.low;
      if(totalPri>0){
        const priBar=el('div',{style:{display:'flex',height:'10px',borderRadius:'5px',overflow:'hidden',marginBottom:'6px'}});
        if(my.breakdown.high>0)priBar.appendChild(el('div',{style:{width:(my.breakdown.high/totalPri*100)+'%',background:PRI.high.c}}));
        if(my.breakdown.medium>0)priBar.appendChild(el('div',{style:{width:(my.breakdown.medium/totalPri*100)+'%',background:PRI.medium.c}}));
        if(my.breakdown.low>0)priBar.appendChild(el('div',{style:{width:(my.breakdown.low/totalPri*100)+'%',background:PRI.low.c}}));
        myCard.appendChild(priBar);
        myCard.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'10px',color:'var(--clay)'}},[
          el('span',{style:{color:PRI.high.c}},'● גבוהה: '+my.breakdown.high+'★'),
          el('span',{style:{color:PRI.medium.c}},'● בינונית: '+my.breakdown.medium+'★'),
          el('span',{style:{color:PRI.low.c}},'● נמוכה: '+my.breakdown.low+'★'),
        ]));
      }
      main.appendChild(myCard);
    }
  }

  // ============ MONTHLY HISTORY CHART (6 months trend) ============
  const histCard=el('div',{className:'card',style:{padding:'14px'}});
  histCard.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'14px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'6px'}},[
    el('span',{},'📊'),el('span',{},'מגמה חצי-שנתית'),
    el('span',{style:{fontSize:'10px',color:'var(--clay)',fontWeight:500,marginRight:'auto'}},'6 חודשים אחרונים'),
  ]));
  const months6=[];
  for(let m=5;m>=0;m--){
    const d=new Date(now.getFullYear(),now.getMonth()-m,1);
    months6.push({y:d.getFullYear(),m:d.getMonth(),label:MONTHS[d.getMonth()].slice(0,3)});
  }
  // Find global max for proper scaling
  let globalMax=10;
  DB.users.forEach(u=>{
    months6.forEach(({y,m})=>{
      const pts=gpm(u.id,y,m).total;
      if(pts>globalMax)globalMax=pts;
    });
  });
  DB.users.forEach(u=>{
    const row=el('div',{style:{marginBottom:'10px'}});
    row.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'11px',fontWeight:600,marginBottom:'4px'}},[
      el('span',{},u.emoji+' '+u.name),
      el('span',{style:{color:'var(--clay)',fontWeight:500}},months6.reduce((s,{y,m})=>s+gpm(u.id,y,m).total,0)+'★ סה"כ'),
    ]));
    const bars=el('div',{style:{display:'flex',gap:'4px',alignItems:'flex-end',height:'48px',background:'var(--mist)',borderRadius:'6px',padding:'4px'}});
    months6.forEach(({y,m,label})=>{
      const pts=gpm(u.id,y,m).total;
      const h=Math.max(2,Math.round(pts/globalMax*40));
      const isCurr=(y===now.getFullYear()&&m===now.getMonth());
      const barCol=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',flex:1,justifyContent:'flex-end',height:'100%',cursor:'pointer'},onclick:()=>{HM=m;HY=y;renderTab();}});
      const bar=el('div',{style:{width:'100%',height:h+'px',background:u.color,borderRadius:'3px 3px 0 0',opacity:isCurr?1:.7,position:'relative',transition:'opacity .2s'}});
      if(pts>0)bar.appendChild(el('div',{style:{position:'absolute',top:'-13px',left:'50%',transform:'translateX(-50%)',fontSize:'9px',fontWeight:700,color:'var(--earth)',whiteSpace:'nowrap'}},pts));
      barCol.appendChild(bar);
      barCol.appendChild(el('div',{style:{fontSize:'9px',color:isCurr?'var(--earth)':'var(--clay)',marginTop:'3px',fontWeight:isCurr?700:500}},label));
      bars.appendChild(barCol);
    });
    row.appendChild(bars);
    histCard.appendChild(row);
  });
  histCard.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)',textAlign:'center',marginTop:'6px',fontStyle:'italic'}},'💡 לחץ עמודה לקפיצה לחודש'));
  main.appendChild(histCard);

  // ============ ACTIVITY LOG FOR THIS MONTH ============
  const logCard=el('div',{className:'card',style:{padding:'14px'}});
  logCard.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'14px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'6px'}},[
    el('span',{},'📜'),el('span',{},'יומן פעולות החודש')
  ]));
  // Combine all task completions + bonuses for this month
  const events=[];
  Object.keys(DB.comps||{}).filter(k=>k.startsWith(mPrefix)).forEach(dk=>{
    Object.entries(DB.comps[dk]||{}).forEach(([tid,uid])=>{
      const t=at().find(x=>x.id===tid);
      const u=gu(uid);
      events.push({date:dk,type:'task',uid,user:u,title:t?.title||'(נמחקה)',pri:t?.pri||'medium',pts:PRI[t?.pri]?.pts||5,ts:dk});
    });
  });
  (bonusArr()).filter(b=>b.date&&b.date.startsWith(mPrefix)).forEach(b=>{
    const u=gu(b.uid);
    const byUser=gu(b.by);
    events.push({date:b.date,type:'bonus',uid:b.uid,user:u,title:b.note||'בונוס',pts:b.pts,by:byUser,bid:b.id,ts:b.date+'-'+b.id});
  });
  events.sort((a,b)=>b.ts.localeCompare(a.ts));

  if(events.length===0){
    logCard.appendChild(el('div',{style:{textAlign:'center',color:'var(--clay)',padding:'15px',fontSize:'12px'}},'אין פעולות בחודש זה'));
  } else {
    // Show top 10, with "show more" toggle
    const initialShow=10;
    const renderLog=(showAll)=>{
      logCard.querySelectorAll('.log-item, .log-toggle').forEach(n=>n.remove());
      const toShow=showAll?events:events.slice(0,initialShow);
      toShow.forEach(ev=>{
        const item=el('div',{className:'log-item',style:{display:'flex',alignItems:'center',gap:'8px',padding:'7px 4px',borderBottom:'1px solid var(--mist)',fontSize:'12px'}},[
          el('div',{style:{width:'28px',height:'28px',borderRadius:'50%',background:(ev.user?.color||'#999')+'25',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'15px',flexShrink:0}},ev.user?.emoji||'❓'),
          el('div',{style:{flex:1,minWidth:0}},[
            el('div',{style:{fontSize:'12px',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},[
              ev.type==='bonus'?el('span',{style:{color:'var(--red)',fontSize:'10px',background:'rgba(200,90,58,.12)',padding:'1px 5px',borderRadius:'6px',marginLeft:'4px',fontWeight:700}},'🎁 בונוס'):'',
              el('span',{},ev.title),
            ]),
            el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'1px'}},[
              el('span',{},(ev.user?.name||'?')+' · '+fd(ev.date)),
              ev.type==='bonus'&&ev.by?el('span',{},' · מעניק: '+ev.by.name):'',
            ]),
          ]),
          el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'14px',fontWeight:800,color:ev.type==='bonus'?'var(--red)':PRI[ev.pri]?.c||'var(--earth)',whiteSpace:'nowrap'}},'+'+ev.pts+'★'),
          // Manager can remove bonus
          isManager&&ev.type==='bonus'?el('button',{style:{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:'13px',padding:'2px'},onclick:e=>{e.stopPropagation();if(confirm('להסיר את הבונוס "'+ev.title+'" ('+ev.pts+'★)?')){DB.bonus=bonusArr().filter(b=>b.id!==ev.bid);save();toast('הבונוס הוסר');renderTab();}}},'🗑'):'',
        ]);
        logCard.appendChild(item);
      });
      if(events.length>initialShow){
        const tg=el('div',{className:'log-toggle',style:{textAlign:'center',marginTop:'8px'}},[
          el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'8px',padding:'5px 14px',fontSize:'11px',cursor:'pointer',color:'var(--earth)',fontWeight:600},onclick:()=>renderLog(!showAll)},showAll?'הצג פחות ▲':'הצג עוד ('+(events.length-initialShow)+') ▼')
        ]);
        logCard.appendChild(tg);
      }
    };
    renderLog(false);
  }
  main.appendChild(logCard);

  // ============ ARCHIVE - PAST MONTHS WINNERS ============
  const archiveMonths=[];
  const now2=new Date();
  for(let i=1;i<=12;i++){
    const d=new Date(now2.getFullYear(),now2.getMonth()-i,1);
    const y=d.getFullYear(),m=d.getMonth();
    // Check if any activity that month
    const hasActivity=DB.users.some(u=>gpm(u.id,y,m).total>0);
    if(hasActivity){
      const winners=DB.users.map(u=>({u,total:gpm(u.id,y,m).total})).sort((a,b)=>b.total-a.total);
      archiveMonths.push({y,m,winners});
    }
  }
  if(archiveMonths.length>0){
    const archCard=el('div',{className:'card',style:{padding:'14px'}});
    archCard.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'14px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'6px'}},[
      el('span',{},'📚'),el('span',{},'ארכיון אלופים'),
      el('span',{style:{fontSize:'10px',color:'var(--clay)',fontWeight:500,marginRight:'auto'}},archiveMonths.length+' חודשים'),
    ]));
    archiveMonths.forEach(({y,m,winners})=>{
      const top3=winners.filter(w=>w.total>0).slice(0,3);
      if(top3.length===0)return;
      const ar=el('div',{style:{padding:'8px 4px',borderBottom:'1px solid var(--mist)',cursor:'pointer',borderRadius:'6px',transition:'background .15s'},onmouseover:e=>{e.currentTarget.style.background='rgba(232,216,184,.15)';},onmouseout:e=>{e.currentTarget.style.background='transparent';},onclick:()=>{HM=m;HY=y;renderTab();}});
      ar.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},[
        el('div',{style:{minWidth:'80px',fontSize:'12px',fontWeight:700,color:'var(--earth)'}},MONTHS[m].slice(0,3)+' '+y),
        el('div',{style:{flex:1,display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}},
          top3.map((w,i)=>el('div',{style:{display:'flex',alignItems:'center',gap:'3px',fontSize:'11px'}},[
            el('span',{style:{fontSize:'14px'}},medals[i]),
            el('span',{style:{fontSize:'15px'}},w.u.emoji),
            el('span',{style:{fontWeight:600,color:'var(--earth)'}},w.total+'★'),
          ]))
        ),
        el('span',{style:{color:'var(--clay)',fontSize:'12px'}},'›'),
      ]));
      archCard.appendChild(ar);
    });
    archCard.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)',textAlign:'center',marginTop:'6px',fontStyle:'italic'}},'💡 לחץ חודש לפרטים מלאים'));
    main.appendChild(archCard);
  }

  // ============ BONUS POINTS (manager only, current month only) ============
  if(isManager && (isCurrentMonth || !isPastMonth)){
    const bc=el('div',{className:'card',style:{padding:'14px',border:'1px dashed var(--red)',background:'rgba(200,90,58,.04)'}});
    bc.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'14px',marginBottom:'4px',display:'flex',alignItems:'center',gap:'6px'}},[
      el('span',{},'⭐'),el('span',{},'הענקת בונוס'),
      el('span',{style:{fontSize:'10px',color:'var(--clay)',fontWeight:500,marginRight:'auto'}},'מנהלים בלבד'),
    ]));
    bc.appendChild(el('div',{style:{fontSize:'11px',color:'var(--clay)',marginBottom:'10px'}},'הענק או הורד נקודות עם סיבה'));
    let bUser=DB.users[0]?.id||'';let bPts=10;
    bc.appendChild(el('div',{className:'flab'},'עובד'));
    bc.appendChild(fsel(DB.users.map(u=>[u.id,u.emoji+' '+u.name]),bUser,v=>{bUser=v;}));
    bc.appendChild(el('div',{className:'flab'},'נקודות (שלילי = הורדה)'));
    const bpInp=finp({type:'number',value:'10'});
    bpInp.oninput=e=>{bPts=parseInt(e.target.value)||0;};
    bc.appendChild(bpInp);
    // Quick presets
    const presets=el('div',{style:{display:'flex',gap:'4px',marginTop:'4px',flexWrap:'wrap'}});
    [-10,-5,5,10,20,50].forEach(p=>{
      presets.appendChild(el('button',{style:{background:p<0?'rgba(200,90,58,.12)':'rgba(106,154,90,.12)',color:p<0?'var(--red)':'var(--sage)',border:'1px solid '+(p<0?'rgba(200,90,58,.3)':'rgba(106,154,90,.3)'),borderRadius:'6px',padding:'3px 8px',fontSize:'11px',cursor:'pointer',fontWeight:700,fontFamily:'inherit'},onclick:()=>{bpInp.value=p;bPts=p;}},(p>0?'+':'')+p+'★'));
    });
    bc.appendChild(presets);
    bc.appendChild(el('div',{className:'flab',style:{marginTop:'8px'}},'סיבה'));
    const bnInp=finp({placeholder:'למה הבונוס?'});
    bc.appendChild(bnInp);
    bc.appendChild(btn('הענק נקודות בונוס','var(--straw)',()=>{
      if(!bUser){toast('בחר עובד');return;}
      if(!bPts){toast('הכנס מספר נקודות');return;}
      if(!bnInp.value.trim()){toast('הוסף סיבה');return;}
      if(!DB.bonus||!Array.isArray(DB.bonus))DB.bonus=bonusArr();
      DB.bonus.push({id:'b'+Date.now(),uid:bUser,pts:bPts,note:bnInp.value.trim(),date:today,by:ME.id});
      save();toast((bPts>0?'+':'')+bPts+'★ ניתנו ✓');renderTab();
    },{width:'100%',marginTop:'10px',color:'var(--earth)'}));
    main.appendChild(bc);
  }

  // ============ INFO BOX (how scoring works) ============
  const infoBox=el('div',{style:{background:'var(--mist)',borderRadius:'10px',padding:'12px',marginTop:'10px',fontSize:'11px',color:'var(--clay)',lineHeight:'1.6'}});
  infoBox.appendChild(el('div',{style:{fontWeight:700,color:'var(--earth)',marginBottom:'6px',fontSize:'12px'}},'ℹ️ איך הניקוד עובד?'));
  infoBox.appendChild(el('div',{},[
    el('div',{},'🔴 משימה בעדיפות גבוהה = 10★'),
    el('div',{},'🟡 משימה בעדיפות בינונית = 5★'),
    el('div',{},'🟢 משימה בעדיפות נמוכה = 2★'),
    el('div',{},'🎁 בונוס - מנהל יכול להעניק לפי שיקול דעת'),
    el('div',{style:{marginTop:'4px',fontStyle:'italic'}},'בכל 1 בחודש המונה החודשי מתאפס - אבל הכוכבים נשארים בארכיון לתמיד 📚'),
  ]));
  main.appendChild(infoBox);
}

// Show user's full breakdown for a specific month (modal)
function showUserMonthDetail(uid,year,month){
  const u=gu(uid);if(!u)return;
  const stats=gpm(uid,year,month);
  const tasks=gpmTasks(uid,year,month);
  const bonuses=stats.bonusList;

  const bg=el('div',{className:'modal-bg',onclick:e=>{if(e.target===e.currentTarget)bg.remove();}});
  const m=el('div',{className:'modal',style:{maxWidth:'480px'}});

  // Header
  m.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px',paddingBottom:'12px',borderBottom:'1px solid var(--mist)'}},[
    el('div',{style:{width:'52px',height:'52px',borderRadius:'50%',background:u.color+'25',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px'}},u.emoji),
    el('div',{style:{flex:1}},[
      el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'18px',fontWeight:900,color:'var(--earth)'}},u.name),
      el('div',{style:{fontSize:'11px',color:'var(--clay)'}},MONTHS[month]+' '+year),
    ]),
    el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'50%',width:'30px',height:'30px',fontSize:'16px',cursor:'pointer'},onclick:()=>bg.remove()},'✕'),
  ]));

  // Total stars big
  m.appendChild(el('div',{style:{textAlign:'center',padding:'14px',background:'linear-gradient(135deg,var(--earth),var(--soil))',borderRadius:'12px',marginBottom:'14px'}},[
    el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'42px',fontWeight:900,color:'var(--gold)',lineHeight:'1'}},stats.total+'★'),

    const tlist=el('div',{style:{maxHeight:'180px',overflowY:'auto',background:'var(--mist)',borderRadius:'8px',padding:'6px',marginBottom:'12px'}});
    tasks.forEach(t=>{
      tlist.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'5px 6px',borderBottom:'1px solid rgba(0,0,0,.04)',fontSize:'11px'}},[
        el('span',{style:{width:'8px',height:'8px',borderRadius:'50%',background:PRI[t.pri]?.c||'#999',flexShrink:0}},''),
        el('span',{style:{flex:1,minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},t.title),
        el('span',{style:{color:'var(--clay)',fontSize:'10px'}},fd(t.dateKey)),
        el('span',{style:{fontWeight:800,color:PRI[t.pri]?.c||'var(--earth)',minWidth:'30px',textAlign:'left'}},'+'+t.pts+'★'),
      ]));
    });
    m.appendChild(tlist);
  }

  // Bonuses
  if(bonuses.length>0){
    m.appendChild(el('div',{style:{fontWeight:700,fontSize:'13px',marginBottom:'8px',color:'var(--earth)'}},'🎁 בונוסים ('+bonuses.length+')'));

        el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},[
          el('span',{style:{fontWeight:600,flex:1}},b.note||'(ללא סיבה)'),
          el('span',{style:{fontWeight:800,color:b.pts>0?'var(--sage)':'var(--red)'}},(b.pts>0?'+':'')+b.pts+'★'),
        ]),
        el('div',{style:{fontSize:'9px',color:'var(--clay)',marginTop:'2px'}},fd(b.date)+(byU?' · '+byU.name:'')),
      ]));
    });
    m.appendChild(blist);
  }

  // Priority breakdown
  if(stats.tasksPts>0){
    m.appendChild(el('div',{style:{fontWeight:700,fontSize:'13px',marginBottom:'8px',color:'var(--earth)'}},'📊 פילוח לפי עדיפות'));
    const pgrid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'6px',marginBottom:'8px'}});
    [['high','גבוהה'],['medium','בינונית'],['low','נמוכה']].forEach(([pri,lab])=>{
      pgrid.appendChild(el('div',{style:{background:PRI[pri].c+'15',border:'1px solid '+PRI[pri].c+'40',borderRadius:'8px',padding:'8px',textAlign:'center'}},[
        el('div',{style:{fontSize:'11px',color:'var(--clay)',fontWeight:600}},lab),
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'18px',fontWeight:900,color:PRI[pri].c}},(stats.breakdown[pri]||0)+'★'),
      ]));
    });
    m.appendChild(pgrid);
  }

  bg.appendChild(m);
  document.body.appendChild(bg);
}

      epg.appendChild(s);
    });
    const addBtn=btn('\u2713 \u05d4\u05d5\u05e1\u05e3 \u05e2\u05d5\u05d1\u05d3','var(--red)',async()=>{
      if(!ni.value.trim()||!ei.value||!pi.value){toast('מלא את כל השדות');return;}
      if(DB.users.find(u=>u.email===ei.value.toLowerCase())){toast('מייל כבר קיים');return;}
      if(pi.value.length<4){toast('סיסמא קצרה');return;}
      const newU={id:'u'+Date.now(),name:ni.value.trim(),email:ei.value.toLowerCase(),pass:pi.value,emoji:newE,color:COLS[DB.users.length%COLS.length],role:rl.value};
      DB.users.push(newU);

    },{width:'100%',marginTop:'10px',color:'var(--earth)'});
    ac.appendChild(el('div',{className:'flab'},'שם'));ac.appendChild(ni);

    ac.appendChild(el('div',{className:'flab',style:{marginTop:'6px'}},'תפקיד'));ac.appendChild(rl);
    ac.appendChild(el('div',{className:'flab',style:{marginTop:'6px'}},'אמוג׳י'));ac.appendChild(epg);
    ac.appendChild(addBtn);
    main.appendChild(ac);
  }
}

// Build a single user card with hours summary, edit/delete options
function buildUserCard(u,mPrefix,today,isAdmin,isMe){
  const pts=gp(u.id);
  const mpts=gpm(u.id,HY,HM).total;
  const todayDone=Object.entries(DB.comps[today]||{}).filter(([,v])=>v===u.id).length;
  const myLogs=(DB.hoursLog||[]).filter(h=>h.uid===u.id&&h.date.startsWith(mPrefix));
  const monthHrs=myLogs.reduce((s,h)=>s+ch(h.start,h.end),0);
  const uniqueDays=new Set(myLogs.map(h=>h.date)).size;
  const pct=Math.min(monthHrs/160*100,100);
  const isManager=u.role==='\u05de\u05e0\u05d4\u05dc';

  const c=el('div',{className:'card',style:{padding:'14px',marginBottom:'10px',border:isMe?'2px solid var(--sage)':isManager?'1px solid rgba(200,90,58,.2)':'1px solid var(--mist)',background:isMe?'linear-gradient(135deg,rgba(106,154,90,.05),rgba(232,184,75,.03))':'var(--white)'}});

  // TOP ROW: avatar, name, role badge, edit/delete
  c.appendChild(el('div',{style:{display:'flex',gap:'12px',alignItems:'center',marginBottom:'10px'}},[
    el('div',{style:{width:'48px',height:'48px',borderRadius:'50%',background:u.color+'25',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'24px',flexShrink:0,border:isMe?'2px solid var(--sage)':'2px solid transparent'}},u.emoji),
    el('div',{style:{flex:1,minWidth:0}},[
      el('div',{style:{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'15px',color:'var(--earth)'}},u.name),
        isMe?el('span',{style:{fontSize:'9px',background:'var(--sage)',color:'#fff',padding:'1px 6px',borderRadius:'8px',fontWeight:700}},'אתה'):'',
      ]),
      el('div',{style:{display:'flex',gap:'5px',alignItems:'center',marginTop:'3px',flexWrap:'wrap'}},[
        el('span',{style:{background:isManager?'rgba(200,90,58,.12)':'rgba(106,154,90,.12)',color:isManager?'var(--red)':'var(--sage)',padding:'2px 7px',borderRadius:'8px',fontSize:'10px',fontWeight:700}},isManager?'👑 מנהל':'👤 עובד'),
        el('span',{style:{fontSize:'10px',color:'var(--clay)'}},u.email),
      ]),
    ]),
    // Hours summary on right
    el('div',{style:{textAlign:'center',minWidth:'62px'}},[
      el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,color:pct>=100?'var(--sage)':pct>50?'var(--straw)':'var(--clay)',lineHeight:'1'}},monthHrs.toFixed(1)),
      el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'2px'}},"ש' החודש"),
    ]),
  ]));

  // STATS ROW: points, days, tasks
  c.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'6px',marginBottom:'10px'}},[
    statTile('🌟',mpts+'★','החודש'),
    statTile('🏆',pts+'★','סה"כ'),
    statTile('📅',uniqueDays,'ימי עבודה'),
    statTile('✅',todayDone,'משימות היום'),
  ]));

  // Progress bar
  c.appendChild(pbar(pct,pct>=100?'var(--sage)':pct>50?'var(--straw)':'var(--red)',6));
  c.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'3px',textAlign:'left'}},monthHrs.toFixed(1)+'/160 שעות'));

  // Recent hours (last 3)
  if(myLogs.length>0){
    const recent=el('div',{style:{marginTop:'10px',borderTop:'1px solid var(--mist)',paddingTop:'8px'}});
    recent.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)',fontWeight:600,marginBottom:'4px'}},'רשומות אחרונות:'));
    myLogs.slice(-3).reverse().forEach(h=>{
      recent.appendChild(el('div',{style:{display:'flex',fontSize:'11px',color:'var(--clay)',padding:'3px 0',gap:'8px',alignItems:'center'}},[
        el('span',{style:{minWidth:'50px',fontWeight:600}},fd(h.date)),
        el('span',{style:{minWidth:'78px'}},h.start+'–'+h.end),
        el('span',{style:{fontWeight:600,color:'var(--sage)'}},ch(h.start,h.end).toFixed(1)+"ש'"),
        h.note?el('span',{style:{fontStyle:'italic',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},h.note):el('span',{style:{flex:1}}),
        (isAdmin||h.uid===ME.id)?el('button',{style:{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:'12px',padding:'2px'},onclick:()=>{if(confirm('למחוק רשומה זו?')){DB.hoursLog=DB.hoursLog.filter(x=>x.id!==h.id);al('hours-del','מחיקת שעות '+ch(h.start,h.end).toFixed(1)+'ש\'',fd(h.date)+' '+h.start+'-'+h.end);save();renderTab();}}},'🗑'):'',
      ]));
    });
    c.appendChild(recent);
  }

  // Action buttons row
  const actions=el('div',{style:{display:'flex',gap:'6px',marginTop:'10px',flexWrap:'wrap'}});
  // View all hours - everyone can see their own, managers can see all
  if(isMe||isAdmin){
    actions.appendChild(el('button',{style:{flex:'1',minWidth:'100px',background:'var(--mist)',border:'none',borderRadius:'7px',padding:'7px 10px',fontSize:'11px',cursor:'pointer',fontWeight:600,color:'var(--earth)',fontFamily:'inherit'},onclick:()=>showUserHoursDetail(u.id)},'📋 כל השעות ('+myLogs.length+')'));
  }
  // Manager actions
  if(isAdmin){
    actions.appendChild(el('button',{style:{flex:'1',minWidth:'70px',background:'var(--mist)',border:'none',borderRadius:'7px',padding:'7px 10px',fontSize:'11px',cursor:'pointer',fontWeight:600,color:'var(--earth)',fontFamily:'inherit'},onclick:()=>editWorker(u)},'✏️ ערוך'));
    // Toggle role (not on self)
    if(u.id!==ME.id){
      actions.appendChild(el('button',{style:{flex:'1',minWidth:'70px',background:isManager?'rgba(106,154,90,.12)':'rgba(200,90,58,.12)',color:isManager?'var(--sage)':'var(--red)',border:'1px solid '+(isManager?'rgba(106,154,90,.3)':'rgba(200,90,58,.3)'),borderRadius:'7px',padding:'7px 10px',fontSize:'11px',cursor:'pointer',fontWeight:600,fontFamily:'inherit'},onclick:()=>{
        const newRole=isManager?'\u05e2\u05d5\u05d1\u05d3':'\u05de\u05e0\u05d4\u05dc';
        if(!confirm('להפוך את '+u.name+' ל-'+newRole+'?'))return;
        u.role=newRole;
        al('user-role','שינוי תפקיד: '+u.name,'→ '+newRole);
        save();toast('הוחלף ל-'+newRole+' \u2713');renderTab();
      }},isManager?'→ עובד':'→ מנהל'));
      // Delete button
      actions.appendChild(el('button',{style:{background:'rgba(200,90,58,.1)',color:'var(--red)',border:'1px solid rgba(200,90,58,.3)',borderRadius:'7px',padding:'7px 10px',fontSize:'11px',cursor:'pointer',fontWeight:600,fontFamily:'inherit'},onclick:()=>deleteWorker(u)},'🗑'));
    }
  }
  if(actions.children.length>0)c.appendChild(actions);

  return c;
}

// Show full hours detail in modal
function showUserHoursDetail(uid){
  const u=gu(uid);if(!u)return;
  const isAdmin=ME.role==='\u05de\u05e0\u05d4\u05dc';
  if(uid!==ME.id&&!isAdmin){toast('אין הרשאה');return;}

  const bg=el('div',{className:'modal-bg',onclick:e=>{if(e.target===e.currentTarget)bg.remove();}});
  const m=el('div',{className:'modal',style:{maxWidth:'520px'}});

  // Header
  m.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'14px',paddingBottom:'12px',borderBottom:'1px solid var(--mist)'}},[
    el('div',{style:{width:'52px',height:'52px',borderRadius:'50%',background:u.color+'25',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'28px'}},u.emoji),
    el('div',{style:{flex:1}},[
      el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'18px',fontWeight:900,color:'var(--earth)'}},u.name),
      el('div',{style:{fontSize:'11px',color:'var(--clay)'}},'יומן שעות עבודה'),
    ]),
    el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'50%',width:'30px',height:'30px',fontSize:'16px',cursor:'pointer'},onclick:()=>bg.remove()},'✕'),
  ]));

  // Month selector
  let viewYear=HY,viewMonth=HM;
  const monthLabel=el('div',{style:{textAlign:'center',flex:1,fontWeight:700,fontSize:'13px'}},MONTHS[viewMonth]+' '+viewYear);
  const content=el('div',{});
  const renderContent=()=>{
    content.innerHTML='';
    const pfx=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}`;
    const logs=(DB.hoursLog||[]).filter(h=>h.uid===uid&&h.date.startsWith(pfx)).sort((a,b)=>a.date.localeCompare(b.date)||a.start.localeCompare(b.start));
    const monthHrs=logs.reduce((s,h)=>s+ch(h.start,h.end),0);
    const days=new Set(logs.map(h=>h.date)).size;

    // Stats summary
    content.appendChild(el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px',marginBottom:'14px'}},[
      el('div',{style:{background:'linear-gradient(135deg,var(--earth),var(--soil))',color:'var(--gold)',borderRadius:'10px',padding:'10px 6px',textAlign:'center'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,lineHeight:'1'}},monthHrs.toFixed(1)),
        el('div',{style:{fontSize:'10px',opacity:.8,marginTop:'3px'}},'שעות'),
      ]),
      el('div',{style:{background:'var(--mist)',borderRadius:'10px',padding:'10px 6px',textAlign:'center'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,color:'var(--earth)',lineHeight:'1'}},days),
        el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'3px'}},'ימי עבודה'),
      ]),
      el('div',{style:{background:'var(--mist)',borderRadius:'10px',padding:'10px 6px',textAlign:'center'}},[
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900,color:'var(--earth)',lineHeight:'1'}},days>0?(monthHrs/days).toFixed(1):'0'),
        el('div',{style:{fontSize:'10px',color:'var(--clay)',marginTop:'3px'}},'ממוצע יומי'),
      ]),
    ]));

    // Group by date
    if(logs.length===0){
      content.appendChild(el('div',{style:{textAlign:'center',color:'var(--clay)',padding:'30px',fontSize:'12px'}},'אין רשומות שעות בחודש זה'));
      return;
    }

    const byDate={};
    logs.forEach(h=>{if(!byDate[h.date])byDate[h.date]=[];byDate[h.date].push(h);});
    const sortedDates=Object.keys(byDate).sort().reverse();

    content.appendChild(el('div',{style:{fontWeight:700,fontSize:'12px',marginBottom:'6px',color:'var(--earth)'}},'📅 פירוט לפי ימים'));
    const listWrap=el('div',{style:{maxHeight:'350px',overflowY:'auto',background:'var(--mist)',borderRadius:'8px',padding:'6px'}});
    sortedDates.forEach(date=>{
      const dayLogs=byDate[date];
      const dayTotal=dayLogs.reduce((s,h)=>s+ch(h.start,h.end),0);
      const dateD=new Date(date+'T00:00:00');
      const weekdays=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

      const dayCard=el('div',{style:{background:'var(--white)',borderRadius:'7px',padding:'8px 10px',marginBottom:'5px',border:'1px solid rgba(232,216,184,.3)'}});
      dayCard.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},[
        el('div',{style:{fontWeight:700,fontSize:'12px',color:'var(--earth)'}},weekdays[dateD.getDay()]+', '+fd(date)),
        el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'15px',fontWeight:900,color:'var(--sage)'}},dayTotal.toFixed(1)+'ש\''),
      ]));
      dayLogs.forEach(h=>{
        dayCard.appendChild(el('div',{style:{display:'flex',gap:'8px',fontSize:'11px',color:'var(--clay)',padding:'3px 0',alignItems:'center',borderTop:dayLogs.indexOf(h)>0?'1px solid rgba(232,216,184,.2)':'none'}},[
          el('span',{style:{minWidth:'78px'}},h.start+'–'+h.end),
          el('span',{style:{fontWeight:600,color:'var(--earth)',minWidth:'42px'}},ch(h.start,h.end).toFixed(1)+'ש\''),
          h.note?el('span',{style:{fontStyle:'italic',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},'📝 '+h.note):el('span',{style:{flex:1}}),
          (isAdmin||h.uid===ME.id)?el('button',{style:{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:'12px'},onclick:()=>{
            if(confirm('למחוק רשומה זו?\n'+fd(h.date)+' '+h.start+'-'+h.end)){
              DB.hoursLog=DB.hoursLog.filter(x=>x.id!==h.id);
              al('hours-del','מחיקת שעות '+ch(h.start,h.end).toFixed(1)+'ש\'',fd(h.date)+' '+h.start+'-'+h.end+(h.uid!==ME.id?' (של '+gu(h.uid)?.name+')':''));
              save();renderContent();renderTab();
            }
          }},'🗑'):'',
        ]));
      });
      listWrap.appendChild(dayCard);
    });
    content.appendChild(listWrap);
  };

  const monthNav=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',background:'var(--mist)',borderRadius:'8px',padding:'4px 8px'}});
  monthNav.appendChild(el('button',{style:{background:'none',border:'none',padding:'5px 10px',cursor:'pointer',fontSize:'14px'},onclick:()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;renderContent();}},'◀'));
  monthNav.appendChild(monthLabel);
  monthNav.appendChild(el('button',{style:{background:'none',border:'none',padding:'5px 10px',cursor:'pointer',fontSize:'14px'},onclick:()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;renderContent();}},'▶'));
  m.appendChild(monthNav);
  m.appendChild(content);
  renderContent();

  bg.appendChild(m);
  document.body.appendChild(bg);
}

// Delete worker (admin only) - with safety
function deleteWorker(u){
  if(u.id===ME.id){toast('לא ניתן למחוק את עצמך');return;}
  // First confirmation
  const userHours=(DB.hoursLog||[]).filter(h=>h.uid===u.id).length;
  const userBonuses=bonusArr().filter(b=>b.uid===u.id).length;
  let userTasks=0;
  Object.values(DB.comps||{}).forEach(dc=>{Object.values(dc).forEach(by=>{if(by===u.id)userTasks++;});});

  const msg='⚠️ למחוק את '+u.name+'?\n\n'+
    'הנתונים שיימחקו:\n'+
    '• '+userHours+' רשומות שעות\n'+
    '• '+userBonuses+' בונוסים\n'+
    '\nנשמרים:\n'+
    '• '+userTasks+' משימות שביצע (נשארות ברישום, אך ללא קישור)\n\n'+
    'פעולה זו לא ניתנת לביטול!';
  if(!confirm(msg))return;
  if(!confirm('בטוח? באמת למחוק את '+u.name+' לצמיתות?'))return;

  // Remove user
  DB.users=DB.users.filter(x=>x.id!==u.id);
  // Remove their hours
  DB.hoursLog=(DB.hoursLog||[]).filter(h=>h.uid!==u.id);
  // Remove their bonuses
  DB.bonus=bonusArr().filter(b=>b.uid!==u.id);
  al('user-del','עובד נמחק: '+u.name,'כולל '+userHours+' שעות + '+userBonuses+' בונוסים','');
  save();toast(u.name+' נמחק');renderTab();
}

  });

        ME.role==='\u05de\u05e0\u05d4\u05dc'?el('button',{style:{background:'none',border:'none',fontSize:'14px',cursor:'pointer'},onclick:()=>editProject(p)},'✏️'):'',
        ME.role==='\u05de\u05e0\u05d4\u05dc'?el('button',{style:{background:'none',border:'none',fontSize:'13px',cursor:'pointer',opacity:.5},onclick:()=>{if(confirm('למחוק פרויקט?')){DB.projects=DB.projects.filter(x=>x.id!==p.id);save();renderTab();}}},'🗑'):'',
