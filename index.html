// ─── FIRESTORE SAVE FUNCTIONS ────────────────────────────────────
function saveTasks()     { FDB.collection('farm').doc('tasks').set({rT:DB.rT,oT:DB.oT}).catch(e=>console.error('saveTasks',e)); }
function saveInventory() { FDB.collection('farm').doc('inventory').set({inv:DB.inv,equip:DB.equip}).catch(e=>console.error('saveInventory',e)); }
function saveLogs()      { FDB.collection('farm').doc('logs').set({actLog:DB.actLog,hoursLog:DB.hoursLog,bonus:DB.bonus}).catch(e=>console.error('saveLogs',e)); }
function saveDaily()     { FDB.collection('farm').doc('daily').set({comps:DB.comps,taskNotes:DB.taskNotes,journal:DB.journal}).catch(e=>console.error('saveDaily',e)); }
function saveProjects()  { FDB.collection('farm').doc('projects').set({projects:DB.projects}).catch(e=>console.error('saveProjects',e)); }
function saveUserProfile(u) { const {pass,...p}=u; FDB.collection('users').doc(u.id).set(p).catch(e=>console.error('saveUser',e)); }

// ─── LOAD DATA FROM FIRESTORE ────────────────────────────────────
async function loadData() {
  try {
    const [tasksSnap,invSnap,logsSnap,dailySnap,projSnap,usersSnap] = await Promise.all([
      FDB.collection('farm').doc('tasks').get(),
      FDB.collection('farm').doc('inventory').get(),
      FDB.collection('farm').doc('logs').get(),
      FDB.collection('farm').doc('daily').get(),
      FDB.collection('farm').doc('projects').get(),
      FDB.collection('users').get()
    ]);
    if(tasksSnap.exists){const d=tasksSnap.data();DB.rT=d.rT||DB.rT;DB.oT=d.oT||DB.oT;}
    else saveTasks();
    if(invSnap.exists){const d=invSnap.data();DB.inv=d.inv||DB.inv;DB.equip=d.equip||DB.equip;}
    else saveInventory();
    if(logsSnap.exists){const d=logsSnap.data();DB.actLog=d.actLog||[];DB.hoursLog=d.hoursLog||[];DB.bonus=d.bonus||[];}
    else saveLogs();
    if(dailySnap.exists){const d=dailySnap.data();DB.comps=d.comps||{};DB.taskNotes=d.taskNotes||{};DB.journal=d.journal||{};}
    else saveDaily();
    if(projSnap.exists){const d=projSnap.data();DB.projects=d.projects||DB.projects;}
    else saveProjects();
    DB.users=[];
    usersSnap.forEach(doc=>DB.users.push(doc.data()));
  } catch(e) {
    console.error('loadData',e);
    toast('שגיאה בטעינת נתונים ⚠️');
  }
}

function ch(s,e){const[sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);return Math.max(0,((eh*60+em)-(sh*60+sm))/60);}

function el(tag,attrs={},kids=[]){
  const e=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')e.className=v;
    else if(k==='innerHTML')e.innerHTML=v;
    else if(k==='value')e.value=v;

  });
  kids.flat().forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });

}

function renderReg(){
  const root=document.getElementById('root');root.innerHTML='';
  let selE=EMOJIS[0];
  const nm=finp({placeholder:'שם מלא',className:'inp'});
  const em=finp({type:'email',placeholder:'your@email.com',className:'inp'});
  const pw=finp({type:'password',placeholder:'לפחות 6 תווים',className:'inp'});
  const err=el('div',{className:'err'});
  const epg=el('div',{className:'ep-grid'});
  EMOJIS.forEach((e,i)=>{const s=el('span',{className:'ep-item'+(i===0?' sel':'')},e);s.addEventListener('click',()=>{epg.querySelectorAll('.ep-item').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');selE=e;});epg.appendChild(s);});
  const regBtn=el('button',{className:'btn-main'},'צור חשבון');
  const reg=async()=>{
    const name=nm.value.trim(),email=em.value.trim().toLowerCase(),pass=pw.value;
    if(!name){err.textContent='חסר שם';return;}
    if(!email.includes('@')){err.textContent='מייל לא תקין';return;}
    if(pass.length<6){err.textContent='סיסמה קצרה (לפחות 6 תווים)';return;}
    regBtn.textContent='יוצר חשבון...';regBtn.disabled=true;err.textContent='';
    try{
      const usersSnap=await FDB.collection('users').get();
      const isFirst=usersSnap.empty;
      const cred=await FAUTH.createUserWithEmailAndPassword(email,pass);
      const uid=cred.user.uid;
      const u={id:uid,name,email,emoji:selE,color:COLS[usersSnap.size%COLS.length],role:isFirst?'מנהל':'עובד'};
      await FDB.collection('users').doc(uid).set(u);
    }catch(e){
      console.error('reg',e);
      err.textContent=e.code==='auth/email-already-in-use'?'מייל כבר קיים':'שגיאה ביצירת חשבון';
      regBtn.textContent='צור חשבון';regBtn.disabled=false;
    }
  };
  regBtn.onclick=reg;
  root.appendChild(el('div',{className:'auth'},[el('div',{className:'auth-box'},[
    el('div',{className:'auth-logo'},[el('div',{style:{fontSize:'48px',marginBottom:'6px'}},'🌱'),el('h1',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'22px',fontWeight:900}},'הצטרף לחווה'),el('p',{style:{color:'var(--clay)',fontSize:'12px',marginTop:'3px'}},'חשבון חדש')]),
    el('label',{className:'lbl'},'שם מלא'),nm,
    el('label',{className:'lbl'},'מייל'),em,
    el('label',{className:'lbl'},'סיסמה'),pw,
    el('label',{className:'lbl'},'אמוג׳י'),epg,
    err,regBtn,
    el('div',{className:'auth-sw'},[document.createTextNode('יש חשבון? '),el('a',{onclick:renderLogin},'התחבר')]),
  ])]));
}

function rTasks(main){
  const dk=tdk(),dc=DB.comps[dk]||{};
  const todayAll=[...DB.rT,...DB.oT.filter(t=>!t.done)];

  }
  function noteTask(task){
    const ta=fta({placeholder:'כתוב הערה...',rows:4});const{bg,box}=modal('');box.innerHTML='';

    box.appendChild(ta);
    box.appendChild(el('div',{style:{display:'flex',gap:'8px',marginTop:'10px'}},[
      btn('💾 שמור','var(--sage)',()=>{if(!ta.value.trim())return;if(!DB.taskNotes[task.id])DB.taskNotes[task.id]=[];DB.taskNotes[task.id].push({text:ta.value.trim(),userId:ME.id,userName:ME.name,date:dk,ts:Date.now()});al('note_added',`הערה על: ${task.title}`,ta.value.trim(),task.area);saveDaily();bg.remove();toast('הערה נשמרה ✓');},{flex:1,padding:'10px'}),
      btn('ביטול','var(--mist)',()=>bg.remove(),{color:'var(--soil)',flex:1,padding:'10px'}),
    ]));
    setTimeout(()=>ta.focus(),100);
  }
  function mkRow(task,type){
    const isDone=!!dc[task.id],doer=dc[task.id]?gu(dc[task.id]):null,ass=task.uid?gu(task.uid):null;
    const nc=(DB.taskNotes[task.id]||[]).length,ac=AREAS[task.area]?.c||'var(--sage)';

// ─── SUMMARY ─────────────────────────────────────────────────────
function rSummary(main){
  const mPrefix=`${HY}-${String(HM+1).padStart(2,'0')}`;
  const mLogs=DB.hoursLog.filter(l=>l.date.startsWith(mPrefix));
  const uH={};DB.users.forEach(u=>uH[u.id]=0);mLogs.forEach(l=>uH[l.uid]=(uH[l.uid]||0)+l.hours);
  const totalH=Object.values(uH).reduce((a,b)=>a+b,0);
  const monthKeys=Object.keys(DB.comps).filter(k=>k.startsWith(mPrefix));
  const totalDone=monthKeys.reduce((s,k)=>s+Object.keys(DB.comps[k]).length,0);
  const low=DB.inv.filter(i=>i.qty<i.minQty),shortage=low.map(i=>({...i,missing:Math.max(0,i.minQty-i.qty)}));
  const needsMaint=DB.equip.filter(e=>e.cond<70);

  const nav=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}});

  const nb=el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'7px',padding:'5px 11px',fontSize:'15px',cursor:'pointer',fontFamily:'inherit'}},'›');nb.onclick=()=>{if(HM===11){HM=0;HY++;}else HM++;rSummary(main);};
  nav.appendChild(el('div',{style:{display:'flex',alignItems:'center',gap:'9px'}},[pb,el('span',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:700,fontSize:'17px'}},`${MONTHS[HM]} ${HY}`),nb]));
  nav.appendChild(el('span',{style:{fontSize:'11px',color:'var(--clay)'}},`1–${end.getDate()} ב${MONTHS[HM]}`));main.appendChild(nav);

  const kg=el('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}});
  [{icon:'⏱',l:'שעות עבודה',v:totalH.toFixed(1)+"ש'",c:'var(--sage)'},{icon:'✅',l:'משימות בוצעו',v:totalDone,c:'var(--gold)'},{icon:'⚠️',l:'פריטים חסרים',v:shortage.length,c:shortage.length?'var(--red)':'var(--sage)'},{icon:'🔧',l:'ציוד לתחזוקה',v:needsMaint.length,c:needsMaint.length?'var(--red)':'var(--sage)'}].forEach(k=>{
    kg.appendChild(el('div',{className:'card',style:{textAlign:'center'}},[el('div',{style:{fontSize:'24px',marginBottom:'4px'}},k.icon),el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'26px',fontWeight:900,color:k.c}},k.v),el('div',{style:{fontSize:'11px',color:'var(--clay)'}},k.l)]));
  });main.appendChild(kg);

  if(shortage.length){
    const sc=card([el('div',{className:'card-t',style:{color:'var(--straw)'}},`🛒 רשימת קנייה — ${shortage.length} פריטים חסרים`)],{background:'#fff8ee',border:'1px solid #e8b84b44'});
    Object.entries(INV_CATS).forEach(([ck,ci])=>{const cs=shortage.filter(i=>i.invCat===ck);if(!cs.length)return;sc.appendChild(el('div',{style:{fontSize:'11px',fontWeight:700,color:ci.c,marginBottom:'5px',marginTop:'8px'}},ci.l));cs.forEach(i=>{const r=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',background:ci.c+'0f',borderRadius:'7px',marginBottom:'4px',fontSize:'13px'}});r.appendChild(el('span',{style:{fontSize:'18px'}},i.icon));const inf=el('div',{style:{flex:1}});inf.appendChild(el('div',{style:{fontWeight:600}},i.name));inf.appendChild(el('div',{style:{fontSize:'11px',color:'var(--clay)'}},`יש: ${i.qty} ${i.unit} · צריך: ${i.minQty} ${i.unit}`));inf.appendChild(pbar(Math.round(i.qty/Math.max(i.minQty,1)*100),i.qty<i.minQty*0.3?'var(--red)':'var(--straw)',3));r.appendChild(inf);r.appendChild(el('div',{style:{textAlign:'center',background:'var(--red)15',borderRadius:'7px',padding:'4px 8px'}},[el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,color:'var(--red)'}},i.missing.toFixed(1)),el('div',{style:{fontSize:'9px',color:'var(--clay)'}},i.unit+' חסר')]));sc.appendChild(r);});});
    main.appendChild(sc);
  } else {main.appendChild(card([el('div',{style:{textAlign:'center',fontSize:'14px',color:'var(--sage)',fontWeight:700}},'✅ כל המלאי תקין — אין חוסרים!')],{background:'#e8f5e4',border:'1px solid rgba(106,154,90,.3)'}));}

  const ic=card([el('div',{className:'card-t'},'📦 מצב מלאי מלא')]);
  Object.entries(INV_CATS).forEach(([ck,ci])=>{const items=DB.inv.filter(i=>i.invCat===ck);if(!items.length)return;const catLow=items.filter(i=>i.qty<i.minQty).length;const cd=el('div',{style:{marginBottom:'12px'}});cd.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'12px',marginBottom:'5px'}},[el('span',{style:{fontWeight:700,color:ci.c}},ci.l),catLow?el('span',{style:{color:'var(--red)',fontWeight:700}},`⚠️ ${catLow} חסר`):el('span')]));items.forEach(item=>{const pct=Math.min(item.qty/Math.max(item.minQty*2,1)*100,100),isLow=item.qty<item.minQty,color=isLow?'var(--red)':item.qty<item.minQty*1.5?'var(--straw)':'var(--sage)';const r=el('div',{style:{marginBottom:'6px'}});r.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'11px',marginBottom:'2px'}},[el('span',{},`${item.icon} ${item.name}`),el('span',{style:{fontWeight:700,color}},`${item.qty} ${item.unit}${isLow?' ⚠️':''}`)]));r.appendChild(pbar(pct,color,4));cd.appendChild(r);});ic.appendChild(cd);});
  main.appendChild(ic);

  const hc=card([el('div',{className:'card-t'},`⏱ שעות עבודה — ${MONTHS[HM]}`)]);
  DB.users.forEach(u=>{const hrs=uH[u.id]||0,pct=Math.min(hrs/160*100,100);const r=el('div',{style:{marginBottom:'10px'}});r.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'13px',marginBottom:'3px'}},[el('span',{},`${u.emoji} ${u.name}`),el('span',{style:{fontWeight:700,color:pct>=100?'var(--sage)':hrs>80?'var(--straw)':'var(--clay)'}},`${hrs.toFixed(1)} / 160 ש'`)]));r.appendChild(pbar(pct,pct>=100?'var(--sage)':pct>50?'var(--straw)':'var(--red)',8));hc.appendChild(r);});
  main.appendChild(hc);

  if(needsMaint.length){const mc=card([el('div',{className:'card-t',style:{color:'var(--straw)'}},'🔧 ציוד דורש תחזוקה')],{background:'#fff8ee',border:'1px solid #e8b84b44'});needsMaint.forEach(e=>{const r=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'5px 0',fontSize:'13px'}});r.appendChild(el('span',{},e.icon));r.appendChild(el('span',{style:{flex:1}},e.name));r.appendChild(el('span',{style:{color:e.cond<50?'var(--red)':'var(--straw)',fontWeight:700}},e.cond+'%'));mc.appendChild(r);});main.appendChild(mc);}

  const ranked=DB.users.map(u=>({...u,pts:gp(u.id),hrs:uH[u.id]||0,tasks:monthKeys.reduce((s,k)=>s+Object.values(DB.comps[k]||{}).filter(v=>v===u.id).length,0)})).sort((a,b)=>b.pts-a.pts);
  const wc=card([el('div',{className:'card-t'},`👥 ביצועי עובדים — ${MONTHS[HM]}`)]);const medals=['🥇','🥈','🥉'];
  ranked.forEach((u,i)=>{const r=el('div',{style:{display:'flex',alignItems:'center',gap:'10px',padding:'8px 0',borderBottom:'1px solid var(--mist)'}});r.appendChild(el('span',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,color:'var(--gold)',width:'24px'}},medals[i]||(i+1)+''));r.appendChild(el('span',{style:{fontSize:'20px'}},u.emoji));const inf=el('div',{style:{flex:1}});inf.appendChild(el('div',{style:{fontWeight:700,fontSize:'14px'}},u.name));inf.appendChild(el('div',{style:{fontSize:'11px',color:'var(--clay)'}},`${u.tasks} משימות · ${u.hrs.toFixed(1)} שעות`));inf.appendChild(pbar(u.tasks/Math.max(totalDone,1)*100,u.color,4));r.appendChild(inf);r.appendChild(el('div',{style:{textAlign:'center',background:'rgba(232,184,75,.1)',borderRadius:'8px',padding:'4px 8px'}},[el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,color:'var(--gold)'}},u.pts),el('div',{style:{fontSize:'9px',color:'var(--clay)'}},'⭐')]));wc.appendChild(r);});
  main.appendChild(wc);
}

// ─── ADMIN ───────────────────────────────────────────────────────
function rAdmin(main){
  main.appendChild(el('div',{style:{fontFamily:"'Frank Ruhl Libre',serif",fontSize:'16px',fontWeight:900,marginBottom:'12px'}},'⚙️ ניהול משתמשים'));

  // Invite card
  main.appendChild(card([
    el('div',{className:'card-t',style:{color:'var(--sage)',fontSize:'13px'}},'🔗 הצטרפות לחווה'),
    el('div',{style:{fontSize:'12px',color:'var(--clay)',lineHeight:1.7,marginBottom:'10px'}},'שלח לעובד החדש את הקישור לאפליקציה. הם יצרו חשבון בעצמם ויצורפו אוטומטית. לאחר מכן תוכל לשנות את תפקידם.'),
    btn('📋 העתק קישור לאפליקציה','var(--sage)',()=>{const url=window.location.href;if(navigator.clipboard)navigator.clipboard.writeText(url).then(()=>toast('קישור הועתק ✓'));else{toast('הקישור: '+url,4000);}},{width:'100%',padding:'11px',fontSize:'13px'}),
  ],{background:'#e8f5e4',border:'1px solid rgba(106,154,90,.3)'}));

  DB.users.forEach(user=>{
    const uc=el('div',{style:{background:'var(--white)',borderRadius:'10px',padding:'12px',marginBottom:'8px',boxShadow:'0 2px 12px rgba(26,18,5,.12)',display:'flex',alignItems:'center',gap:'10px'}});
    uc.appendChild(el('div',{style:{width:'38px',height:'38px',borderRadius:'50%',background:user.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px'}},user.emoji));
    const ui=el('div',{style:{flex:1}});ui.appendChild(el('div',{style:{fontWeight:700,fontSize:'14px'}},user.name));ui.appendChild(el('div',{style:{fontSize:'11px',color:user.color,fontWeight:600}},user.role));ui.appendChild(el('div',{style:{fontSize:'10px',color:'var(--clay)'}},`${user.email} · ${gp(user.id)}⭐`));uc.appendChild(ui);
    const acts=el('div',{style:{display:'flex',flexDirection:'column',gap:'4px'}});
    const rb=el('button',{style:{background:'var(--mist)',border:'none',borderRadius:'6px',padding:'4px 9px',fontSize:'10px',fontWeight:600,cursor:'pointer',color:'var(--soil)',fontFamily:'inherit'}},user.role==='מנהל'?'→ עובד':'→ מנהל');
    rb.onclick=()=>{
      user.role=user.role==='מנהל'?'עובד':'מנהל';
      saveUserProfile(user);
      // Update in DB.users
      const idx=DB.users.findIndex(u=>u.id===user.id);
      if(idx>=0)DB.users[idx].role=user.role;
      toast('תפקיד שונה ✓');rAdmin(main);
    };
    acts.appendChild(rb);
    if(user.id!==ME.id){
      const db=el('button',{style:{background:'none',border:'none',color:'#ccc',cursor:'pointer',fontSize:'16px'}},'🗑');
      db.onclick=()=>{
        if(!confirm('למחוק?'))return;
        DB.users=DB.users.filter(u=>u.id!==user.id);
        FDB.collection('users').doc(user.id).delete().catch(console.error);
        toast('נמחק');rAdmin(main);
      };
      acts.appendChild(db);
    }
    uc.appendChild(acts);main.appendChild(uc);
  });
}

// ─── APP START ───────────────────────────────────────────────────
showLoading('שירת האדמה');

FAUTH.onAuthStateChanged(async (firebaseUser) => {
  if (firebaseUser) {
    showLoading('טוען נתונים...');
    try {
      const profileDoc = await FDB.collection('users').doc(firebaseUser.uid).get();
      if (!profileDoc.exists) {
        await FAUTH.signOut();
        renderLogin();
        return;
      }
      ME = profileDoc.data();
      await loadData();
      renderApp();

      // Refresh data on tab visibility change
      document.addEventListener('visibilitychange', async () => {
        if (!document.hidden && ME) {
          await loadData();
          const main = document.getElementById('app-main');
          if (main) renderTab(main);
        }
      });
    } catch(e) {
      console.error('startup error', e);
      toast('שגיאה בטעינה — נסה לרענן');
    }
  } else {
    ME = null;
    renderLogin();
  }
});
</script>
